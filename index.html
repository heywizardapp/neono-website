<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeonO - Run your salon or barbershop on one platform</title>
    <meta name="description" content="All-in-one platform for beauty and wellness businesses. Appointments, POS, marketing, website, and AI—built in. Start free, grow fast." />
    <meta name="author" content="NeonO" />

    <!-- Critical Resource Preloading & Performance Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="https://api.stripe.com">
    <link rel="dns-prefetch" href="https://www.google-analytics.com">
    <link rel="dns-prefetch" href="https://www.googletagmanager.com">
    <link rel="preconnect" href="https://vitals.vercel-analytics.com">
    
    <!-- Early DNS resolution for potential third-party services -->
    <link rel="dns-prefetch" href="//unpkg.com">
    <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
    
    <!-- Preload critical fonts -->
    <link rel="preload" href="https://fonts.gstatic.com/s/inter/v18/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyfAZ9hiJ-Ek-_EeA.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="https://fonts.gstatic.com/s/geist/v1/gyB4hws1JdgnKy56GB_JX6zdZ2vO.woff2" as="font" type="font/woff2" crossorigin>
    
    <!-- Critical CSS inlined for faster initial render -->
    <style>
      :root{--ink:215 85% 8%;--lavender:240 89% 73%;--mint:165 82% 49%;--primary:var(--lavender);--background:0 0% 100%;--foreground:var(--ink)}
      body{font-family:Inter,system-ui,sans-serif;margin:0;background:hsl(var(--background));color:hsl(var(--foreground));-webkit-font-smoothing:antialiased}
      .loading{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,hsl(var(--lavender)),hsl(var(--mint)))}
      .spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:white;animation:spin 1s ease-in-out infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>

    <meta property="og:title" content="NeonO - Run your salon or barbershop on one platform" />
    <meta property="og:description" content="All-in-one platform for beauty and wellness businesses. Appointments, POS, marketing, website, and AI—built in. Start free, grow fast." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    
    <!-- Performance Hints -->
    <meta httpEquiv="x-dns-prefetch-control" content="on" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0B1220" />
  </head>

  <body>
    <div id="root">
      <!-- Loading fallback for better perceived performance -->
      <div class="loading">
        <div class="spinner"></div>
      </div>
    </div>
    
    <!-- Preload critical resources -->
    <link rel="modulepreload" href="/src/main.tsx">
    <link rel="modulepreload" href="/src/App.tsx">
    
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Performance monitoring -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .catch(err => console.log('SW registration failed'));
        });
      }
    </script>
  </body>
</html>

  <text x="650" y="595" font-family="system-ui" font-size="18" font-weight="600" fill="#7C7CF2">from $120</text>
  <rect x="980" y="545" width="80" height="40" rx="6" fill="#FFFFFF" stroke="#7C7CF2"/>
  <text x="1000" y="572" font-family="system-ui" font-size="13" fill="#7C7CF2">Select</text>
  
  <rect x="120" y="630" width="460" height="100" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="150" y="665" font-family="system-ui" font-size="16" font-weight="600" fill="#1a1a2e">Blowout</text>
  <text x="150" y="690" font-family="system-ui" font-size="14" fill="#718096">30 min • Professional styling</text>
  <text x="150" y="715" font-family="system-ui" font-size="18" font-weight="600" fill="#7C7CF2">$45</text>
  <rect x="480" y="665" width="80" height="40" rx="6" fill="#FFFFFF" stroke="#7C7CF2"/>
  <text x="500" y="692" font-family="system-ui" font-size="13" fill="#7C7CF2">Select</text>
  
  <rect x="620" y="630" width="460" height="100" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="650" y="665" font-family="system-ui" font-size="16" font-weight="600" fill="#1a1a2e">Men's Haircut</text>
  <text x="650" y="690" font-family="system-ui" font-size="14" fill="#718096">30 min • Classic or modern styles</text>
  <text x="650" y="715" font-family="system-ui" font-size="18" font-weight="600" fill="#7C7CF2">$45</text>
  <rect x="980" y="665" width="80" height="40" rx="6" fill="#FFFFFF" stroke="#7C7CF2"/>
  <text x="1000" y="692" font-family="system-ui" font-size="13" fill="#7C7CF2">Select</text>
  
  <!-- Powered by NeonO -->
  <text x="530" y="755" font-family="system-ui" font-size="11" fill="#A0AEC0">Powered by</text>

  <text x="150" y="320" font-family="system-ui" font-size="14" fill="#4A5568">Welcome to Bella Salon! We specialize in precision haircuts, vibrant color services, and relaxing spa</text>
  <text x="150" y="340" font-family="system-ui" font-size="14" fill="#4A5568">treatments. Book your appointment today!</text>
  

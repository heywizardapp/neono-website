  <text x="205" y="462" font-family="system-ui" font-size="14" font-weight="500" fill="#7C7CF2">✂️ Hair Services</text>
  
  <rect x="360" y="430" width="200" height="50" rx="8" fill="#F7FAFC" stroke="#E2E8F0"/>
  <text x="425" y="462" font-family="system-ui" font-size="14" fill="#4A5568">💅 Nail Services</text>
  
  <rect x="580" y="430" width="200" height="50" rx="8" fill="#F7FAFC" stroke="#E2E8F0"/>
  <text x="645" y="462" font-family="system-ui" font-size="14" fill="#4A5568">🧖 Spa Services</text>
  

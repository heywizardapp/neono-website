  <text x="150" y="595" font-family="system-ui" font-size="18" font-weight="600" fill="#7C7CF2">$65</text>
  <rect x="480" y="545" width="80" height="40" rx="6" fill="#7C7CF2"/>
  <text x="500" y="572" font-family="system-ui" font-size="13" fill="#FFFFFF">Select</text>
  
  <rect x="620" y="510" width="460" height="100" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="650" y="545" font-family="system-ui" font-size="16" font-weight="600" fill="#1a1a2e">Color Service</text>

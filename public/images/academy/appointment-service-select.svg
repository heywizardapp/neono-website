<svg width="700" height="550" viewBox="0 0 700 550" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser Window -->
  <rect width="700" height="550" rx="12" fill="#1a1a2e"/>
  
  <!-- Title Bar -->
  <rect width="700" height="44" rx="12" fill="#252542"/>
  <rect y="32" width="700" height="12" fill="#252542"/>
  
  <!-- Traffic Lights -->
  <circle cx="20" cy="22" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="22" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="22" r="6" fill="#28CA41"/>
  
  <!-- URL Bar -->
  <rect x="100" y="10" width="500" height="24" rx="6" fill="#1a1a2e"/>
  <text x="310" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">app.neono.io/calendar</text>
  
  <!-- Dimmed Background -->
  <rect x="0" y="44" width="700" height="506" fill="#13131f" fill-opacity="0.8"/>
  
  <!-- Modal -->
  <rect x="100" y="70" width="500" height="450" rx="16" fill="#1e1e36"/>
  <rect x="100" y="70" width="500" height="450" rx="16" stroke="#3a3a5a" stroke-width="1"/>
  
  <!-- Modal Header -->
  <text x="300" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#fff" text-anchor="middle">Select Service</text>
  
  <!-- Close Button -->
  <circle cx="570" cy="100" r="14" fill="#252542"/>
  <text x="566" y="106" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#888">×</text>
  
  <!-- Selected Client Badge -->
  <rect x="140" y="125" width="180" height="32" rx="16" fill="#7C7CF2" fill-opacity="0.2"/>
  <circle cx="162" cy="141" r="12" fill="#E879F9"/>
  <text x="156" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#fff">EJ</text>
  <text x="182" y="146" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7C7CF2">Emma Johnson</text>
  
  <!-- Search Services -->
  <rect x="140" y="170" width="420" height="40" rx="8" fill="#252542"/>
  <text x="170" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#666">🔍 Search services...</text>
  
  <!-- Service Categories -->
  <!-- Hair Services -->
  <text x="140" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#888">HAIR SERVICES</text>
  
  <!-- Service 1 -->
  <rect x="140" y="248" width="420" height="50" rx="8" fill="#252542"/>
  <text x="160" y="272" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#fff">Women's Haircut</text>
  <text x="160" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">45 min</text>
  <text x="510" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#10B981" text-anchor="end">$65</text>
  
  <!-- Service 2 -->
  <rect x="140" y="305" width="420" height="50" rx="8" fill="#252542"/>
  <text x="160" y="329" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#fff">Color Service</text>
  <text x="160" y="347" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">2 hrs</text>
  <text x="510" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#10B981" text-anchor="end">$120</text>
  
  <!-- Nail Services -->
  <text x="140" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#888">NAIL SERVICES</text>
  
  <!-- Service 3 (Selected) -->
  <rect x="140" y="393" width="420" height="50" rx="8" fill="#7C7CF2" fill-opacity="0.2"/>
  <rect x="140" y="393" width="420" height="50" rx="8" stroke="#7C7CF2" stroke-width="2"/>
  <circle cx="530" cy="418" r="12" fill="#7C7CF2"/>
  <text x="525" y="423" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#fff">✓</text>
  <text x="160" y="417" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#fff">Manicure</text>
  <text x="160" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9999aa">30 min</text>
  <text x="490" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#10B981" text-anchor="end">$45</text>
  
  <!-- Bottom Buttons -->
  <rect x="140" y="465" width="100" height="40" rx="8" fill="#252542"/>
  <text x="172" y="491" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888">Back</text>
  
  <rect x="460" y="465" width="100" height="40" rx="8" fill="#7C7CF2"/>
  <text x="493" y="491" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#fff">Next</text>
</svg>
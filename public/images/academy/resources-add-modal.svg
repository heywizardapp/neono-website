<svg width="600" height="550" viewBox="0 0 600 550" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser Window -->
  <rect width="600" height="550" rx="12" fill="#1a1a2e"/>
  
  <!-- Title Bar -->
  <rect width="600" height="44" rx="12" fill="#252542"/>
  <rect y="32" width="600" height="12" fill="#252542"/>
  
  <!-- Traffic Lights -->
  <circle cx="20" cy="22" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="22" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="22" r="6" fill="#28CA41"/>
  
  <!-- URL Bar -->
  <rect x="100" y="10" width="400" height="24" rx="6" fill="#1a1a2e"/>
  <text x="260" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">app.neono.io/settings/resources</text>
  
  <!-- Dimmed Background -->
  <rect x="0" y="44" width="600" height="506" fill="#13131f" fill-opacity="0.8"/>
  
  <!-- Modal -->
  <rect x="60" y="70" width="480" height="450" rx="16" fill="#1e1e36"/>
  <rect x="60" y="70" width="480" height="450" rx="16" stroke="#3a3a5a" stroke-width="1"/>
  
  <!-- Modal Header -->
  <text x="300" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#fff" text-anchor="middle">Add New Resource</text>
  
  <!-- Close Button -->
  <circle cx="510" cy="100" r="16" fill="#252542"/>
  <text x="505" y="106" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#888">×</text>
  
  <!-- Form Fields -->
  <!-- Resource Name -->
  <text x="100" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#fff">Resource Name</text>
  <rect x="100" y="168" width="400" height="44" rx="8" fill="#252542"/>
  <rect x="100" y="168" width="400" height="44" rx="8" stroke="#7C7CF2" stroke-width="2"/>
  <text x="120" y="196" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#fff">Pedicure Chair 3</text>
  
  <!-- Resource Type -->
  <text x="100" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#fff">Resource Type</text>
  <rect x="100" y="251" width="400" height="44" rx="8" fill="#252542"/>
  
  <!-- Type Dropdown Open -->
  <text x="120" y="279" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#9999aa">Select type...</text>
  <text x="475" y="279" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">▼</text>
  
  <!-- Dropdown Options -->
  <rect x="100" y="300" width="400" height="90" rx="8" fill="#252542"/>
  <rect x="100" y="300" width="400" height="90" rx="8" stroke="#3a3a5a" stroke-width="1"/>
  
  <rect x="108" y="308" width="384" height="36" rx="6" fill="#7C7CF2" fill-opacity="0.15"/>
  <rect x="120" y="318" width="18" height="18" rx="3" fill="#10B981"/>
  <text x="148" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#fff">Room</text>
  <text x="148" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">Physical spaces like treatment rooms</text>
  
  <rect x="120" y="358" width="18" height="18" rx="3" fill="#60A5FA"/>
  <text x="148" y="372" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">Equipment</text>
  
  <!-- Capacity -->
  <text x="100" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#fff">Capacity</text>
  <rect x="100" y="431" width="120" height="44" rx="8" fill="#252542"/>
  <text x="120" y="459" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#fff">1</text>
  <text x="180" y="459" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">client(s)</text>
  
  <text x="100" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">How many clients can use this at once?</text>
  
  <!-- Bottom Buttons -->
  <rect x="100" y="505" width="100" height="40" rx="8" fill="#252542"/>
  <text x="132" y="531" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888">Cancel</text>
  
  <rect x="380" y="505" width="120" height="40" rx="8" fill="#7C7CF2"/>
  <text x="405" y="531" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#fff">Add Resource</text>
</svg>
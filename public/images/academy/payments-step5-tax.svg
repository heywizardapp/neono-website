<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- Tax Settings Modal -->
  <rect x="150" y="100" width="900" height="600" rx="16" fill="#1a1a2e"/>
  
  <!-- Header -->
  <rect x="150" y="100" width="900" height="70" rx="16" fill="#141428"/>
  <rect x="150" y="154" width="900" height="16" fill="#141428"/>
  <text x="200" y="145" font-family="system-ui" font-size="20" font-weight="bold" fill="#FFFFFF">🧾 Tax Settings</text>
  <circle cx="1010" cy="135" r="16" fill="#2D3748"/>
  <text x="1005" y="141" font-family="system-ui" font-size="18" fill="#A0AEC0">×</text>
  
  <!-- Enable Tax Toggle -->
  <rect x="200" y="195" width="850" height="70" rx="10" fill="#0f0f1a"/>
  <text x="240" y="235" font-family="system-ui" font-size="16" font-weight="500" fill="#FFFFFF">Collect tax on services</text>
  <text x="240" y="255" font-family="system-ui" font-size="12" fill="#718096">Tax will be added at checkout</text>
  
  <rect x="950" y="215" width="70" height="35" rx="17" fill="#48BB78"/>
  <circle cx="1000" cy="233" r="13" fill="#FFFFFF"/>
  
  <!-- Tax Configuration -->
  <text x="200" y="305" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Tax Configuration</text>
  
  <rect x="200" y="325" width="850" height="180" rx="12" fill="#0f0f1a" stroke="#7C7CF2" stroke-width="2"/>
  
  <!-- Tax Name -->
  <text x="240" y="365" font-family="system-ui" font-size="12" fill="#718096">Tax Name</text>
  <rect x="240" y="380" width="300" height="50" rx="6" fill="#1a1a2e" stroke="#2D3748"/>
  <text x="270" y="412" font-family="system-ui" font-size="15" fill="#FFFFFF">Sales Tax (HST)</text>
  
  <!-- Tax Rate -->
  <text x="570" y="365" font-family="system-ui" font-size="12" fill="#718096">Tax Rate</text>
  <rect x="570" y="380" width="200" height="50" rx="6" fill="#1a1a2e" stroke="#7C7CF2" stroke-width="2"/>
  <text x="600" y="412" font-family="system-ui" font-size="22" font-weight="600" fill="#FFFFFF">13</text>
  <text x="635" y="412" font-family="system-ui" font-size="15" fill="#718096">%</text>
  <rect x="640" y="390" width="2" height="24" fill="#7C7CF2">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Tax Number (Optional) -->
  <text x="800" y="365" font-family="system-ui" font-size="12" fill="#718096">Tax Number (optional)</text>
  <rect x="800" y="380" width="230" height="50" rx="6" fill="#1a1a2e" stroke="#2D3748"/>
  <text x="830" y="412" font-family="system-ui" font-size="15" fill="#4A5568">123456789RT0001</text>
  
  <!-- Pricing Display -->
  <text x="240" y="475" font-family="system-ui" font-size="13" fill="#A0AEC0">Display prices:</text>
  
  <rect x="350" y="455" width="160" height="36" rx="6" fill="#7C7CF2"/>
  <text x="383" y="479" font-family="system-ui" font-size="13" fill="#FFFFFF">Before tax</text>
  
  <rect x="520" y="455" width="160" height="36" rx="6" fill="#2D3748"/>
  <text x="552" y="479" font-family="system-ui" font-size="13" fill="#A0AEC0">Tax included</text>
  
  <!-- Receipt Preview -->
  <rect x="200" y="525" width="400" height="160" rx="12" fill="#FFFFFF"/>
  <text x="240" y="560" font-family="system-ui" font-size="12" font-weight="600" fill="#1a1a2e">RECEIPT PREVIEW</text>
  <line x1="220" y1="575" x2="580" y2="575" stroke="#E2E8F0"/>
  
  <text x="240" y="600" font-family="system-ui" font-size="13" fill="#1a1a2e">Women's Haircut</text>
  <text x="520" y="600" font-family="system-ui" font-size="13" fill="#1a1a2e">$65.00</text>
  
  <text x="240" y="625" font-family="system-ui" font-size="13" fill="#718096">HST (13%)</text>
  <text x="520" y="625" font-family="system-ui" font-size="13" fill="#718096">$8.45</text>
  
  <line x1="220" y1="640" x2="580" y2="640" stroke="#E2E8F0"/>
  
  <text x="240" y="665" font-family="system-ui" font-size="14" font-weight="600" fill="#1a1a2e">Total</text>
  <text x="510" y="665" font-family="system-ui" font-size="14" font-weight="600" fill="#7C7CF2">$73.45</text>
  
  <!-- Pro Tip -->
  <rect x="620" y="525" width="430" height="160" rx="12" fill="#7C7CF2" fill-opacity="0.1"/>
  <text x="660" y="560" font-family="system-ui" font-size="14" font-weight="500" fill="#7C7CF2">💡 Tax Tips</text>
  <text x="660" y="590" font-family="system-ui" font-size="12" fill="#A0AEC0">• Check your local tax requirements</text>
  <text x="660" y="615" font-family="system-ui" font-size="12" fill="#A0AEC0">• Some services may be tax-exempt</text>
  <text x="660" y="640" font-family="system-ui" font-size="12" fill="#A0AEC0">• Tax reports are in your Dashboard</text>
  <text x="660" y="665" font-family="system-ui" font-size="12" fill="#48BB78">→ View tax report settings</text>
  
  <!-- Save Button -->
  <rect x="920" y="700" width="120" height="44" rx="8" fill="#7C7CF2"/>
  <text x="955" y="728" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Save</text>
</svg>
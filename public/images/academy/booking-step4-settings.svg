<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Main Content Area -->
  <rect x="60" y="84" width="1080" height="676" fill="#0f0f1a"/>
  
  <!-- Page Header -->
  <text x="100" y="135" font-family="system-ui" font-size="18" font-weight="600" fill="#FFFFFF">Booking Page Settings</text>
  
  <!-- Tabs -->
  <rect x="100" y="155" width="80" height="36" rx="6" fill="transparent"/>
  <text x="120" y="178" font-family="system-ui" font-size="13" fill="#A0AEC0">Design</text>
  
  <rect x="190" y="155" width="80" height="36" rx="6" fill="transparent"/>
  <text x="207" y="178" font-family="system-ui" font-size="13" fill="#A0AEC0">Content</text>
  
  <rect x="280" y="155" width="80" height="36" rx="6" fill="#7C7CF2"/>
  <text x="298" y="178" font-family="system-ui" font-size="13" fill="#FFFFFF">Settings</text>
  
  <!-- Service Display Options -->
  <rect x="100" y="210" width="550" height="250" rx="12" fill="#1a1a2e"/>
  <text x="140" y="255" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">📋 Service Display</text>
  
  <!-- Group by Category -->
  <rect x="140" y="280" width="470" height="50" rx="8" fill="#0f0f1a"/>
  <text x="180" y="312" font-family="system-ui" font-size="14" fill="#FFFFFF">Group services by category</text>
  <rect x="530" y="293" width="60" height="28" rx="14" fill="#48BB78"/>
  <circle cx="573" cy="307" r="10" fill="#FFFFFF"/>
  
  <!-- Show Prices -->
  <rect x="140" y="340" width="470" height="50" rx="8" fill="#0f0f1a"/>
  <text x="180" y="372" font-family="system-ui" font-size="14" fill="#FFFFFF">Show prices on booking page</text>
  <rect x="530" y="353" width="60" height="28" rx="14" fill="#48BB78"/>
  <circle cx="573" cy="367" r="10" fill="#FFFFFF"/>
  
  <!-- Show Duration -->
  <rect x="140" y="400" width="470" height="50" rx="8" fill="#0f0f1a"/>
  <text x="180" y="432" font-family="system-ui" font-size="14" fill="#FFFFFF">Show service duration</text>
  <rect x="530" y="413" width="60" height="28" rx="14" fill="#48BB78"/>
  <circle cx="573" cy="427" r="10" fill="#FFFFFF"/>
  
  <!-- Staff Selection Options -->
  <rect x="100" y="480" width="550" height="250" rx="12" fill="#1a1a2e"/>
  <text x="140" y="525" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">👤 Staff Selection</text>
  
  <!-- Allow Staff Selection -->
  <rect x="140" y="550" width="470" height="50" rx="8" fill="#0f0f1a" stroke="#7C7CF2" stroke-width="2"/>
  <text x="180" y="582" font-family="system-ui" font-size="14" fill="#FFFFFF">Let clients choose their stylist</text>
  <rect x="530" y="563" width="60" height="28" rx="14" fill="#48BB78"/>
  <circle cx="573" cy="577" r="10" fill="#FFFFFF"/>
  
  <!-- No Preference Option -->
  <rect x="140" y="610" width="470" height="50" rx="8" fill="#0f0f1a"/>
  <text x="180" y="642" font-family="system-ui" font-size="14" fill="#FFFFFF">Show "No preference" option</text>
  <rect x="530" y="623" width="60" height="28" rx="14" fill="#48BB78"/>
  <circle cx="573" cy="637" r="10" fill="#FFFFFF"/>
  
  <!-- Show Staff Photos -->
  <rect x="140" y="670" width="470" height="50" rx="8" fill="#0f0f1a"/>
  <text x="180" y="702" font-family="system-ui" font-size="14" fill="#FFFFFF">Show staff photos</text>
  <rect x="530" y="683" width="60" height="28" rx="14" fill="#48BB78"/>
  <circle cx="573" cy="697" r="10" fill="#FFFFFF"/>
  
  <!-- Right Side Preview -->
  <rect x="680" y="210" width="440" height="520" rx="12" fill="#1a1a2e"/>
  <text x="720" y="255" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Staff Selection Preview</text>
  
  <rect x="720" y="280" width="360" height="420" rx="10" fill="#FFFFFF"/>
  
  <!-- Header -->
  <rect x="720" y="280" width="360" height="50" rx="10" fill="#7C7CF2"/>
  <rect x="720" y="320" width="360" height="10" fill="#7C7CF2"/>
  <text x="740" y="313" font-family="system-ui" font-size="12" fill="#FFFFFF">← Select a stylist</text>
  
  <!-- Staff Cards -->
  <text x="755" y="365" font-family="system-ui" font-size="12" font-weight="500" fill="#1a1a2e">Choose your stylist</text>
  
  <!-- No Preference -->
  <rect x="740" y="385" width="320" height="55" rx="8" fill="#F7FAFC" stroke="#7C7CF2" stroke-width="2"/>
  <circle cx="770" cy="413" r="18" fill="#7C7CF2" fill-opacity="0.2"/>
  <text x="762" y="418" font-family="system-ui" font-size="14" fill="#7C7CF2">?</text>
  <text x="800" y="408" font-family="system-ui" font-size="12" font-weight="500" fill="#1a1a2e">No Preference</text>
  <text x="800" y="425" font-family="system-ui" font-size="10" fill="#718096">Let us assign the best available</text>
  
  <!-- Staff 1 -->
  <rect x="740" y="450" width="320" height="70" rx="8" fill="#F7FAFC" stroke="#E2E8F0"/>
  <circle cx="775" cy="485" r="22" fill="#7C7CF2" fill-opacity="0.3"/>
  <text x="765" y="492" font-family="system-ui" font-size="14" font-weight="bold" fill="#7C7CF2">SJ</text>
  <text x="810" y="475" font-family="system-ui" font-size="12" font-weight="500" fill="#1a1a2e">Sarah Johnson</text>
  <text x="810" y="493" font-family="system-ui" font-size="10" fill="#718096">Senior Stylist • $75</text>
  <rect x="810" y="500" width="80" height="14" rx="3" fill="#48BB78" fill-opacity="0.2"/>
  <text x="825" y="510" font-family="system-ui" font-size="8" fill="#48BB78">Available today</text>
  
  <!-- Staff 2 -->
  <rect x="740" y="530" width="320" height="70" rx="8" fill="#F7FAFC" stroke="#E2E8F0"/>
  <circle cx="775" cy="565" r="22" fill="#48BB78" fill-opacity="0.3"/>
  <text x="765" y="572" font-family="system-ui" font-size="14" font-weight="bold" fill="#48BB78">MC</text>
  <text x="810" y="555" font-family="system-ui" font-size="12" font-weight="500" fill="#1a1a2e">Mike Chen</text>
  <text x="810" y="573" font-family="system-ui" font-size="10" fill="#718096">Stylist • $65</text>
  <rect x="810" y="580" width="80" height="14" rx="3" fill="#48BB78" fill-opacity="0.2"/>
  <text x="825" y="590" font-family="system-ui" font-size="8" fill="#48BB78">Available today</text>
  
  <!-- Staff 3 -->
  <rect x="740" y="610" width="320" height="70" rx="8" fill="#F7FAFC" stroke="#E2E8F0"/>
  <circle cx="775" cy="645" r="22" fill="#ED8936" fill-opacity="0.3"/>
  <text x="765" y="652" font-family="system-ui" font-size="14" font-weight="bold" fill="#ED8936">JL</text>
  <text x="810" y="635" font-family="system-ui" font-size="12" font-weight="500" fill="#1a1a2e">Jessica Lee</text>
  <text x="810" y="653" font-family="system-ui" font-size="10" fill="#718096">Junior Stylist • $55</text>
  <rect x="810" y="660" width="90" height="14" rx="3" fill="#ED8936" fill-opacity="0.2"/>
  <text x="822" y="670" font-family="system-ui" font-size="8" fill="#ED8936">Next: Tomorrow</text>
</svg>
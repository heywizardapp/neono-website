<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser Window -->
  <rect width="600" height="400" rx="12" fill="#1a1a2e"/>
  
  <!-- Title Bar -->
  <rect width="600" height="44" rx="12" fill="#252542"/>
  <rect y="32" width="600" height="12" fill="#252542"/>
  
  <!-- Traffic Lights -->
  <circle cx="20" cy="22" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="22" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="22" r="6" fill="#28CA41"/>
  
  <!-- URL Bar -->
  <rect x="100" y="10" width="400" height="24" rx="6" fill="#1a1a2e"/>
  <text x="260" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">app.neono.io/calendar</text>
  
  <!-- Background (dimmed calendar) -->
  <rect x="0" y="44" width="600" height="356" fill="#13131f" fill-opacity="0.95"/>
  
  <!-- Toolbar hint -->
  <rect x="20" y="60" width="560" height="50" rx="8" fill="#1e1e36"/>
  <text x="40" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#9999aa">January 27, 2026</text>
  
  <!-- Staff Dropdown Button -->
  <rect x="300" y="68" width="140" height="34" rx="6" fill="#7C7CF2"/>
  <text x="320" y="91" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#fff">Staff ▼</text>
  
  <!-- Dropdown Menu -->
  <rect x="300" y="108" width="220" height="260" rx="10" fill="#252542"/>
  <rect x="300" y="108" width="220" height="260" rx="10" stroke="#3a3a5a" stroke-width="1"/>
  
  <!-- Search in dropdown -->
  <rect x="312" y="120" width="196" height="32" rx="6" fill="#1a1a2e"/>
  <text x="328" y="141" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666">🔍 Search staff...</text>
  
  <!-- All Staff (Selected) -->
  <rect x="308" y="162" width="204" height="40" rx="6" fill="#7C7CF2" fill-opacity="0.2"/>
  <circle cx="330" cy="182" r="12" fill="#7C7CF2"/>
  <text x="324" y="187" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff">✓</text>
  <text x="352" y="187" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#fff">All Staff</text>
  
  <!-- Divider -->
  <line x1="320" y1="212" x2="500" y2="212" stroke="#3a3a5a" stroke-width="1"/>
  
  <!-- Sarah Martinez -->
  <rect x="308" y="220" width="204" height="40" rx="6" fill="#7C7CF2" fill-opacity="0.1"/>
  <circle cx="330" cy="240" r="12" fill="#E879F9"/>
  <text x="324" y="244" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#fff">SM</text>
  <text x="352" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#fff">Sarah Martinez</text>
  <circle cx="490" cy="240" r="5" fill="#E879F9"/>
  
  <!-- Hover indicator arrow -->
  <path d="M520 240 L535 240 L527.5 232 Z" fill="#7C7CF2"/>
  <text x="540" y="244" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#7C7CF2">Hover</text>
  
  <!-- James Wilson -->
  <circle cx="330" cy="280" r="12" fill="#60A5FA"/>
  <text x="324" y="284" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#fff">JW</text>
  <text x="352" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">James Wilson</text>
  <circle cx="490" cy="280" r="5" fill="#60A5FA"/>
  
  <!-- Emily Brown -->
  <circle cx="330" cy="320" r="12" fill="#34D399"/>
  <text x="324" y="324" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#fff">EB</text>
  <text x="352" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">Emily Brown</text>
  <circle cx="490" cy="320" r="5" fill="#34D399"/>
  
  <!-- Carlos Garcia -->
  <circle cx="330" cy="356" r="12" fill="#FBBF24"/>
  <text x="323" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1a1a2e">CG</text>
  <text x="352" y="361" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">Carlos Garcia</text>
  <circle cx="490" cy="356" r="5" fill="#FBBF24"/>
  
  <!-- Cursor on Sarah -->
  <path d="M295 230 L295 255 L305 248 L310 260 L315 258 L310 246 L318 246 Z" fill="#fff"/>
</svg>
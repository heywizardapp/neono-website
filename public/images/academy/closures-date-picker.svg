  <circle cx="378" cy="365" r="16" fill="#7C7CF2"/>
  <text x="370" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#fff">25</text>
  
  <text x="420" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">26</text>
  <text x="470" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">27</text>
  
  <!-- Quick Options -->
  <rect x="130" y="395" width="90" height="28" rx="6" fill="#7C7CF2"/>
  <text x="152" y="414" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#fff">Single Day</text>
  
  <rect x="230" y="395" width="90" height="28" rx="6" fill="#252542"/>
  <text x="247" y="414" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">Date Range</text>
  
  <rect x="330" y="395" width="90" height="28" rx="6" fill="#252542"/>
  <text x="350" y="414" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">Recurring</text>

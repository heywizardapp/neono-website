  <text x="378" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">4</text>
  <text x="428" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">5</text>
  <text x="478" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">6</text>
  
  <!-- Week 2 -->
  <text x="175" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">7</text>
  <text x="225" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">8</text>
  <text x="278" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">9</text>
  <text x="323" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">10</text>
  <text x="373" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">11</text>
  <text x="423" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">12</text>
  <text x="473" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">13</text>
  
  <!-- Week 3 -->
  <text x="170" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">14</text>
  <text x="220" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">15</text>
  <text x="270" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">16</text>
  <text x="320" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">17</text>
  <text x="370" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">18</text>
  <text x="420" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">19</text>
  <text x="470" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">20</text>
  
  <!-- Week 4 - 25 selected -->
  <text x="170" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">21</text>
  <text x="220" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">22</text>
  <text x="270" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">23</text>
  <text x="320" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">24</text>
  

<svg width="700" height="450" viewBox="0 0 700 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser Window -->
  <rect width="700" height="450" rx="12" fill="#1a1a2e"/>
  
  <!-- Title Bar -->
  <rect width="700" height="44" rx="12" fill="#252542"/>
  <rect y="32" width="700" height="12" fill="#252542"/>
  
  <!-- Traffic Lights -->
  <circle cx="20" cy="22" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="22" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="22" r="6" fill="#28CA41"/>
  
  <!-- URL Bar -->
  <rect x="100" y="10" width="500" height="24" rx="6" fill="#1a1a2e"/>
  <text x="310" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">app.neono.io/settings/closed-periods</text>
  
  <!-- Dimmed Background -->
  <rect x="0" y="44" width="700" height="406" fill="#13131f" fill-opacity="0.8"/>
  
  <!-- Modal Section -->
  <rect x="80" y="60" width="540" height="365" rx="16" fill="#1e1e36"/>
  <rect x="80" y="60" width="540" height="365" rx="16" stroke="#3a3a5a" stroke-width="1"/>
  
  <!-- Header -->
  <text x="350" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#fff" text-anchor="middle">Select Date Range</text>
  
  <!-- Date Fields -->
  <text x="130" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#fff">Start Date</text>
  <rect x="130" y="148" width="200" height="44" rx="8" fill="#252542"/>
  <rect x="130" y="148" width="200" height="44" rx="8" stroke="#7C7CF2" stroke-width="2"/>
  <text x="155" y="176" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#fff">December 25, 2025</text>
  <text x="305" y="176" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">📅</text>
  
  <text x="370" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#fff">End Date</text>
  <rect x="370" y="148" width="200" height="44" rx="8" fill="#252542"/>
  <text x="395" y="176" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#fff">December 25, 2025</text>
  <text x="545" y="176" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">📅</text>
  
  <!-- Calendar Picker -->
  <rect x="130" y="205" width="440" height="180" rx="12" fill="#252542"/>
  
  <!-- Calendar Header -->
  <text x="165" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">&lt;</text>
  <text x="350" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">December 2025</text>
  <text x="530" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">&gt;</text>
  
  <!-- Day Headers -->
  <text x="170" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Sun</text>
  <text x="220" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Mon</text>
  <text x="270" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Tue</text>
  <text x="320" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Wed</text>
  <text x="370" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Thu</text>
  <text x="425" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Fri</text>
  <text x="475" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Sat</text>
  

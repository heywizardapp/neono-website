<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48BB78"/>
      <stop offset="100%" style="stop-color:#38A169"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- Success Modal -->
  <rect x="250" y="120" width="700" height="560" rx="20" fill="#1a1a2e"/>
  
  <!-- Success Header -->
  <rect x="250" y="120" width="700" height="200" rx="20" fill="url(#successGrad)"/>
  <rect x="250" y="300" width="700" height="20" fill="url(#successGrad)"/>
  
  <!-- Checkmark Circle -->
  <circle cx="600" cy="220" r="50" fill="rgba(255,255,255,0.2)"/>
  <circle cx="600" cy="220" r="40" fill="#FFFFFF"/>
  <text x="578" y="235" font-family="system-ui" font-size="40" fill="#48BB78">✓</text>
  
  <!-- Animated rings -->
  <circle cx="600" cy="220" r="60" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2">
    <animate attributeName="r" values="50;70;50" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <text x="460" y="290" font-family="system-ui" font-size="22" font-weight="bold" fill="#FFFFFF">Appointment Booked! 🎉</text>
  
  <!-- Appointment Card -->
  <rect x="300" y="345" width="600" height="140" rx="12" fill="#0f0f1a"/>
  
  <!-- Client Avatar and Info -->
  <circle cx="360" cy="415" r="30" fill="#48BB78" fill-opacity="0.3"/>
  <text x="345" y="425" font-family="system-ui" font-size="18" font-weight="bold" fill="#48BB78">MB</text>
  
  <text x="410" y="390" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Michelle Brown</text>
  <text x="410" y="415" font-family="system-ui" font-size="14" fill="#A0AEC0">✂️ Women's Haircut with Sarah</text>
  <text x="410" y="440" font-family="system-ui" font-size="14" fill="#7C7CF2">📅 Tuesday, Dec 17 • 11:00 AM - 11:45 AM</text>
  <text x="410" y="465" font-family="system-ui" font-size="16" font-weight="bold" fill="#48BB78">$65.00</text>
  
  <!-- Confirmation Number -->
  <rect x="740" y="375" width="140" height="90" rx="8" fill="#7C7CF2" fill-opacity="0.1"/>
  <text x="770" y="405" font-family="system-ui" font-size="10" fill="#718096">CONFIRMATION #</text>
  <text x="770" y="435" font-family="system-ui" font-size="18" font-weight="bold" fill="#7C7CF2">NE-48721</text>
  <text x="770" y="455" font-family="system-ui" font-size="10" fill="#48BB78">✓ Email sent</text>
  
  <!-- Action Buttons -->
  <text x="300" y="520" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">What's next?</text>
  
  <rect x="300" y="540" width="185" height="60" rx="10" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="335" y="570" font-family="system-ui" font-size="12" fill="#A0AEC0">📅 View in Calendar</text>
  <text x="335" y="588" font-family="system-ui" font-size="10" fill="#718096">See on your schedule</text>
  
  <rect x="505" y="540" width="185" height="60" rx="10" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="540" y="570" font-family="system-ui" font-size="12" fill="#A0AEC0">➕ Add Another</text>
  <text x="540" y="588" font-family="system-ui" font-size="10" fill="#718096">Book more services</text>
  
  <rect x="710" y="540" width="185" height="60" rx="10" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="745" y="570" font-family="system-ui" font-size="12" fill="#A0AEC0">👤 Client Profile</text>
  <text x="745" y="588" font-family="system-ui" font-size="10" fill="#718096">View client history</text>
  
  <!-- Pro Tip -->
  <rect x="300" y="620" width="600" height="45" rx="8" fill="#7C7CF2" fill-opacity="0.1"/>
  <text x="330" y="648" font-family="system-ui" font-size="12" fill="#7C7CF2">💡 Pro tip: Set up automated reminders in Settings → Notifications to reduce no-shows!</text>
  
  <!-- Close Button -->
  <rect x="470" y="680" width="260" height="50" rx="10" fill="#7C7CF2"/>
  <text x="555" y="712" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Done</text>
  
  <!-- Confetti effect elements -->
  <circle cx="350" cy="200" r="4" fill="#FFD700">
    <animate attributeName="cy" values="200;350" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="180" r="3" fill="#7C7CF2">
    <animate attributeName="cy" values="180;380" dur="2.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="190" r="4" fill="#48BB78">
    <animate attributeName="cy" values="190;340" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="175" r="3" fill="#FC8181">
    <animate attributeName="cy" values="175;370" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
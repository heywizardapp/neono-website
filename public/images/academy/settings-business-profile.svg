  <text x="312" y="268" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#374151">Business Name</text>
  <rect x="312" y="280" width="576" height="44" rx="8" fill="white" stroke="#d1d5db"/>
  <text x="328" y="308" font-family="system-ui, sans-serif" font-size="14" fill="#111827">Bella Salon & Spa</text>
  
  <!-- Phone Field -->
  <text x="312" y="358" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#374151">Phone Number</text>
  <rect x="312" y="370" width="280" height="44" rx="8" fill="white" stroke="#d1d5db"/>
  <text x="328" y="398" font-family="system-ui, sans-serif" font-size="14" fill="#111827">(416) 555-0123</text>
  
  <!-- Email Field -->
  <text x="608" y="358" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#374151">Email Address</text>
  <rect x="608" y="370" width="280" height="44" rx="8" fill="white" stroke="#d1d5db"/>
  <text x="624" y="398" font-family="system-ui, sans-serif" font-size="14" fill="#111827">hello@bellasalon.com</text>
  
  <!-- Address Field -->
  <text x="312" y="448" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#374151">Street Address</text>
  <rect x="312" y="460" width="576" height="44" rx="8" fill="white" stroke="#d1d5db"/>
  <text x="328" y="488" font-family="system-ui, sans-serif" font-size="14" fill="#111827">123 Queen Street West</text>
  
  <!-- City/Province Row -->
  <text x="312" y="538" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#374151">City</text>
  <rect x="312" y="550" width="180" height="44" rx="8" fill="white" stroke="#d1d5db"/>
  <text x="328" y="578" font-family="system-ui, sans-serif" font-size="14" fill="#111827">Toronto</text>
  
  <text x="508" y="538" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#374151">Province</text>
  <rect x="508" y="550" width="180" height="44" rx="8" fill="white" stroke="#d1d5db"/>
  <text x="524" y="578" font-family="system-ui, sans-serif" font-size="14" fill="#111827">Ontario</text>
  
  <text x="704" y="538" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#374151">Postal Code</text>
  <rect x="704" y="550" width="184" height="44" rx="8" fill="white" stroke="#d1d5db"/>
  <text x="720" y="578" font-family="system-ui, sans-serif" font-size="14" fill="#111827">M5V 2A1</text>
  
  <!-- Save Button -->
  <rect x="312" y="640" width="140" height="48" rx="8" fill="#7C7CF2"/>
  <text x="352" y="670" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Save Changes</text>
  
  <!-- Cancel Button -->
  <rect x="468" y="640" width="100" height="48" rx="8" fill="white" stroke="#d1d5db"/>
  <text x="498" y="670" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Cancel</text>
  
  <!-- Right Sidebar Preview -->
  <rect x="960" y="220" width="200" height="280" rx="12" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="980" y="252" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#64748b">PREVIEW</text>
  
  <!-- Preview Card -->
  <rect x="976" y="272" width="168" height="200" rx="8" fill="white" stroke="#e5e7eb"/>
  <circle cx="1060" cy="312" r="24" fill="#7C7CF2" fill-opacity="0.1"/>
  <text x="1051" y="318" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#7C7CF2">B</text>
  <text x="1016" y="360" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">Bella Salon</text>
  <text x="1020" y="378" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">123 Queen St W</text>
  <text x="1028" y="392" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Toronto, ON</text>

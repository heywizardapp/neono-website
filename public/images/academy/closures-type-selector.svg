<svg width="700" height="350" viewBox="0 0 700 350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser Window -->
  <rect width="700" height="350" rx="12" fill="#1a1a2e"/>
  
  <!-- Title Bar -->
  <rect width="700" height="44" rx="12" fill="#252542"/>
  <rect y="32" width="700" height="12" fill="#252542"/>
  
  <!-- Traffic Lights -->
  <circle cx="20" cy="22" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="22" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="22" r="6" fill="#28CA41"/>
  
  <!-- URL Bar -->
  <rect x="100" y="10" width="500" height="24" rx="6" fill="#1a1a2e"/>
  <text x="310" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">app.neono.io/settings/closed-periods</text>
  
  <!-- Dimmed Background -->
  <rect x="0" y="44" width="700" height="306" fill="#13131f" fill-opacity="0.8"/>
  
  <!-- Modal Section -->
  <rect x="80" y="65" width="540" height="250" rx="16" fill="#1e1e36"/>
  <rect x="80" y="65" width="540" height="250" rx="16" stroke="#3a3a5a" stroke-width="1"/>
  
  <!-- Header -->
  <text x="350" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#fff" text-anchor="middle">Choose Closure Type</text>
  <text x="350" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888" text-anchor="middle">Select who will be affected by this closure</text>
  
  <!-- Option Cards -->
  <!-- Business-wide (Selected) -->
  <rect x="115" y="150" width="235" height="130" rx="12" fill="#7C7CF2" fill-opacity="0.15"/>
  <rect x="115" y="150" width="235" height="130" rx="12" stroke="#7C7CF2" stroke-width="2"/>
  
  <!-- Radio Circle -->
  <circle cx="145" cy="180" r="12" fill="#7C7CF2"/>
  <circle cx="145" cy="180" r="5" fill="#fff"/>
  
  <!-- Icon -->
  <rect x="295" y="165" width="40" height="30" rx="6" fill="#7C7CF2" fill-opacity="0.3"/>
  <text x="306" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="18">🏢</text>
  
  <text x="170" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#fff">Business-wide</text>
  <text x="135" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9999aa">Entire salon closed to all</text>
  <text x="135" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9999aa">bookings during this time.</text>
  
  <text x="135" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7C7CF2">✓ Holidays, renovations, events</text>
  
  <!-- Staff-specific (Unselected) -->
  <rect x="365" y="150" width="235" height="130" rx="12" fill="#252542"/>
  <rect x="365" y="150" width="235" height="130" rx="12" stroke="#3a3a5a" stroke-width="1"/>
  
  <!-- Radio Circle -->
  <circle cx="395" cy="180" r="12" fill="transparent" stroke="#4a4a6a" stroke-width="2"/>
  
  <!-- Icon -->
  <rect x="545" y="165" width="40" height="30" rx="6" fill="#4a4a6a" fill-opacity="0.3"/>
  <text x="556" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="18">👤</text>
  
  <text x="420" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#9999aa">Staff Time Off</text>
  <text x="385" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666">Individual staff member</text>
  <text x="385" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666">unavailable during this time.</text>
  
  <text x="385" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Vacations, sick days, personal</text>
</svg>
<svg width="600" height="500" viewBox="0 0 600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser Window -->
  <rect width="600" height="500" rx="12" fill="#1a1a2e"/>
  
  <!-- Title Bar -->
  <rect width="600" height="44" rx="12" fill="#252542"/>
  <rect y="32" width="600" height="12" fill="#252542"/>
  
  <!-- Traffic Lights -->
  <circle cx="20" cy="22" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="22" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="22" r="6" fill="#28CA41"/>
  
  <!-- URL Bar -->
  <rect x="100" y="10" width="400" height="24" rx="6" fill="#1a1a2e"/>
  <text x="260" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">app.neono.io/settings/resources</text>
  
  <!-- Dimmed Background -->
  <rect x="0" y="44" width="600" height="456" fill="#13131f" fill-opacity="0.8"/>
  
  <!-- Modal Section -->
  <rect x="60" y="65" width="480" height="405" rx="16" fill="#1e1e36"/>
  <rect x="60" y="65" width="480" height="405" rx="16" stroke="#3a3a5a" stroke-width="1"/>
  
  <!-- Header -->
  <text x="100" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#fff">Link to Services</text>
  <text x="100" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888">Select which services require this resource</text>
  
  <!-- Search Field -->
  <rect x="100" y="145" width="380" height="40" rx="8" fill="#252542"/>
  <text x="125" y="171" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#666">🔍 Filter services...</text>
  
  <!-- Select All / Counter -->
  <text x="100" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7C7CF2">Select All</text>
  <text x="175" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">|</text>
  <text x="190" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Deselect All</text>
  <rect x="380" y="195" width="100" height="24" rx="12" fill="#7C7CF2" fill-opacity="0.2"/>
  <text x="395" y="212" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7C7CF2">4 selected</text>
  
  <!-- Nail Services Category -->
  <text x="100" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#888">NAIL SERVICES</text>
  
  <!-- Service 1 - Checked -->
  <rect x="100" y="258" width="380" height="44" rx="8" fill="#7C7CF2" fill-opacity="0.1"/>
  <rect x="116" y="272" width="20" height="20" rx="4" fill="#7C7CF2"/>
  <text x="121" y="287" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#fff">✓</text>
  <text x="150" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#fff">Manicure</text>
  <text x="400" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888" text-anchor="end">30 min</text>
  
  <!-- Service 2 - Checked -->
  <rect x="100" y="308" width="380" height="44" rx="8" fill="#7C7CF2" fill-opacity="0.1"/>
  <rect x="116" y="322" width="20" height="20" rx="4" fill="#7C7CF2"/>
  <text x="121" y="337" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#fff">✓</text>
  <text x="150" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#fff">Pedicure</text>
  <text x="400" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888" text-anchor="end">45 min</text>
  
  <!-- Spa Services Category -->
  <text x="100" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#888">SPA SERVICES</text>
  
  <!-- Service 3 - Unchecked -->
  <rect x="100" y="393" width="380" height="44" rx="8" fill="transparent"/>
  <rect x="116" y="407" width="20" height="20" rx="4" fill="transparent" stroke="#4a4a6a" stroke-width="2"/>
  <text x="150" y="422" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#9999aa">Massage</text>
  <text x="400" y="422" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666" text-anchor="end">60 min</text>
  
  <!-- Service 4 - Unchecked -->
  <rect x="116" y="447" width="20" height="20" rx="4" fill="transparent" stroke="#4a4a6a" stroke-width="2"/>
  <text x="150" y="462" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#9999aa">Facial</text>
  <text x="400" y="462" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666" text-anchor="end">45 min</text>
</svg>
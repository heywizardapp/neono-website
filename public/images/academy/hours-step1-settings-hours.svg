<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- URL Bar -->
  <rect x="200" y="52" width="400" height="24" rx="4" fill="#0B1220"/>
  <text x="220" y="69" font-family="system-ui" font-size="12" fill="#718096">app.neono.io/settings/hours</text>
  
  <!-- Main Content Area -->
  <rect x="60" y="84" width="1080" height="676" fill="#0f0f1a"/>
  
  <!-- Left Sidebar -->
  <rect x="60" y="84" width="220" height="676" fill="#141428"/>
  <text x="100" y="124" font-family="system-ui" font-size="20" font-weight="bold" fill="#7C7CF2">NeonO</text>
  
  <!-- Sidebar Items -->
  <text x="115" y="177" font-family="system-ui" font-size="14" fill="#A0AEC0">Dashboard</text>
  <text x="115" y="225" font-family="system-ui" font-size="14" fill="#A0AEC0">Calendar</text>
  <text x="115" y="273" font-family="system-ui" font-size="14" fill="#A0AEC0">Clients</text>
  <text x="115" y="321" font-family="system-ui" font-size="14" fill="#A0AEC0">Services</text>
  <text x="115" y="369" font-family="system-ui" font-size="14" fill="#A0AEC0">Staff</text>
  
  <!-- Settings - EXPANDED -->
  <rect x="75" y="386" width="190" height="44" rx="8" fill="#7C7CF2" fill-opacity="0.15"/>
  <rect x="72" y="386" width="4" height="44" rx="2" fill="#7C7CF2"/>
  <text x="115" y="413" font-family="system-ui" font-size="14" font-weight="600" fill="#7C7CF2">Settings</text>
  <text x="245" y="413" font-family="system-ui" font-size="10" fill="#7C7CF2">▼</text>
  
  <!-- Settings Submenu -->
  <rect x="90" y="440" width="180" height="180" rx="8" fill="#0f0f1a"/>
  <text x="120" y="470" font-family="system-ui" font-size="13" fill="#A0AEC0">Business Profile</text>
  
  <!-- Business Hours - HIGHLIGHTED -->
  <rect x="100" y="485" width="160" height="32" rx="6" fill="#7C7CF2" fill-opacity="0.2"/>
  <text x="120" y="507" font-family="system-ui" font-size="13" font-weight="500" fill="#7C7CF2">⏰ Business Hours</text>
  
  <text x="120" y="544" font-family="system-ui" font-size="13" fill="#A0AEC0">Payment Methods</text>
  <text x="120" y="581" font-family="system-ui" font-size="13" fill="#A0AEC0">Online Booking</text>
  
  <!-- Main Content -->
  <rect x="300" y="100" width="820" height="640" fill="#0f0f1a"/>
  
  <!-- Page Header -->
  <text x="340" y="150" font-family="system-ui" font-size="28" font-weight="bold" fill="#FFFFFF">Business Hours</text>
  <text x="340" y="175" font-family="system-ui" font-size="14" fill="#718096">Set your regular operating hours and special closures</text>
  
  <!-- Tabs -->
  <rect x="340" y="200" width="140" height="40" rx="8" fill="#7C7CF2"/>
  <text x="370" y="225" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Regular Hours</text>
  
  <rect x="490" y="200" width="120" height="40" rx="8" fill="transparent" stroke="#2D3748"/>
  <text x="518" y="225" font-family="system-ui" font-size="14" fill="#A0AEC0">Holidays</text>
  
  <rect x="620" y="200" width="150" height="40" rx="8" fill="transparent" stroke="#2D3748"/>
  <text x="645" y="225" font-family="system-ui" font-size="14" fill="#A0AEC0">Special Hours</text>
  
  <!-- Hours Grid -->
  <rect x="340" y="260" width="740" height="440" rx="12" fill="#1a1a2e"/>
  
  <!-- Column Headers -->
  <text x="380" y="300" font-family="system-ui" font-size="12" font-weight="600" fill="#718096">DAY</text>
  <text x="520" y="300" font-family="system-ui" font-size="12" font-weight="600" fill="#718096">STATUS</text>
  <text x="640" y="300" font-family="system-ui" font-size="12" font-weight="600" fill="#718096">HOURS</text>
  <text x="920" y="300" font-family="system-ui" font-size="12" font-weight="600" fill="#718096">BREAKS</text>
  
  <line x1="360" y1="320" x2="1060" y2="320" stroke="#2D3748" stroke-width="1"/>
  
  <!-- Monday -->
  <text x="380" y="360" font-family="system-ui" font-size="15" font-weight="500" fill="#FFFFFF">Monday</text>
  <rect x="520" y="340" width="70" height="30" rx="15" fill="#48BB78"/>
  <circle cx="570" cy="355" r="11" fill="#FFFFFF"/>
  <text x="530" y="360" font-family="system-ui" font-size="10" fill="#FFFFFF">Open</text>
  <text x="640" y="360" font-family="system-ui" font-size="14" fill="#A0AEC0">9:00 AM - 7:00 PM</text>
  <text x="920" y="360" font-family="system-ui" font-size="14" fill="#4A5568">No breaks</text>
  
  <!-- Tuesday -->
  <text x="380" y="410" font-family="system-ui" font-size="15" font-weight="500" fill="#FFFFFF">Tuesday</text>
  <rect x="520" y="390" width="70" height="30" rx="15" fill="#48BB78"/>
  <circle cx="570" cy="405" r="11" fill="#FFFFFF"/>
  <text x="530" y="410" font-family="system-ui" font-size="10" fill="#FFFFFF">Open</text>
  <text x="640" y="410" font-family="system-ui" font-size="14" fill="#A0AEC0">9:00 AM - 7:00 PM</text>
  <text x="920" y="410" font-family="system-ui" font-size="14" fill="#4A5568">No breaks</text>
  
  <!-- Wednesday -->
  <text x="380" y="460" font-family="system-ui" font-size="15" font-weight="500" fill="#FFFFFF">Wednesday</text>
  <rect x="520" y="440" width="70" height="30" rx="15" fill="#48BB78"/>
  <circle cx="570" cy="455" r="11" fill="#FFFFFF"/>
  <text x="530" y="460" font-family="system-ui" font-size="10" fill="#FFFFFF">Open</text>
  <text x="640" y="460" font-family="system-ui" font-size="14" fill="#A0AEC0">9:00 AM - 7:00 PM</text>
  <text x="920" y="460" font-family="system-ui" font-size="14" fill="#7C7CF2">12-1 PM</text>
  
  <!-- Thursday -->
  <text x="380" y="510" font-family="system-ui" font-size="15" font-weight="500" fill="#FFFFFF">Thursday</text>
  <rect x="520" y="490" width="70" height="30" rx="15" fill="#48BB78"/>
  <circle cx="570" cy="505" r="11" fill="#FFFFFF"/>
  <text x="530" y="510" font-family="system-ui" font-size="10" fill="#FFFFFF">Open</text>
  <text x="640" y="510" font-family="system-ui" font-size="14" fill="#A0AEC0">9:00 AM - 9:00 PM</text>
  <text x="920" y="510" font-family="system-ui" font-size="14" fill="#4A5568">No breaks</text>
  
  <!-- Friday -->
  <text x="380" y="560" font-family="system-ui" font-size="15" font-weight="500" fill="#FFFFFF">Friday</text>
  <rect x="520" y="540" width="70" height="30" rx="15" fill="#48BB78"/>
  <circle cx="570" cy="555" r="11" fill="#FFFFFF"/>
  <text x="530" y="560" font-family="system-ui" font-size="10" fill="#FFFFFF">Open</text>
  <text x="640" y="560" font-family="system-ui" font-size="14" fill="#A0AEC0">9:00 AM - 8:00 PM</text>
  <text x="920" y="560" font-family="system-ui" font-size="14" fill="#4A5568">No breaks</text>
  
  <!-- Saturday -->
  <text x="380" y="610" font-family="system-ui" font-size="15" font-weight="500" fill="#FFFFFF">Saturday</text>
  <rect x="520" y="590" width="70" height="30" rx="15" fill="#48BB78"/>
  <circle cx="570" cy="605" r="11" fill="#FFFFFF"/>
  <text x="530" y="610" font-family="system-ui" font-size="10" fill="#FFFFFF">Open</text>
  <text x="640" y="610" font-family="system-ui" font-size="14" fill="#A0AEC0">10:00 AM - 5:00 PM</text>
  <text x="920" y="610" font-family="system-ui" font-size="14" fill="#4A5568">No breaks</text>
  
  <!-- Sunday - CLOSED -->
  <text x="380" y="660" font-family="system-ui" font-size="15" font-weight="500" fill="#718096">Sunday</text>
  <rect x="520" y="640" width="70" height="30" rx="15" fill="#4A5568"/>
  <circle cx="540" cy="655" r="11" fill="#718096"/>
  <text x="555" y="660" font-family="system-ui" font-size="10" fill="#718096">Closed</text>
  <text x="640" y="660" font-family="system-ui" font-size="14" fill="#4A5568">—</text>
  <text x="920" y="660" font-family="system-ui" font-size="14" fill="#4A5568">—</text>
</svg>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- Duration Panel -->
  <rect x="150" y="120" width="900" height="560" rx="16" fill="#1a1a2e"/>
  
  <!-- Header -->
  <text x="200" y="175" font-family="system-ui" font-size="22" font-weight="bold" fill="#FFFFFF">Service Duration</text>
  <text x="200" y="200" font-family="system-ui" font-size="14" fill="#718096">How long does this service take?</text>
  
  <!-- Duration Selector -->
  <text x="200" y="260" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Duration</text>
  
  <rect x="200" y="280" width="300" height="56" rx="8" fill="#0f0f1a" stroke="#7C7CF2" stroke-width="2"/>
  <text x="230" y="316" font-family="system-ui" font-size="16" fill="#FFFFFF">45 minutes</text>
  <path d="M475 305 L485 305 L480 315 Z" fill="#7C7CF2"/>
  
  <!-- Dropdown Open -->
  <rect x="200" y="345" width="300" height="300" rx="12" fill="#0f0f1a" stroke="#2D3748"/>
  
  <!-- Duration Options -->
  <rect x="210" y="355" width="280" height="40" rx="6" fill="transparent"/>
  <text x="240" y="382" font-family="system-ui" font-size="14" fill="#A0AEC0">15 minutes</text>
  
  <rect x="210" y="395" width="280" height="40" rx="6" fill="transparent"/>
  <text x="240" y="422" font-family="system-ui" font-size="14" fill="#A0AEC0">30 minutes</text>
  
  <rect x="210" y="435" width="280" height="40" rx="6" fill="#7C7CF2" fill-opacity="0.15"/>
  <text x="240" y="462" font-family="system-ui" font-size="14" font-weight="500" fill="#7C7CF2">45 minutes</text>
  <text x="455" y="462" font-family="system-ui" font-size="14" fill="#7C7CF2">✓</text>
  
  <rect x="210" y="475" width="280" height="40" rx="6" fill="transparent"/>
  <text x="240" y="502" font-family="system-ui" font-size="14" fill="#A0AEC0">1 hour</text>
  
  <rect x="210" y="515" width="280" height="40" rx="6" fill="transparent"/>
  <text x="240" y="542" font-family="system-ui" font-size="14" fill="#A0AEC0">1 hour 15 min</text>
  
  <rect x="210" y="555" width="280" height="40" rx="6" fill="transparent"/>
  <text x="240" y="582" font-family="system-ui" font-size="14" fill="#A0AEC0">1 hour 30 min</text>
  
  <rect x="210" y="595" width="280" height="40" rx="6" fill="transparent"/>
  <text x="240" y="622" font-family="system-ui" font-size="14" fill="#A0AEC0">2 hours</text>
  
  <!-- Right Side - Info Panel -->
  <rect x="540" y="260" width="480" height="320" rx="12" fill="#0f0f1a"/>
  
  <text x="580" y="305" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Duration Tips</text>
  
  <!-- Tip 1 -->
  <rect x="580" y="325" width="420" height="60" rx="8" fill="#1a1a2e"/>
  <text x="610" y="350" font-family="system-ui" font-size="13" fill="#48BB78">✓ Include buffer time</text>
  <text x="610" y="372" font-family="system-ui" font-size="12" fill="#718096">Add 10-15 min for setup/cleanup between clients</text>
  
  <!-- Tip 2 -->
  <rect x="580" y="395" width="420" height="60" rx="8" fill="#1a1a2e"/>
  <text x="610" y="420" font-family="system-ui" font-size="13" fill="#48BB78">✓ Consider processing time</text>
  <text x="610" y="442" font-family="system-ui" font-size="12" fill="#718096">Color services need extra time for processing</text>
  
  <!-- Tip 3 -->
  <rect x="580" y="465" width="420" height="60" rx="8" fill="#1a1a2e"/>
  <text x="610" y="490" font-family="system-ui" font-size="13" fill="#48BB78">✓ Be realistic</text>
  <text x="610" y="512" font-family="system-ui" font-size="12" fill="#718096">Rushing leads to unhappy clients</text>
  
  <!-- Calendar Preview -->
  <text x="580" y="555" font-family="system-ui" font-size="12" fill="#718096">CALENDAR BLOCK PREVIEW</text>
  <rect x="580" y="565" width="420" height="50" rx="6" fill="#7C7CF2" fill-opacity="0.3" stroke="#7C7CF2"/>
  <text x="600" y="585" font-family="system-ui" font-size="12" fill="#FFFFFF">Haircut &amp; Blow Dry</text>
  <text x="600" y="605" font-family="system-ui" font-size="11" fill="#A0AEC0">2:00 PM - 2:45 PM (45 min)</text>
  
  <!-- Navigation -->
  <rect x="750" y="620" width="100" height="44" rx="8" fill="transparent" stroke="#4A5568"/>
  <text x="780" y="648" font-family="system-ui" font-size="14" fill="#A0AEC0">← Back</text>
  
  <rect x="870" y="620" width="120" height="44" rx="8" fill="#7C7CF2"/>
  <text x="905" y="648" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Next →</text>
</svg>
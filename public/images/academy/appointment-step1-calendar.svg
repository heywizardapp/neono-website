<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- URL Bar -->
  <rect x="200" y="52" width="400" height="24" rx="4" fill="#0B1220"/>
  <text x="220" y="69" font-family="system-ui" font-size="12" fill="#718096">app.neono.io/calendar</text>
  
  <!-- Main Content Area -->
  <rect x="60" y="84" width="1080" height="676" fill="#0f0f1a"/>
  
  <!-- Left Sidebar -->
  <rect x="60" y="84" width="220" height="676" fill="#141428"/>
  <text x="100" y="124" font-family="system-ui" font-size="20" font-weight="bold" fill="#7C7CF2">NeonO</text>
  
  <!-- Sidebar Items -->
  <text x="115" y="177" font-family="system-ui" font-size="14" fill="#A0AEC0">Dashboard</text>
  
  <!-- Calendar - HIGHLIGHTED -->
  <rect x="75" y="192" width="190" height="44" rx="8" fill="#7C7CF2" fill-opacity="0.15"/>
  <rect x="72" y="192" width="4" height="44" rx="2" fill="#7C7CF2"/>
  <text x="115" y="219" font-family="system-ui" font-size="14" font-weight="600" fill="#7C7CF2">Calendar</text>
  
  <text x="115" y="273" font-family="system-ui" font-size="14" fill="#A0AEC0">Clients</text>
  <text x="115" y="321" font-family="system-ui" font-size="14" fill="#A0AEC0">Services</text>
  <text x="115" y="369" font-family="system-ui" font-size="14" fill="#A0AEC0">Staff</text>
  <text x="115" y="417" font-family="system-ui" font-size="14" fill="#A0AEC0">Settings</text>
  
  <!-- Main Calendar Content -->
  <rect x="300" y="100" width="820" height="640" fill="#0f0f1a"/>
  
  <!-- Calendar Header -->
  <text x="340" y="140" font-family="system-ui" font-size="24" font-weight="bold" fill="#FFFFFF">December 2024</text>
  
  <!-- View Controls -->
  <rect x="780" y="115" width="80" height="36" rx="6" fill="#7C7CF2"/>
  <text x="800" y="139" font-family="system-ui" font-size="12" font-weight="600" fill="#FFFFFF">Week</text>
  
  <rect x="870" y="115" width="80" height="36" rx="6" fill="transparent" stroke="#4A5568"/>
  <text x="895" y="139" font-family="system-ui" font-size="12" fill="#A0AEC0">Day</text>
  
  <rect x="960" y="115" width="80" height="36" rx="6" fill="transparent" stroke="#4A5568"/>
  <text x="980" y="139" font-family="system-ui" font-size="12" fill="#A0AEC0">Month</text>
  
  <!-- Add Appointment Button -->
  <rect x="340" y="160" width="180" height="44" rx="8" fill="#7C7CF2"/>
  <text x="370" y="188" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">+ New Appointment</text>
  
  <!-- Pulse animation -->
  <rect x="335" y="155" width="190" height="54" rx="10" fill="none" stroke="#7C7CF2" stroke-width="3" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Calendar Grid -->
  <rect x="340" y="220" width="780" height="500" rx="12" fill="#1a1a2e"/>
  
  <!-- Time Column -->
  <rect x="340" y="260" width="70" height="460" fill="#141428"/>
  <text x="355" y="300" font-family="system-ui" font-size="11" fill="#718096">9 AM</text>
  <text x="355" y="365" font-family="system-ui" font-size="11" fill="#718096">10 AM</text>
  <text x="355" y="430" font-family="system-ui" font-size="11" fill="#718096">11 AM</text>
  <text x="355" y="495" font-family="system-ui" font-size="11" fill="#718096">12 PM</text>
  <text x="355" y="560" font-family="system-ui" font-size="11" fill="#718096">1 PM</text>
  <text x="355" y="625" font-family="system-ui" font-size="11" fill="#718096">2 PM</text>
  <text x="355" y="690" font-family="system-ui" font-size="11" fill="#718096">3 PM</text>
  
  <!-- Day Headers -->
  <text x="470" y="250" font-family="system-ui" font-size="12" font-weight="600" fill="#FFFFFF">Mon 16</text>
  <text x="570" y="250" font-family="system-ui" font-size="12" font-weight="600" fill="#7C7CF2">Tue 17</text>
  <circle cx="615" cy="245" r="4" fill="#7C7CF2"/>
  <text x="670" y="250" font-family="system-ui" font-size="12" font-weight="600" fill="#FFFFFF">Wed 18</text>
  <text x="770" y="250" font-family="system-ui" font-size="12" font-weight="600" fill="#FFFFFF">Thu 19</text>
  <text x="870" y="250" font-family="system-ui" font-size="12" font-weight="600" fill="#FFFFFF">Fri 20</text>
  <text x="970" y="250" font-family="system-ui" font-size="12" fill="#718096">Sat 21</text>
  <text x="1050" y="250" font-family="system-ui" font-size="12" fill="#718096">Sun 22</text>
  
  <!-- Grid Lines -->
  <line x1="410" y1="260" x2="410" y2="720" stroke="#2D3748" stroke-width="1"/>
  <line x1="510" y1="260" x2="510" y2="720" stroke="#2D3748" stroke-width="1"/>
  <line x1="610" y1="260" x2="610" y2="720" stroke="#2D3748" stroke-width="1"/>
  <line x1="710" y1="260" x2="710" y2="720" stroke="#2D3748" stroke-width="1"/>
  <line x1="810" y1="260" x2="810" y2="720" stroke="#2D3748" stroke-width="1"/>
  <line x1="910" y1="260" x2="910" y2="720" stroke="#2D3748" stroke-width="1"/>
  <line x1="1010" y1="260" x2="1010" y2="720" stroke="#2D3748" stroke-width="1"/>
  
  <!-- Horizontal Grid Lines -->
  <line x1="410" y1="325" x2="1120" y2="325" stroke="#2D3748" stroke-width="1"/>
  <line x1="410" y1="390" x2="1120" y2="390" stroke="#2D3748" stroke-width="1"/>
  <line x1="410" y1="455" x2="1120" y2="455" stroke="#2D3748" stroke-width="1"/>
  <line x1="410" y1="520" x2="1120" y2="520" stroke="#2D3748" stroke-width="1"/>
  <line x1="410" y1="585" x2="1120" y2="585" stroke="#2D3748" stroke-width="1"/>
  <line x1="410" y1="650" x2="1120" y2="650" stroke="#2D3748" stroke-width="1"/>
  
  <!-- Sample Appointment Block -->
  <rect x="517" y="360" width="85" height="90" rx="6" fill="#48BB78" fill-opacity="0.2" stroke="#48BB78" stroke-width="2"/>
  <text x="530" y="385" font-family="system-ui" font-size="11" font-weight="600" fill="#48BB78">Haircut</text>
  <text x="530" y="405" font-family="system-ui" font-size="10" fill="#48BB78">Michelle B.</text>
  <text x="530" y="425" font-family="system-ui" font-size="9" fill="#48BB78">10:00 - 11:30</text>
  
  <!-- Another Appointment -->
  <rect x="420" y="490" width="85" height="60" rx="6" fill="#ED8936" fill-opacity="0.2" stroke="#ED8936" stroke-width="2"/>
  <text x="433" y="515" font-family="system-ui" font-size="11" font-weight="600" fill="#ED8936">Massage</text>
  <text x="433" y="533" font-family="system-ui" font-size="10" fill="#ED8936">Alex J.</text>
  
  <!-- Current Time Indicator -->
  <line x1="410" y1="420" x2="1120" y2="420" stroke="#FC8181" stroke-width="2"/>
  <circle cx="410" cy="420" r="5" fill="#FC8181"/>
</svg>
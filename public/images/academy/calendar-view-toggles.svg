<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser Window -->
  <rect width="800" height="200" rx="12" fill="#1a1a2e"/>
  
  <!-- Title Bar -->
  <rect width="800" height="44" rx="12" fill="#252542"/>
  <rect y="32" width="800" height="12" fill="#252542"/>
  
  <!-- Traffic Lights -->
  <circle cx="20" cy="22" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="22" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="22" r="6" fill="#28CA41"/>
  
  <!-- URL Bar -->
  <rect x="150" y="10" width="500" height="24" rx="6" fill="#1a1a2e"/>
  <text x="360" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">app.neono.io/calendar</text>
  
  <!-- Toolbar Background -->
  <rect x="0" y="44" width="800" height="156" fill="#1e1e36"/>
  
  <!-- Date Display -->
  <text x="40" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#ffffff">January 27, 2026</text>
  
  <!-- Navigation Arrows -->
  <rect x="250" y="78" width="36" height="36" rx="8" fill="#252542"/>
  <path d="M264 90 L272 96 L264 102" stroke="#9999aa" stroke-width="2" fill="none" transform="rotate(180 268 96)"/>
  
  <rect x="295" y="78" width="36" height="36" rx="8" fill="#252542"/>
  <path d="M309 90 L317 96 L309 102" stroke="#9999aa" stroke-width="2" fill="none"/>
  
  <!-- Today Button -->
  <rect x="345" y="78" width="70" height="36" rx="8" fill="#252542"/>
  <text x="362" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">Today</text>
  
  <!-- View Toggle Group -->
  <rect x="440" y="78" width="180" height="36" rx="8" fill="#252542"/>
  
  <!-- Day Button (inactive) -->
  <text x="460" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#666">Day</text>
  
  <!-- Week Button (active) - with highlight -->
  <rect x="505" y="82" width="55" height="28" rx="6" fill="#7C7CF2"/>
  <text x="517" y="101" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Week</text>
  
  <!-- Highlight Circle around Week -->
  <circle cx="532" cy="96" r="28" fill="none" stroke="#7C7CF2" stroke-width="3" stroke-dasharray="5,3"/>
  
  <!-- Month Button (inactive) -->
  <text x="575" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#666">Month</text>
  
  <!-- Hint Text -->
  <text x="40" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7C7CF2">💡 Switch views to see your schedule differently</text>
  
  <!-- Legend -->
  <rect x="500" y="140" width="260" height="36" rx="6" fill="#13131f"/>
  <rect x="520" y="152" width="12" height="12" rx="2" fill="#666"/>
  <text x="540" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">Inactive</text>
  <rect x="620" y="152" width="12" height="12" rx="2" fill="#7C7CF2"/>
  <text x="640" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">Selected</text>
</svg>
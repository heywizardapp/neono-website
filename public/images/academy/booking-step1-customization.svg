<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- URL Bar -->
  <rect x="200" y="52" width="400" height="24" rx="4" fill="#0B1220"/>
  <text x="220" y="69" font-family="system-ui" font-size="12" fill="#718096">app.neono.io/settings/booking-page</text>
  
  <!-- Main Content Area -->
  <rect x="60" y="84" width="1080" height="676" fill="#0f0f1a"/>
  
  <!-- Left Sidebar -->
  <rect x="60" y="84" width="220" height="676" fill="#141428"/>
  <text x="100" y="124" font-family="system-ui" font-size="20" font-weight="bold" fill="#7C7CF2">NeonO</text>
  
  <!-- Settings Submenu - Expanded -->
  <text x="115" y="177" font-family="system-ui" font-size="14" fill="#A0AEC0">Dashboard</text>
  <text x="115" y="225" font-family="system-ui" font-size="14" fill="#A0AEC0">Calendar</text>
  <text x="115" y="273" font-family="system-ui" font-size="14" fill="#A0AEC0">Services</text>
  
  <text x="115" y="321" font-family="system-ui" font-size="14" fill="#A0AEC0">Settings</text>
  <text x="245" y="321" font-family="system-ui" font-size="10" fill="#718096">▼</text>
  
  <rect x="90" y="340" width="180" height="200" rx="8" fill="#0f0f1a"/>
  <text x="120" y="370" font-family="system-ui" font-size="13" fill="#A0AEC0">Business Profile</text>
  <text x="120" y="407" font-family="system-ui" font-size="13" fill="#A0AEC0">Business Hours</text>
  <text x="120" y="444" font-family="system-ui" font-size="13" fill="#A0AEC0">Payment Methods</text>
  
  <!-- Booking Page - HIGHLIGHTED -->
  <rect x="100" y="455" width="160" height="32" rx="6" fill="#7C7CF2" fill-opacity="0.2"/>
  <text x="120" y="477" font-family="system-ui" font-size="13" font-weight="500" fill="#7C7CF2">🎨 Booking Page</text>
  
  <!-- Main Content -->
  <rect x="300" y="100" width="820" height="640" fill="#0f0f1a"/>
  
  <!-- Page Header -->
  <text x="340" y="150" font-family="system-ui" font-size="28" font-weight="bold" fill="#FFFFFF">Booking Page</text>
  <text x="340" y="175" font-family="system-ui" font-size="14" fill="#718096">Customize your online booking experience</text>
  
  <!-- Booking URL Section -->
  <rect x="340" y="200" width="740" height="80" rx="12" fill="#48BB78" fill-opacity="0.1" stroke="#48BB78"/>
  <text x="380" y="230" font-family="system-ui" font-size="14" font-weight="500" fill="#48BB78">🔗 Your Booking Link</text>
  <rect x="380" y="245" width="400" height="28" rx="6" fill="#0f0f1a"/>
  <text x="400" y="265" font-family="system-ui" font-size="13" fill="#7C7CF2">book.neono.io/bella-salon</text>
  <rect x="800" y="243" width="80" height="32" rx="6" fill="#48BB78"/>
  <text x="820" y="265" font-family="system-ui" font-size="12" fill="#FFFFFF">Copy</text>
  <rect x="890" y="243" width="100" height="32" rx="6" fill="transparent" stroke="#48BB78"/>
  <text x="910" y="265" font-family="system-ui" font-size="12" fill="#48BB78">Preview →</text>
  
  <!-- Customization Tabs -->
  <rect x="340" y="300" width="100" height="40" rx="8" fill="#7C7CF2"/>
  <text x="365" y="325" font-family="system-ui" font-size="13" fill="#FFFFFF">Design</text>
  
  <rect x="450" y="300" width="100" height="40" rx="8" fill="transparent" stroke="#2D3748"/>
  <text x="475" y="325" font-family="system-ui" font-size="13" fill="#A0AEC0">Content</text>
  
  <rect x="560" y="300" width="100" height="40" rx="8" fill="transparent" stroke="#2D3748"/>
  <text x="585" y="325" font-family="system-ui" font-size="13" fill="#A0AEC0">Settings</text>
  
  <!-- Design Options -->
  <rect x="340" y="360" width="380" height="380" rx="12" fill="#1a1a2e"/>
  
  <!-- Theme Color -->
  <text x="370" y="400" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Brand Color</text>
  
  <rect x="370" y="420" width="50" height="50" rx="8" fill="#7C7CF2" stroke="#FFFFFF" stroke-width="3"/>
  <rect x="430" y="420" width="50" height="50" rx="8" fill="#ED8936"/>
  <rect x="490" y="420" width="50" height="50" rx="8" fill="#48BB78"/>
  <rect x="550" y="420" width="50" height="50" rx="8" fill="#E53E3E"/>
  <rect x="610" y="420" width="50" height="50" rx="8" fill="#4299E1"/>
  
  <!-- Custom Color Picker -->
  <rect x="670" y="420" width="30" height="50" rx="6" fill="transparent" stroke="#2D3748" stroke-dasharray="4,2"/>
  <text x="680" y="451" font-family="system-ui" font-size="16" fill="#4A5568">+</text>
  
  <!-- Logo Upload -->
  <text x="370" y="510" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Logo</text>
  <rect x="370" y="530" width="130" height="90" rx="8" fill="#0f0f1a" stroke="#7C7CF2" stroke-dasharray="4,2"/>
  <circle cx="435" cy="565" r="25" fill="#7C7CF2" fill-opacity="0.2"/>
  <text x="420" y="572" font-family="system-ui" font-size="24" fill="#7C7CF2">B</text>
  <text x="400" y="605" font-family="system-ui" font-size="10" fill="#718096">Change</text>
  
  <!-- Cover Image -->
  <text x="520" y="510" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Cover Image</text>
  <rect x="520" y="530" width="180" height="90" rx="8" fill="#0f0f1a"/>
  <rect x="530" y="540" width="160" height="70" rx="6" fill="#2D3748"/>
  <text x="580" y="580" font-family="system-ui" font-size="11" fill="#718096">+ Upload Cover</text>
  
  <!-- Button Style -->
  <text x="370" y="660" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Button Style</text>
  
  <rect x="370" y="680" width="100" height="36" rx="6" fill="#7C7CF2"/>
  <text x="395" y="704" font-family="system-ui" font-size="12" fill="#FFFFFF">Rounded</text>
  
  <rect x="480" y="680" width="100" height="36" rx="2" fill="transparent" stroke="#4A5568"/>
  <text x="510" y="704" font-family="system-ui" font-size="12" fill="#A0AEC0">Square</text>
  
  <rect x="590" y="680" width="100" height="36" rx="18" fill="transparent" stroke="#4A5568"/>
  <text x="625" y="704" font-family="system-ui" font-size="12" fill="#A0AEC0">Pill</text>
  
  <!-- Live Preview -->
  <rect x="740" y="360" width="360" height="380" rx="12" fill="#1a1a2e"/>
  <text x="770" y="400" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Live Preview</text>
  
  <!-- Mini Booking Page Preview -->
  <rect x="770" y="420" width="300" height="300" rx="8" fill="#FFFFFF"/>
  
  <!-- Preview Header -->
  <rect x="770" y="420" width="300" height="60" rx="8" fill="#7C7CF2"/>
  <rect x="770" y="465" width="300" height="15" fill="#7C7CF2"/>
  <circle cx="820" cy="450" r="20" fill="#FFFFFF"/>
  <text x="810" y="457" font-family="system-ui" font-size="16" font-weight="bold" fill="#7C7CF2">B</text>
  <text x="850" y="455" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Bella Salon</text>
  
  <!-- Preview Content -->
  <text x="790" y="510" font-family="system-ui" font-size="12" font-weight="500" fill="#1a1a2e">Select a service</text>
  
  <rect x="790" y="525" width="260" height="50" rx="6" fill="#F7FAFC" stroke="#E2E8F0"/>
  <text x="810" y="550" font-family="system-ui" font-size="11" fill="#1a1a2e">Women's Haircut</text>
  <text x="810" y="565" font-family="system-ui" font-size="10" fill="#718096">45 min • $65</text>
  
  <rect x="790" y="585" width="260" height="50" rx="6" fill="#F7FAFC" stroke="#E2E8F0"/>
  <text x="810" y="610" font-family="system-ui" font-size="11" fill="#1a1a2e">Color Service</text>
  <text x="810" y="625" font-family="system-ui" font-size="10" fill="#718096">2 hr • from $120</text>
  
  <rect x="790" y="650" width="260" height="36" rx="6" fill="#7C7CF2"/>
  <text x="885" y="674" font-family="system-ui" font-size="12" font-weight="600" fill="#FFFFFF">Book Now</text>
</svg>
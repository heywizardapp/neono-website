<svg width="700" height="350" viewBox="0 0 700 350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser Window -->
  <rect width="700" height="350" rx="12" fill="#1a1a2e"/>
  
  <!-- Title Bar -->
  <rect width="700" height="44" rx="12" fill="#252542"/>
  <rect y="32" width="700" height="12" fill="#252542"/>
  
  <!-- Traffic Lights -->
  <circle cx="20" cy="22" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="22" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="22" r="6" fill="#28CA41"/>
  
  <!-- URL Bar -->
  <rect x="100" y="10" width="500" height="24" rx="6" fill="#1a1a2e"/>
  <text x="310" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">app.neono.io/calendar</text>
  
  <!-- Dimmed Background -->
  <rect x="0" y="44" width="700" height="306" fill="#13131f" fill-opacity="0.8"/>
  
  <!-- Modal Section -->
  <rect x="80" y="60" width="540" height="260" rx="16" fill="#1e1e36"/>
  <rect x="80" y="60" width="540" height="260" rx="16" stroke="#3a3a5a" stroke-width="1"/>
  
  <!-- Header -->
  <text x="120" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#fff">Add Appointment Notes</text>
  <text x="120" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Optional - visible to staff only</text>
  
  <!-- Notes Text Area -->
  <rect x="120" y="138" width="460" height="120" rx="8" fill="#252542"/>
  <rect x="120" y="138" width="460" height="120" rx="8" stroke="#7C7CF2" stroke-width="2"/>
  
  <!-- Notes Content -->
  <text x="140" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#fff">Client prefers Sarah for all appointments.</text>
  <text x="140" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#fff">Allergic to ammonia - use ammonia-free products only.</text>
  <text x="140" y="211" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#fff">Requested extra hand massage during manicure.</text>
  
  <!-- Cursor -->
  <rect x="427" y="200" width="2" height="18" fill="#7C7CF2">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Character Count -->
  <text x="540" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666" text-anchor="end">156/500</text>
  
  <!-- Info Badge -->
  <rect x="120" y="268" width="200" height="26" rx="6" fill="#7C7CF2" fill-opacity="0.1"/>
  <text x="140" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7C7CF2">🔒 Internal note - not visible to client</text>
  
  <!-- Buttons -->
  <rect x="400" y="272" width="80" height="32" rx="6" fill="#252542"/>
  <text x="423" y="293" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Skip</text>
  
  <rect x="490" y="272" width="80" height="32" rx="6" fill="#7C7CF2"/>
  <text x="515" y="293" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#fff">Save</text>
</svg>
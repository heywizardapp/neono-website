<svg width="700" height="600" viewBox="0 0 700 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser Window -->
  <rect width="700" height="600" rx="12" fill="#1a1a2e"/>
  
  <!-- Title Bar -->
  <rect width="700" height="44" rx="12" fill="#252542"/>
  <rect y="32" width="700" height="12" fill="#252542"/>
  
  <!-- Traffic Lights -->
  <circle cx="20" cy="22" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="22" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="22" r="6" fill="#28CA41"/>
  
  <!-- URL Bar -->
  <rect x="100" y="10" width="500" height="24" rx="6" fill="#1a1a2e"/>
  <text x="310" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">app.neono.io/calendar</text>
  
  <!-- Dimmed Background -->
  <rect x="0" y="44" width="700" height="556" fill="#13131f" fill-opacity="0.8"/>
  
  <!-- Modal -->
  <rect x="100" y="80" width="500" height="480" rx="16" fill="#1e1e36"/>
  <rect x="100" y="80" width="500" height="480" rx="16" stroke="#3a3a5a" stroke-width="1"/>
  
  <!-- Modal Header -->
  <text x="300" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#fff" text-anchor="middle">New Appointment</text>
  
  <!-- Close Button -->
  <circle cx="570" cy="110" r="16" fill="#252542"/>
  <text x="565" y="116" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#888">×</text>
  
  <!-- Step Indicator -->
  <circle cx="220" cy="165" r="14" fill="#7C7CF2"/>
  <text x="216" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff">1</text>
  <text x="245" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7C7CF2">Client</text>
  
  <line x1="290" y1="165" x2="330" y2="165" stroke="#3a3a5a" stroke-width="2"/>
  
  <circle cx="350" cy="165" r="14" fill="#3a3a5a"/>
  <text x="346" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">2</text>
  <text x="375" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Service</text>
  
  <line x1="430" y1="165" x2="470" y2="165" stroke="#3a3a5a" stroke-width="2"/>
  
  <circle cx="490" cy="165" r="14" fill="#3a3a5a"/>
  <text x="486" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">3</text>
  <text x="515" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Time</text>
  
  <!-- Client Search Field (Active) -->
  <text x="140" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#fff">Search Client</text>
  
  <rect x="140" y="228" width="420" height="48" rx="8" fill="#252542"/>
  <rect x="140" y="228" width="420" height="48" rx="8" stroke="#7C7CF2" stroke-width="2"/>
  
  <text x="170" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#fff">Emma</text>
  <text x="212" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7C7CF2">|</text>
  
  <!-- Search Icon -->
  <circle cx="530" cy="252" r="10" stroke="#888" stroke-width="2" fill="none"/>
  <line x1="537" y1="259" x2="545" y2="267" stroke="#888" stroke-width="2"/>
  
  <!-- Dropdown Results -->
  <rect x="140" y="280" width="420" height="200" rx="8" fill="#252542"/>
  <rect x="140" y="280" width="420" height="200" rx="8" stroke="#3a3a5a" stroke-width="1"/>
  
  <!-- Result 1 (Highlighted) -->
  <rect x="148" y="288" width="404" height="56" rx="6" fill="#7C7CF2" fill-opacity="0.15"/>
  <circle cx="180" cy="316" r="20" fill="#E879F9"/>
  <text x="172" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#fff">EJ</text>
  <text x="212" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#fff">Emma Johnson</text>
  <text x="212" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">emma.j@email.com • (416) 555-0100</text>
  
  <!-- Result 2 -->
  <circle cx="180" cy="372" r="20" fill="#60A5FA"/>
  <text x="172" y="378" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#fff">EW</text>
  <text x="212" y="364" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#9999aa">Emma Williams</text>
  <text x="212" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666">emma.w@email.com • (416) 555-0101</text>
  
  <!-- Divider -->
  <line x1="160" y1="410" x2="540" y2="410" stroke="#3a3a5a" stroke-width="1"/>
  
  <!-- Add New Client Option -->
  <rect x="148" y="420" width="404" height="50" rx="6" fill="transparent"/>
  <circle cx="180" cy="445" r="16" fill="#7C7CF2" fill-opacity="0.2" stroke="#7C7CF2" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="176" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#7C7CF2">+</text>
  <text x="210" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#7C7CF2">Add New Client</text>
  
  <!-- Bottom Buttons -->
  <rect x="140" y="510" width="100" height="40" rx="8" fill="#252542"/>
  <text x="172" y="536" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888">Cancel</text>
  
  <rect x="460" y="510" width="100" height="40" rx="8" fill="#7C7CF2" fill-opacity="0.4"/>
  <text x="493" y="536" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">Next</text>
</svg>
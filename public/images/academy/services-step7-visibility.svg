<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- Visibility Panel -->
  <rect x="150" y="120" width="900" height="560" rx="16" fill="#1a1a2e"/>
  
  <!-- Header -->
  <text x="200" y="175" font-family="system-ui" font-size="22" font-weight="bold" fill="#FFFFFF">Service Visibility</text>
  <text x="200" y="200" font-family="system-ui" font-size="14" fill="#718096">Choose where this service appears</text>
  
  <!-- Visibility Options -->
  <text x="200" y="260" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Visibility</text>
  
  <!-- Online Booking - SELECTED -->
  <rect x="200" y="280" width="400" height="110" rx="12" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2" stroke-width="2"/>
  <circle cx="235" cy="335" r="14" fill="#7C7CF2"/>
  <circle cx="235" cy="335" r="6" fill="#FFFFFF"/>
  <rect x="260" y="300" width="60" height="22" rx="4" fill="#48BB78"/>
  <text x="268" y="315" font-family="system-ui" font-size="10" fill="#FFFFFF">Popular</text>
  <text x="260" y="350" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Online Booking</text>
  <text x="260" y="375" font-family="system-ui" font-size="13" fill="#A0AEC0">Visible to public on your booking page</text>
  
  <!-- In-Store Only -->
  <rect x="200" y="405" width="400" height="110" rx="12" fill="transparent" stroke="#2D3748" stroke-width="1"/>
  <circle cx="235" cy="460" r="14" fill="transparent" stroke="#4A5568" stroke-width="2"/>
  <text x="260" y="450" font-family="system-ui" font-size="16" font-weight="500" fill="#FFFFFF">In-Store Only</text>
  <text x="260" y="475" font-family="system-ui" font-size="13" fill="#718096">Staff can book, but not visible online</text>
  <text x="260" y="498" font-family="system-ui" font-size="12" fill="#4A5568">Good for: Walk-in specials, VIP services</text>
  
  <!-- Private -->
  <rect x="200" y="530" width="400" height="110" rx="12" fill="transparent" stroke="#2D3748" stroke-width="1"/>
  <circle cx="235" cy="585" r="14" fill="transparent" stroke="#4A5568" stroke-width="2"/>
  <text x="260" y="575" font-family="system-ui" font-size="16" font-weight="500" fill="#FFFFFF">Private</text>
  <text x="260" y="600" font-family="system-ui" font-size="13" fill="#718096">Only for specific clients (invite-only)</text>
  <text x="260" y="623" font-family="system-ui" font-size="12" fill="#4A5568">Good for: Test services, exclusive offers</text>
  
  <!-- Right Side - Preview -->
  <rect x="640" y="280" width="380" height="360" rx="12" fill="#0f0f1a"/>
  
  <text x="680" y="325" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Booking Page Preview</text>
  
  <!-- Mock booking page -->
  <rect x="660" y="345" width="340" height="270" rx="8" fill="#1a1a2e" stroke="#2D3748"/>
  
  <!-- Booking page header -->
  <rect x="660" y="345" width="340" height="40" rx="8" fill="#7C7CF2"/>
  <rect x="660" y="373" width="340" height="12" fill="#7C7CF2"/>
  <text x="680" y="373" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Bella Salon</text>
  
  <!-- Service Card in booking -->
  <rect x="680" y="400" width="300" height="80" rx="6" fill="#0f0f1a" stroke="#7C7CF2" stroke-width="1"/>
  <text x="700" y="425" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">✂️ Women's Haircut</text>
  <text x="700" y="448" font-family="system-ui" font-size="12" fill="#718096">45 min • $65</text>
  <text x="700" y="468" font-family="system-ui" font-size="11" fill="#4A5568">Includes shampoo, cut, and blow dry</text>
  <!-- Book button -->
  <rect x="920" y="420" width="50" height="30" rx="4" fill="#7C7CF2"/>
  <text x="930" y="441" font-family="system-ui" font-size="10" fill="#FFFFFF">Book</text>
  
  <!-- Eye icon -->
  <circle cx="830" cy="540" r="20" fill="#48BB78" fill-opacity="0.2"/>
  <text x="823" y="547" font-family="system-ui" font-size="16" fill="#48BB78">👁</text>
  <text x="860" y="545" font-family="system-ui" font-size="12" fill="#48BB78">Visible to clients</text>
  
  <!-- Navigation -->
  <rect x="750" y="620" width="100" height="44" rx="8" fill="transparent" stroke="#4A5568"/>
  <text x="780" y="648" font-family="system-ui" font-size="14" fill="#A0AEC0">← Back</text>
  
  <rect x="870" y="620" width="150" height="44" rx="8" fill="#7C7CF2"/>
  <text x="900" y="648" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Save Service</text>
</svg>
<svg width="1000" height="600" viewBox="0 0 1000 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser Window -->
  <rect width="1000" height="600" rx="12" fill="#1a1a2e"/>
  
  <!-- Title Bar -->
  <rect width="1000" height="48" rx="12" fill="#252542"/>
  <rect y="36" width="1000" height="12" fill="#252542"/>
  
  <!-- Traffic Lights -->
  <circle cx="20" cy="24" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="24" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="24" r="6" fill="#28CA41"/>
  
  <!-- URL Bar -->
  <rect x="150" y="12" width="700" height="24" rx="6" fill="#1a1a2e"/>
  <text x="450" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">app.neono.io/calendar</text>
  
  <!-- Sidebar -->
  <rect x="0" y="48" width="180" height="552" fill="#1e1e36"/>
  
  <!-- Logo -->
  <rect x="16" y="64" width="148" height="36" rx="6" fill="#252542"/>
  <text x="55" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#7C7CF2">NeonO</text>
  
  <!-- Main Content -->
  <rect x="180" y="48" width="820" height="552" fill="#13131f"/>
  
  <!-- Top Toolbar -->
  <rect x="180" y="48" width="820" height="56" fill="#1a1a2e"/>
  
  <!-- Date -->
  <text x="210" y="84" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#fff">January 27, 2026</text>
  
  <!-- View Toggles -->
  <rect x="450" y="66" width="130" height="32" rx="6" fill="#252542"/>
  <text x="467" y="87" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Day</text>
  <rect x="498" y="70" width="40" height="24" rx="4" fill="#7C7CF2"/>
  <text x="506" y="87" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fff">Week</text>
  <text x="548" y="87" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Month</text>
  
  <!-- Staff Filter -->
  <rect x="600" y="66" width="110" height="32" rx="6" fill="#252542"/>
  <text x="620" y="87" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9999aa">All Staff ▼</text>
  
  <!-- NEW APPOINTMENT BUTTON - Main Focus -->
  <rect x="830" y="66" width="150" height="32" rx="6" fill="#7C7CF2"/>
  <text x="853" y="87" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff">+ New Appointment</text>
  
  <!-- Highlight Circle -->
  <circle cx="905" cy="82" r="40" fill="none" stroke="#7C7CF2" stroke-width="3" stroke-dasharray="6,4"/>
  
  <!-- Arrow pointing to button -->
  <path d="M780 140 Q 820 140 850 100" stroke="#EF4444" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444"/>
    </marker>
  </defs>
  
  <!-- Hint text -->
  <rect x="680" y="145" width="180" height="28" rx="6" fill="#EF4444"/>
  <text x="700" y="164" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#fff">Click here to book new!</text>
  
  <!-- Calendar Grid (simplified) -->
  <rect x="180" y="104" width="50" height="496" fill="#1a1a2e"/>
  
  <!-- Time Labels -->
  <text x="195" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666">9 AM</text>
  <text x="192" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666">10 AM</text>
  <text x="192" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666">11 AM</text>
  <text x="192" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666">12 PM</text>
  <text x="195" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666">1 PM</text>
  <text x="195" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666">2 PM</text>
  <text x="195" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666">3 PM</text>
  
  <!-- Day Headers -->
  <rect x="230" y="104" width="770" height="32" fill="#1e1e36"/>
  <text x="310" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7C7CF2" font-weight="600">Mon 27</text>
  <text x="450" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9999aa">Tue 28</text>
  <text x="590" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9999aa">Wed 29</text>
  <text x="730" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9999aa">Thu 30</text>
  <text x="870" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9999aa">Fri 31</text>
  
  <!-- Grid Lines -->
  <line x1="230" y1="170" x2="1000" y2="170" stroke="#252542" stroke-width="1"/>
  <line x1="230" y1="230" x2="1000" y2="230" stroke="#252542" stroke-width="1"/>
  <line x1="230" y1="290" x2="1000" y2="290" stroke="#252542" stroke-width="1"/>
  <line x1="230" y1="350" x2="1000" y2="350" stroke="#252542" stroke-width="1"/>
  <line x1="230" y1="410" x2="1000" y2="410" stroke="#252542" stroke-width="1"/>
  <line x1="230" y1="470" x2="1000" y2="470" stroke="#252542" stroke-width="1"/>
  <line x1="230" y1="530" x2="1000" y2="530" stroke="#252542" stroke-width="1"/>
  
  <line x1="380" y1="136" x2="380" y2="600" stroke="#252542" stroke-width="1"/>
  <line x1="530" y1="136" x2="530" y2="600" stroke="#252542" stroke-width="1"/>
  <line x1="680" y1="136" x2="680" y2="600" stroke="#252542" stroke-width="1"/>
  <line x1="830" y1="136" x2="830" y2="600" stroke="#252542" stroke-width="1"/>
  
  <!-- Today Column Highlight -->
  <rect x="231" y="136" width="148" height="464" fill="#7C7CF2" fill-opacity="0.05"/>
  
  <!-- Sample Appointment -->
  <rect x="245" y="200" width="120" height="75" rx="6" fill="#3B82F6"/>
  <text x="255" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#fff">Emma Johnson</text>
  <text x="255" y="236" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#bfdbfe">Balayage</text>
  <text x="255" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#93c5fd">10:00 - 11:30 AM</text>
</svg>
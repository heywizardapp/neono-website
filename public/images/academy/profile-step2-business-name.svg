<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- URL Bar -->
  <rect x="200" y="52" width="400" height="24" rx="4" fill="#0B1220"/>
  <text x="220" y="69" font-family="system-ui" font-size="12" fill="#718096">app.neono.io/settings/profile</text>
  
  <!-- Main Content Area -->
  <rect x="60" y="84" width="1080" height="676" fill="#0f0f1a"/>
  
  <!-- Zoomed Form Card -->
  <rect x="150" y="130" width="900" height="540" rx="16" fill="#1a1a2e"/>
  
  <!-- Section Header -->
  <text x="200" y="190" font-family="system-ui" font-size="24" font-weight="bold" fill="#FFFFFF">Basic Information</text>
  <rect x="200" y="205" width="80" height="3" rx="2" fill="#7C7CF2"/>
  
  <!-- Business Name Field - FOCUSED -->
  <text x="200" y="270" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Business Name</text>
  <text x="320" y="270" font-family="system-ui" font-size="12" fill="#FC8181">*</text>
  
  <!-- Input Field with Focus State -->
  <rect x="200" y="285" width="700" height="56" rx="8" fill="#0f0f1a" stroke="#7C7CF2" stroke-width="2"/>
  
  <!-- Text inside field -->
  <text x="220" y="320" font-family="system-ui" font-size="16" fill="#FFFFFF">Bella Salon</text>
  
  <!-- Cursor -->
  <rect x="330" y="298" width="2" height="24" fill="#7C7CF2">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Helper text -->
  <text x="200" y="360" font-family="system-ui" font-size="12" fill="#718096">This appears on your booking page, email confirmations, and receipts.</text>
  
  <!-- Where it appears preview -->
  <rect x="200" y="390" width="700" height="120" rx="8" fill="#0f0f1a" fill-opacity="0.5"/>
  <text x="220" y="420" font-family="system-ui" font-size="12" font-weight="500" fill="#7C7CF2">Preview: Where this appears</text>
  
  <!-- Preview items -->
  <rect x="220" y="440" width="200" height="50" rx="6" fill="#1a1a2e"/>
  <text x="240" y="460" font-family="system-ui" font-size="10" fill="#718096">Booking Page</text>
  <text x="240" y="478" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Bella Salon</text>
  
  <rect x="440" y="440" width="200" height="50" rx="6" fill="#1a1a2e"/>
  <text x="460" y="460" font-family="system-ui" font-size="10" fill="#718096">Email Header</text>
  <text x="460" y="478" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Bella Salon</text>
  
  <rect x="660" y="440" width="200" height="50" rx="6" fill="#1a1a2e"/>
  <text x="680" y="460" font-family="system-ui" font-size="10" fill="#718096">Receipt</text>
  <text x="680" y="478" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Bella Salon</text>
  
  <!-- Pro Tip Box -->
  <rect x="200" y="530" width="700" height="70" rx="8" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2" stroke-width="1"/>
  <text x="230" y="560" font-family="system-ui" font-size="14" fill="#7C7CF2">💡 Pro Tip</text>
  <text x="230" y="582" font-family="system-ui" font-size="13" fill="#A0AEC0">Use your legal business name for consistency across invoices and tax documents.</text>
  
  <!-- Character count -->
  <text x="860" y="360" font-family="system-ui" font-size="12" fill="#4A5568">11/100</text>
</svg>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- Description Panel -->
  <rect x="150" y="120" width="900" height="560" rx="16" fill="#1a1a2e"/>
  
  <!-- Header -->
  <text x="200" y="175" font-family="system-ui" font-size="22" font-weight="bold" fill="#FFFFFF">Service Description</text>
  <text x="200" y="200" font-family="system-ui" font-size="14" fill="#718096">Help clients understand what's included</text>
  
  <!-- Description Textarea -->
  <text x="200" y="260" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Description</text>
  <rect x="200" y="280" width="700" height="180" rx="8" fill="#0f0f1a" stroke="#7C7CF2" stroke-width="2"/>
  
  <!-- Text content -->
  <text x="225" y="315" font-family="system-ui" font-size="14" fill="#FFFFFF">Includes shampoo, precision cut, and professional blow dry.</text>
  <text x="225" y="340" font-family="system-ui" font-size="14" fill="#FFFFFF">Perfect for maintaining your style between appointments.</text>
  <text x="225" y="365" font-family="system-ui" font-size="14" fill="#FFFFFF"></text>
  <text x="225" y="390" font-family="system-ui" font-size="14" fill="#FFFFFF">Add deep conditioning treatment for extra shine (+$20).</text>
  
  <!-- Cursor -->
  <rect x="590" y="378" width="2" height="20" fill="#7C7CF2">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Character count -->
  <text x="860" y="440" font-family="system-ui" font-size="12" fill="#4A5568">156/500</text>
  
  <!-- Writing Tips -->
  <rect x="200" y="480" width="700" height="100" rx="8" fill="#7C7CF2" fill-opacity="0.1"/>
  <text x="230" y="510" font-family="system-ui" font-size="14" font-weight="500" fill="#7C7CF2">✏️ Writing Tips</text>
  <text x="230" y="535" font-family="system-ui" font-size="12" fill="#A0AEC0">• Keep it under 2 sentences—clients skim quickly</text>
  <text x="230" y="555" font-family="system-ui" font-size="12" fill="#A0AEC0">• Mention what's included (shampoo, styling, etc.)</text>
  <text x="530" y="535" font-family="system-ui" font-size="12" fill="#A0AEC0">• Highlight any add-ons or upgrades</text>
  <text x="530" y="555" font-family="system-ui" font-size="12" fill="#A0AEC0">• Use simple, friendly language</text>
  
  <!-- Live Preview -->
  <rect x="200" y="600" width="700" height="60" rx="8" fill="#0f0f1a"/>
  <text x="230" y="625" font-family="system-ui" font-size="12" fill="#718096">BOOKING PAGE PREVIEW</text>
  <rect x="400" y="610" width="480" height="40" rx="6" fill="#1a1a2e"/>
  <text x="420" y="635" font-family="system-ui" font-size="13" fill="#A0AEC0">Includes shampoo, precision cut, and professional blow dry...</text>
  
  <!-- Navigation -->
  <rect x="750" y="610" width="100" height="44" rx="8" fill="transparent" stroke="#4A5568"/>
  <text x="780" y="638" font-family="system-ui" font-size="14" fill="#A0AEC0">← Back</text>
  
  <rect x="870" y="610" width="120" height="44" rx="8" fill="#7C7CF2"/>
  <text x="905" y="638" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Next →</text>
</svg>
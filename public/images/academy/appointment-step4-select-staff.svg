<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- Modal -->
  <rect x="150" y="90" width="900" height="620" rx="16" fill="#1a1a2e"/>
  
  <!-- Modal Header -->
  <rect x="150" y="90" width="900" height="70" rx="16" fill="#141428"/>
  <rect x="150" y="144" width="900" height="16" fill="#141428"/>
  <text x="200" y="135" font-family="system-ui" font-size="20" font-weight="bold" fill="#FFFFFF">📅 New Appointment</text>
  <circle cx="1010" cy="125" r="16" fill="#2D3748"/>
  <text x="1005" y="131" font-family="system-ui" font-size="18" fill="#A0AEC0">×</text>
  
  <!-- Progress Steps - Step 3 Active -->
  <rect x="200" y="180" width="800" height="50" rx="10" fill="#0f0f1a"/>
  
  <circle cx="280" cy="205" r="16" fill="#48BB78"/>
  <text x="274" y="211" font-family="system-ui" font-size="12" fill="#FFFFFF">✓</text>
  <text x="255" y="235" font-family="system-ui" font-size="10" fill="#48BB78">Client</text>
  
  <line x1="305" y1="205" x2="395" y2="205" stroke="#48BB78" stroke-width="2"/>
  
  <circle cx="420" cy="205" r="16" fill="#48BB78"/>
  <text x="414" y="211" font-family="system-ui" font-size="12" fill="#FFFFFF">✓</text>
  <text x="395" y="235" font-family="system-ui" font-size="10" fill="#48BB78">Service</text>
  
  <line x1="445" y1="205" x2="535" y2="205" stroke="#48BB78" stroke-width="2"/>
  
  <circle cx="560" cy="205" r="16" fill="#7C7CF2"/>
  <text x="555" y="210" font-family="system-ui" font-size="11" font-weight="bold" fill="#FFFFFF">3</text>
  <text x="545" y="235" font-family="system-ui" font-size="10" fill="#7C7CF2">Staff</text>
  
  <line x1="585" y1="205" x2="675" y2="205" stroke="#4A5568" stroke-width="2"/>
  
  <circle cx="700" cy="205" r="16" fill="#2D3748"/>
  <text x="695" y="210" font-family="system-ui" font-size="11" fill="#718096">4</text>
  <text x="680" y="235" font-family="system-ui" font-size="10" fill="#718096">Time</text>
  
  <line x1="725" y1="205" x2="815" y2="205" stroke="#4A5568" stroke-width="2"/>
  
  <circle cx="840" cy="205" r="16" fill="#2D3748"/>
  <text x="835" y="210" font-family="system-ui" font-size="11" fill="#718096">5</text>
  <text x="815" y="235" font-family="system-ui" font-size="10" fill="#718096">Confirm</text>
  
  <!-- Summary Badges -->
  <rect x="200" y="255" width="200" height="36" rx="6" fill="#48BB78" fill-opacity="0.1"/>
  <text x="220" y="279" font-family="system-ui" font-size="13" fill="#48BB78">✓ Michelle Brown</text>
  
  <rect x="420" y="255" width="240" height="36" rx="6" fill="#7C7CF2" fill-opacity="0.1"/>
  <text x="440" y="279" font-family="system-ui" font-size="13" fill="#7C7CF2">✓ Women's Haircut • $65</text>
  
  <!-- Staff Selection -->
  <text x="200" y="330" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Select Staff Member</text>
  <text x="200" y="355" font-family="system-ui" font-size="12" fill="#718096">Who will perform this service?</text>
  
  <!-- Any Available Option -->
  <rect x="200" y="380" width="800" height="70" rx="10" fill="#0f0f1a" stroke="#2D3748"/>
  <circle cx="250" cy="415" r="22" fill="#48BB78" fill-opacity="0.2"/>
  <text x="237" y="423" font-family="system-ui" font-size="18" fill="#48BB78">🎲</text>
  <text x="290" y="408" font-family="system-ui" font-size="15" font-weight="500" fill="#FFFFFF">Any Available Staff</text>
  <text x="290" y="430" font-family="system-ui" font-size="12" fill="#718096">Let us choose the next available team member</text>
  
  <!-- Staff Cards -->
  <text x="200" y="485" font-family="system-ui" font-size="14" font-weight="500" fill="#A0AEC0">Available Staff</text>
  
  <!-- Staff 1 - Selected -->
  <rect x="200" y="505" width="380" height="100" rx="10" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2" stroke-width="2"/>
  <circle cx="255" cy="555" r="30" fill="#7C7CF2" fill-opacity="0.3"/>
  <text x="244" y="563" font-family="system-ui" font-size="16" font-weight="bold" fill="#7C7CF2">S</text>
  <text x="300" y="540" font-family="system-ui" font-size="15" font-weight="600" fill="#FFFFFF">Sarah</text>
  <text x="340" y="540" font-family="system-ui" font-size="12" fill="#A0AEC0">Senior Stylist</text>
  <text x="300" y="562" font-family="system-ui" font-size="12" fill="#718096">⭐ 4.9 • 156 reviews</text>
  <text x="300" y="585" font-family="system-ui" font-size="11" fill="#48BB78">● Available today</text>
  <circle cx="550" cy="555" r="14" fill="#7C7CF2"/>
  <text x="545" y="561" font-family="system-ui" font-size="12" fill="#FFFFFF">✓</text>
  
  <!-- Animation for selected staff -->
  <rect x="195" y="500" width="390" height="110" rx="12" fill="none" stroke="#7C7CF2" stroke-width="2" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Staff 2 -->
  <rect x="600" y="505" width="380" height="100" rx="10" fill="#0f0f1a" stroke="#2D3748"/>
  <circle cx="655" cy="555" r="30" fill="#ED8936" fill-opacity="0.3"/>
  <text x="643" y="563" font-family="system-ui" font-size="16" font-weight="bold" fill="#ED8936">J</text>
  <text x="700" y="540" font-family="system-ui" font-size="15" font-weight="600" fill="#FFFFFF">James</text>
  <text x="750" y="540" font-family="system-ui" font-size="12" fill="#A0AEC0">Stylist</text>
  <text x="700" y="562" font-family="system-ui" font-size="12" fill="#718096">⭐ 4.7 • 89 reviews</text>
  <text x="700" y="585" font-family="system-ui" font-size="11" fill="#48BB78">● Available today</text>
  
  <!-- Staff 3 -->
  <rect x="200" y="620" width="380" height="70" rx="10" fill="#0f0f1a" stroke="#2D3748"/>
  <circle cx="255" cy="655" r="24" fill="#FC8181" fill-opacity="0.3"/>
  <text x="244" y="663" font-family="system-ui" font-size="14" font-weight="bold" fill="#FC8181">M</text>
  <text x="295" y="650" font-family="system-ui" font-size="15" font-weight="600" fill="#FFFFFF">Maria</text>
  <text x="345" y="650" font-family="system-ui" font-size="12" fill="#A0AEC0">Junior Stylist</text>
  <text x="295" y="672" font-family="system-ui" font-size="11" fill="#ED8936">● Next available: 3:00 PM</text>
  
  <!-- Action Buttons -->
  <rect x="820" y="630" width="80" height="44" rx="8" fill="transparent" stroke="#4A5568"/>
  <text x="843" y="658" font-family="system-ui" font-size="13" fill="#A0AEC0">Back</text>
  
  <rect x="910" y="630" width="80" height="44" rx="8" fill="#7C7CF2"/>
  <text x="928" y="658" font-family="system-ui" font-size="13" font-weight="600" fill="#FFFFFF">Next</text>
</svg>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
    <filter id="modalShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- Modal -->
  <rect x="200" y="100" width="800" height="600" rx="16" fill="#1a1a2e" filter="url(#modalShadow)"/>
  
  <!-- Modal Header -->
  <rect x="200" y="100" width="800" height="70" rx="16" fill="#141428"/>
  <rect x="200" y="154" width="800" height="16" fill="#141428"/>
  <text x="250" y="145" font-family="system-ui" font-size="20" font-weight="bold" fill="#FFFFFF">Add Team Member</text>
  
  <!-- Close button -->
  <circle cx="960" cy="135" r="16" fill="#2D3748"/>
  <text x="955" y="141" font-family="system-ui" font-size="18" fill="#A0AEC0">×</text>
  
  <!-- Tabs -->
  <rect x="250" y="190" width="100" height="36" rx="6" fill="#7C7CF2"/>
  <text x="270" y="214" font-family="system-ui" font-size="13" font-weight="500" fill="#FFFFFF">Basic Info</text>
  
  <rect x="360" y="190" width="100" height="36" rx="6" fill="transparent"/>
  <text x="384" y="214" font-family="system-ui" font-size="13" fill="#718096">Services</text>
  
  <rect x="470" y="190" width="100" height="36" rx="6" fill="transparent"/>
  <text x="486" y="214" font-family="system-ui" font-size="13" fill="#718096">Availability</text>
  
  <!-- Form Content -->
  <!-- Full Name -->
  <text x="250" y="270" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Full Name</text>
  <text x="320" y="270" font-family="system-ui" font-size="12" fill="#FC8181">*</text>
  <rect x="250" y="285" width="700" height="52" rx="8" fill="#0f0f1a" stroke="#7C7CF2" stroke-width="2"/>
  <text x="275" y="318" font-family="system-ui" font-size="15" fill="#FFFFFF">Sarah Johnson</text>
  <rect x="390" y="298" width="2" height="24" fill="#7C7CF2">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Email -->
  <text x="250" y="365" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Email Address</text>
  <text x="350" y="365" font-family="system-ui" font-size="12" fill="#FC8181">*</text>
  <rect x="250" y="380" width="340" height="52" rx="8" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="275" y="413" font-family="system-ui" font-size="15" fill="#FFFFFF">sarah@bellasalon.com</text>
  <text x="250" y="450" font-family="system-ui" font-size="11" fill="#718096">Used for login and notifications</text>
  
  <!-- Phone -->
  <text x="610" y="365" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Phone Number</text>
  <rect x="710" y="353" width="60" height="20" rx="4" fill="#2D3748"/>
  <text x="720" y="367" font-family="system-ui" font-size="10" fill="#718096">Optional</text>
  <rect x="610" y="380" width="340" height="52" rx="8" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="635" y="413" font-family="system-ui" font-size="15" fill="#A0AEC0">(416) 555-0199</text>
  
  <!-- Job Title -->
  <text x="250" y="495" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Job Title</text>
  <text x="320" y="495" font-family="system-ui" font-size="12" fill="#FC8181">*</text>
  <rect x="250" y="510" width="340" height="52" rx="8" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="275" y="543" font-family="system-ui" font-size="15" fill="#FFFFFF">Senior Stylist</text>
  <text x="250" y="580" font-family="system-ui" font-size="11" fill="#718096">Displayed to clients on booking page</text>
  
  <!-- Role Selector (showing preview) -->
  <text x="610" y="495" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Role</text>
  <text x="645" y="495" font-family="system-ui" font-size="12" fill="#FC8181">*</text>
  <rect x="610" y="510" width="340" height="52" rx="8" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="635" y="543" font-family="system-ui" font-size="15" fill="#FFFFFF">Stylist</text>
  <path d="M925 538 L935 538 L930 546 Z" fill="#718096"/>
  
  <!-- Pro Tip -->
  <rect x="250" y="610" width="700" height="50" rx="8" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2" stroke-width="1"/>
  <text x="280" y="640" font-family="system-ui" font-size="13" fill="#7C7CF2">💡 Pro Tip: Use professional titles clients recognize—"Color Specialist" sounds better than "Colorist Level 2."</text>
  
  <!-- Progress indicator -->
  <text x="250" y="680" font-family="system-ui" font-size="12" fill="#718096">Step 1 of 3</text>
  <rect x="330" y="670" width="200" height="4" rx="2" fill="#2D3748"/>
  <rect x="330" y="670" width="66" height="4" rx="2" fill="#7C7CF2"/>
</svg>
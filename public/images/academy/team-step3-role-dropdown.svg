<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
    <filter id="modalShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- Zoomed Role Section -->
  <rect x="150" y="120" width="900" height="560" rx="16" fill="#1a1a2e" filter="url(#modalShadow)"/>
  
  <!-- Header -->
  <text x="200" y="175" font-family="system-ui" font-size="22" font-weight="bold" fill="#FFFFFF">Select Role &amp; Permissions</text>
  <text x="200" y="200" font-family="system-ui" font-size="14" fill="#718096">Choose what this team member can access</text>
  
  <!-- Role Selector Field -->
  <text x="200" y="250" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Role</text>
  <rect x="200" y="265" width="400" height="52" rx="8" fill="#0f0f1a" stroke="#7C7CF2" stroke-width="2"/>
  <text x="225" y="298" font-family="system-ui" font-size="15" fill="#FFFFFF">Stylist</text>
  <path d="M575 288 L585 288 L580 298 Z" fill="#7C7CF2"/>
  
  <!-- Dropdown Expanded -->
  <rect x="200" y="325" width="400" height="280" rx="12" fill="#0f0f1a" stroke="#2D3748"/>
  
  <!-- Owner Option -->
  <rect x="210" y="335" width="380" height="60" rx="8" fill="transparent"/>
  <circle cx="240" cy="365" r="16" fill="#805AD5" fill-opacity="0.2"/>
  <text x="232" y="370" font-family="system-ui" font-size="12" fill="#805AD5">👑</text>
  <text x="270" y="358" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Owner</text>
  <text x="270" y="378" font-family="system-ui" font-size="12" fill="#718096">Full access to everything</text>
  
  <!-- Manager Option -->
  <rect x="210" y="400" width="380" height="60" rx="8" fill="transparent"/>
  <circle cx="240" cy="430" r="16" fill="#3182CE" fill-opacity="0.2"/>
  <text x="232" y="435" font-family="system-ui" font-size="12" fill="#3182CE">📊</text>
  <text x="270" y="423" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Manager</text>
  <text x="270" y="443" font-family="system-ui" font-size="12" fill="#718096">Manage staff, view reports</text>
  
  <!-- Stylist Option - SELECTED -->
  <rect x="210" y="465" width="380" height="60" rx="8" fill="#7C7CF2" fill-opacity="0.15" stroke="#7C7CF2" stroke-width="2"/>
  <circle cx="240" cy="495" r="16" fill="#48BB78" fill-opacity="0.2"/>
  <text x="232" y="500" font-family="system-ui" font-size="12" fill="#48BB78">✂️</text>
  <text x="270" y="488" font-family="system-ui" font-size="14" font-weight="600" fill="#7C7CF2">Stylist</text>
  <text x="270" y="508" font-family="system-ui" font-size="12" fill="#A0AEC0">Manage own bookings and clients</text>
  <!-- Checkmark -->
  <circle cx="565" cy="495" r="12" fill="#7C7CF2"/>
  <text x="560" y="500" font-family="system-ui" font-size="12" fill="#FFFFFF">✓</text>
  
  <!-- Receptionist Option -->
  <rect x="210" y="530" width="380" height="60" rx="8" fill="transparent"/>
  <circle cx="240" cy="560" r="16" fill="#ED8936" fill-opacity="0.2"/>
  <text x="232" y="565" font-family="system-ui" font-size="12" fill="#ED8936">📅</text>
  <text x="270" y="553" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Receptionist</text>
  <text x="270" y="573" font-family="system-ui" font-size="12" fill="#718096">Manage bookings for all staff</text>
  
  <!-- Right side - Permissions Preview -->
  <rect x="640" y="250" width="380" height="350" rx="12" fill="#0f0f1a"/>
  <text x="680" y="295" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Stylist Permissions</text>
  
  <!-- Permission items -->
  <rect x="660" y="315" width="340" height="40" rx="6" fill="#1a1a2e"/>
  <text x="685" y="340" font-family="system-ui" font-size="12" fill="#48BB78">✓</text>
  <text x="710" y="340" font-family="system-ui" font-size="13" fill="#FFFFFF">View own calendar</text>
  
  <rect x="660" y="365" width="340" height="40" rx="6" fill="#1a1a2e"/>
  <text x="685" y="390" font-family="system-ui" font-size="12" fill="#48BB78">✓</text>
  <text x="710" y="390" font-family="system-ui" font-size="13" fill="#FFFFFF">Manage own appointments</text>
  
  <rect x="660" y="415" width="340" height="40" rx="6" fill="#1a1a2e"/>
  <text x="685" y="440" font-family="system-ui" font-size="12" fill="#48BB78">✓</text>
  <text x="710" y="440" font-family="system-ui" font-size="13" fill="#FFFFFF">View assigned clients</text>
  
  <rect x="660" y="465" width="340" height="40" rx="6" fill="#1a1a2e"/>
  <text x="685" y="490" font-family="system-ui" font-size="12" fill="#48BB78">✓</text>
  <text x="710" y="490" font-family="system-ui" font-size="13" fill="#FFFFFF">Process checkout</text>
  
  <rect x="660" y="515" width="340" height="40" rx="6" fill="#1a1a2e"/>
  <text x="685" y="540" font-family="system-ui" font-size="12" fill="#718096">✗</text>
  <text x="710" y="540" font-family="system-ui" font-size="13" fill="#718096">View financial reports</text>
  
  <!-- Continue Button -->
  <rect x="780" y="620" width="200" height="48" rx="8" fill="#7C7CF2"/>
  <text x="845" y="650" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Continue →</text>
</svg>
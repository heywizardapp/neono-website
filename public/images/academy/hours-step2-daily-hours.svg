<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- Edit Hours Modal -->
  <rect x="150" y="100" width="900" height="600" rx="16" fill="#1a1a2e"/>
  
  <!-- Modal Header -->
  <rect x="150" y="100" width="900" height="70" rx="16" fill="#141428"/>
  <rect x="150" y="154" width="900" height="16" fill="#141428"/>
  <text x="200" y="145" font-family="system-ui" font-size="20" font-weight="bold" fill="#FFFFFF">Edit Thursday Hours</text>
  <circle cx="1010" cy="135" r="16" fill="#2D3748"/>
  <text x="1005" y="141" font-family="system-ui" font-size="18" fill="#A0AEC0">×</text>
  
  <!-- Open/Closed Toggle -->
  <text x="200" y="210" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Status</text>
  <rect x="200" y="225" width="300" height="50" rx="8" fill="#0f0f1a"/>
  <rect x="210" y="232" width="90" height="36" rx="6" fill="#48BB78"/>
  <text x="235" y="256" font-family="system-ui" font-size="13" font-weight="500" fill="#FFFFFF">Open</text>
  <rect x="310" y="232" width="90" height="36" rx="6" fill="transparent"/>
  <text x="330" y="256" font-family="system-ui" font-size="13" fill="#718096">Closed</text>
  
  <!-- Hours Selection -->
  <text x="200" y="310" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Operating Hours</text>
  
  <rect x="200" y="330" width="380" height="180" rx="12" fill="#0f0f1a" stroke="#7C7CF2" stroke-width="2"/>
  
  <!-- Opening Time -->
  <text x="230" y="365" font-family="system-ui" font-size="13" fill="#718096">Opening Time</text>
  <rect x="230" y="380" width="150" height="50" rx="8" fill="#1a1a2e" stroke="#2D3748"/>
  <text x="260" y="412" font-family="system-ui" font-size="18" font-weight="500" fill="#FFFFFF">9:00</text>
  <rect x="330" y="390" width="40" height="30" rx="4" fill="#7C7CF2"/>
  <text x="340" y="411" font-family="system-ui" font-size="12" fill="#FFFFFF">AM</text>
  
  <!-- Closing Time -->
  <text x="400" y="365" font-family="system-ui" font-size="13" fill="#718096">Closing Time</text>
  <rect x="400" y="380" width="150" height="50" rx="8" fill="#1a1a2e" stroke="#7C7CF2" stroke-width="2"/>
  <text x="430" y="412" font-family="system-ui" font-size="18" font-weight="500" fill="#FFFFFF">9:00</text>
  <rect x="500" y="390" width="40" height="30" rx="4" fill="#7C7CF2"/>
  <text x="510" y="411" font-family="system-ui" font-size="12" fill="#FFFFFF">PM</text>
  
  <!-- Late Night Toggle -->
  <rect x="230" y="450" width="330" height="45" rx="8" fill="#ED8936" fill-opacity="0.1"/>
  <text x="260" y="479" font-family="system-ui" font-size="13" fill="#ED8936">🌙 Enable late-night hours (after midnight)?</text>
  
  <!-- Time Presets -->
  <rect x="600" y="330" width="400" height="180" rx="12" fill="#0f0f1a"/>
  <text x="630" y="365" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Quick Presets</text>
  
  <rect x="630" y="385" width="160" height="40" rx="6" fill="#2D3748"/>
  <text x="665" y="411" font-family="system-ui" font-size="13" fill="#A0AEC0">9 AM - 5 PM</text>
  
  <rect x="810" y="385" width="160" height="40" rx="6" fill="#2D3748"/>
  <text x="845" y="411" font-family="system-ui" font-size="13" fill="#A0AEC0">9 AM - 7 PM</text>
  
  <rect x="630" y="435" width="160" height="40" rx="6" fill="#7C7CF2"/>
  <text x="665" y="461" font-family="system-ui" font-size="13" font-weight="500" fill="#FFFFFF">9 AM - 9 PM</text>
  
  <rect x="810" y="435" width="160" height="40" rx="6" fill="#2D3748"/>
  <text x="833" y="461" font-family="system-ui" font-size="13" fill="#A0AEC0">10 AM - 6 PM</text>
  
  <!-- Apply to multiple days -->
  <rect x="200" y="530" width="800" height="70" rx="12" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2" stroke-dasharray="4,2"/>
  <text x="240" y="560" font-family="system-ui" font-size="14" font-weight="500" fill="#7C7CF2">📋 Apply these hours to multiple days?</text>
  
  <rect x="240" y="575" width="30" height="18" rx="4" fill="#2D3748"/>
  <text x="248" y="588" font-family="system-ui" font-size="10" fill="#A0AEC0">M</text>
  <rect x="275" y="575" width="30" height="18" rx="4" fill="#2D3748"/>
  <text x="284" y="588" font-family="system-ui" font-size="10" fill="#A0AEC0">T</text>
  <rect x="310" y="575" width="30" height="18" rx="4" fill="#2D3748"/>
  <text x="319" y="588" font-family="system-ui" font-size="10" fill="#A0AEC0">W</text>
  <rect x="345" y="575" width="30" height="18" rx="4" fill="#7C7CF2"/>
  <text x="354" y="588" font-family="system-ui" font-size="10" fill="#FFFFFF">T</text>
  <rect x="380" y="575" width="30" height="18" rx="4" fill="#2D3748"/>
  <text x="390" y="588" font-family="system-ui" font-size="10" fill="#A0AEC0">F</text>
  <rect x="415" y="575" width="30" height="18" rx="4" fill="#2D3748"/>
  <text x="425" y="588" font-family="system-ui" font-size="10" fill="#A0AEC0">S</text>
  <rect x="450" y="575" width="30" height="18" rx="4" fill="#4A5568"/>
  <text x="458" y="588" font-family="system-ui" font-size="10" fill="#718096">S</text>
  
  <!-- Navigation -->
  <rect x="800" y="620" width="100" height="44" rx="8" fill="transparent" stroke="#4A5568"/>
  <text x="830" y="648" font-family="system-ui" font-size="14" fill="#A0AEC0">Cancel</text>
  
  <rect x="920" y="620" width="100" height="44" rx="8" fill="#7C7CF2"/>
  <text x="952" y="648" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Save</text>
</svg>
  <text x="176" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#fff">27</text>
  
  <text x="216" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">28</text>
  <text x="252" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">29</text>

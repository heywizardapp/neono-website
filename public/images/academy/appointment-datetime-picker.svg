  <text x="176" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4a4a6a">13</text>
  <text x="216" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4a4a6a">14</text>
  <text x="252" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4a4a6a">15</text>
  <text x="288" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4a4a6a">16</text>
  <text x="324" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4a4a6a">17</text>
  <text x="360" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4a4a6a">18</text>
  
  <!-- Week 4 -->
  <text x="140" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4a4a6a">19</text>
  <text x="176" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4a4a6a">20</text>
  <text x="216" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4a4a6a">21</text>
  <text x="252" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4a4a6a">22</text>
  <text x="288" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4a4a6a">23</text>

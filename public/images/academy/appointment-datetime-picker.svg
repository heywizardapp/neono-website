  <rect x="610" y="170" width="70" height="36" rx="6" fill="#1e1e36" fill-opacity="0.5"/>
  <text x="645" y="193" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#4a4a6a" text-anchor="middle">10:00 AM</text>
  
  <!-- Row 2 -->
  <rect x="450" y="215" width="70" height="36" rx="6" fill="#1e1e36"/>
  <text x="485" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9999aa" text-anchor="middle">10:30 AM</text>
  
  <rect x="530" y="215" width="70" height="36" rx="6" fill="#1e1e36"/>
  <text x="565" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9999aa" text-anchor="middle">11:00 AM</text>
  
  <rect x="610" y="215" width="70" height="36" rx="6" fill="#1e1e36" fill-opacity="0.5"/>
  <text x="645" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#4a4a6a" text-anchor="middle">11:30 AM</text>
  
  <!-- Row 3 -->
  <rect x="450" y="260" width="70" height="36" rx="6" fill="#1e1e36"/>
  <text x="485" y="283" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9999aa" text-anchor="middle">1:00 PM</text>
  
  <rect x="530" y="260" width="70" height="36" rx="6" fill="#1e1e36"/>
  <text x="565" y="283" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9999aa" text-anchor="middle">1:30 PM</text>
  
  <!-- Selected time slot -->
  <rect x="610" y="260" width="70" height="36" rx="6" fill="#7C7CF2"/>
  <text x="645" y="283" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#fff" text-anchor="middle">2:00 PM</text>
  
  <!-- Row 4 -->
  <rect x="450" y="305" width="70" height="36" rx="6" fill="#1e1e36"/>
  <text x="485" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9999aa" text-anchor="middle">2:30 PM</text>
  
  <rect x="530" y="305" width="70" height="36" rx="6" fill="#1e1e36"/>
  <text x="565" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9999aa" text-anchor="middle">3:00 PM</text>
  
  <rect x="610" y="305" width="70" height="36" rx="6" fill="#1e1e36"/>
  <text x="645" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9999aa" text-anchor="middle">3:30 PM</text>
  
  <!-- Duration Info -->
  <rect x="450" y="355" width="230" height="36" rx="8" fill="#10B981" fill-opacity="0.1"/>
  <text x="565" y="378" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#10B981" text-anchor="middle">2:00 PM - 2:30 PM (30 min)</text>
  
  <!-- Bottom Buttons -->
  <rect x="110" y="420" width="100" height="38" rx="8" fill="#252542"/>
  <text x="142" y="444" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888">Back</text>
  
  <rect x="580" y="420" width="120" height="38" rx="8" fill="#7C7CF2"/>
  <text x="608" y="444" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#fff">Confirm</text>
</svg>
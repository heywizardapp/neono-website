<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- URL Bar -->
  <rect x="200" y="52" width="400" height="24" rx="4" fill="#0B1220"/>
  <text x="220" y="69" font-family="system-ui" font-size="12" fill="#718096">app.neono.io/settings/profile</text>
  
  <!-- Main Content Area -->
  <rect x="60" y="84" width="1080" height="676" fill="#0f0f1a"/>
  
  <!-- Zoomed Form Card -->
  <rect x="100" y="110" width="620" height="560" rx="16" fill="#1a1a2e"/>
  
  <!-- Section Header -->
  <text x="140" y="160" font-family="system-ui" font-size="24" font-weight="bold" fill="#FFFFFF">Business Location</text>
  <rect x="140" y="175" width="80" height="3" rx="2" fill="#7C7CF2"/>
  
  <!-- Street Address -->
  <text x="140" y="220" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Street Address</text>
  <rect x="140" y="235" width="540" height="48" rx="8" fill="#0f0f1a" stroke="#2D3748" stroke-width="1"/>
  <text x="160" y="266" font-family="system-ui" font-size="15" fill="#FFFFFF">123 Main Street</text>
  
  <!-- City and Province Row -->
  <text x="140" y="310" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">City</text>
  <rect x="140" y="325" width="260" height="48" rx="8" fill="#0f0f1a" stroke="#2D3748" stroke-width="1"/>
  <text x="160" y="356" font-family="system-ui" font-size="15" fill="#FFFFFF">Toronto</text>
  
  <text x="420" y="310" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Province/State</text>
  <rect x="420" y="325" width="260" height="48" rx="8" fill="#0f0f1a" stroke="#2D3748" stroke-width="1"/>
  <text x="440" y="356" font-family="system-ui" font-size="15" fill="#FFFFFF">Ontario</text>
  
  <!-- Postal Code and Country Row -->
  <text x="140" y="400" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Postal/Zip Code</text>
  <rect x="140" y="415" width="260" height="48" rx="8" fill="#0f0f1a" stroke="#2D3748" stroke-width="1"/>
  <text x="160" y="446" font-family="system-ui" font-size="15" fill="#FFFFFF">M5V 1A1</text>
  
  <text x="420" y="400" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Country</text>
  <rect x="420" y="415" width="260" height="48" rx="8" fill="#0f0f1a" stroke="#2D3748" stroke-width="1"/>
  <text x="440" y="446" font-family="system-ui" font-size="15" fill="#FFFFFF">Canada</text>
  <!-- Dropdown arrow -->
  <path d="M655 440 L665 440 L660 450 Z" fill="#718096"/>
  
  <!-- Pro Tip -->
  <rect x="140" y="490" width="540" height="60" rx="8" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2" stroke-width="1"/>
  <text x="170" y="518" font-family="system-ui" font-size="14" fill="#7C7CF2">💡 Pro Tip</text>
  <text x="170" y="538" font-family="system-ui" font-size="12" fill="#A0AEC0">Double-check your postal code—it helps clients find you and improves local SEO.</text>
  
  <!-- Right side - Google Maps Preview -->
  <rect x="760" y="110" width="380" height="560" rx="16" fill="#1a1a2e"/>
  
  <text x="800" y="155" font-family="system-ui" font-size="18" font-weight="600" fill="#FFFFFF">📍 Map Preview</text>
  
  <!-- Map placeholder -->
  <rect x="780" y="175" width="340" height="240" rx="8" fill="#2D3748"/>
  
  <!-- Simulated map elements -->
  <rect x="790" y="185" width="320" height="220" rx="6" fill="#1a365d"/>
  
  <!-- Streets -->
  <line x1="790" y1="280" x2="1110" y2="280" stroke="#4A5568" stroke-width="3"/>
  <line x1="790" y1="330" x2="1110" y2="330" stroke="#4A5568" stroke-width="3"/>
  <line x1="900" y1="185" x2="900" y2="405" stroke="#4A5568" stroke-width="3"/>
  <line x1="1000" y1="185" x2="1000" y2="405" stroke="#4A5568" stroke-width="3"/>
  
  <!-- Location Pin -->
  <circle cx="950" cy="305" r="20" fill="#7C7CF2"/>
  <circle cx="950" cy="305" r="8" fill="#FFFFFF"/>
  <path d="M950 325 L940 305 L960 305 Z" fill="#7C7CF2"/>
  
  <!-- Address Card -->
  <rect x="780" y="435" width="340" height="100" rx="8" fill="#0f0f1a"/>
  <text x="800" y="465" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Bella Salon</text>
  <text x="800" y="488" font-family="system-ui" font-size="13" fill="#A0AEC0">123 Main Street</text>
  <text x="800" y="508" font-family="system-ui" font-size="13" fill="#A0AEC0">Toronto, ON M5V 1A1</text>
  
  <!-- Directions button -->
  <rect x="780" y="550" width="340" height="44" rx="8" fill="#7C7CF2" fill-opacity="0.2" stroke="#7C7CF2" stroke-width="1"/>
  <text x="890" y="578" font-family="system-ui" font-size="14" font-weight="500" fill="#7C7CF2">🧭 Get Directions</text>
  
  <!-- This will appear note -->
  <text x="800" y="630" font-family="system-ui" font-size="11" fill="#718096">This appears on your booking page and confirmation emails</text>
</svg>
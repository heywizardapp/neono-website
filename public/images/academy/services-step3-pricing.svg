<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- Pricing Section Panel -->
  <rect x="150" y="120" width="900" height="560" rx="16" fill="#1a1a2e"/>
  
  <!-- Header -->
  <text x="200" y="175" font-family="system-ui" font-size="22" font-weight="bold" fill="#FFFFFF">Pricing Options</text>
  <text x="200" y="200" font-family="system-ui" font-size="14" fill="#718096">Choose how you want to price this service</text>
  
  <!-- Pricing Type Selection -->
  <text x="200" y="250" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Pricing Type</text>
  
  <!-- Fixed Price - SELECTED -->
  <rect x="200" y="270" width="400" height="100" rx="12" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2" stroke-width="2"/>
  <circle cx="235" cy="320" r="14" fill="#7C7CF2"/>
  <circle cx="235" cy="320" r="6" fill="#FFFFFF"/>
  <text x="265" y="305" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Fixed Price</text>
  <text x="265" y="328" font-family="system-ui" font-size="13" fill="#A0AEC0">Same price for all clients</text>
  <text x="265" y="350" font-family="system-ui" font-size="12" fill="#718096">Example: "Women's Haircut - $65"</text>
  
  <!-- Variable Price -->
  <rect x="620" y="270" width="400" height="100" rx="12" fill="transparent" stroke="#2D3748" stroke-width="1"/>
  <circle cx="655" cy="320" r="14" fill="transparent" stroke="#4A5568" stroke-width="2"/>
  <text x="685" y="305" font-family="system-ui" font-size="16" font-weight="500" fill="#FFFFFF">Variable Price</text>
  <text x="685" y="328" font-family="system-ui" font-size="13" fill="#718096">Show "from $X" to clients</text>
  <text x="685" y="350" font-family="system-ui" font-size="12" fill="#4A5568">Example: "Color Service - from $120"</text>
  
  <!-- Price Input Section -->
  <rect x="200" y="390" width="820" height="180" rx="12" fill="#0f0f1a"/>
  
  <text x="240" y="435" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Base Price</text>
  
  <!-- Price Input -->
  <rect x="240" y="455" width="200" height="56" rx="8" fill="#1a1a2e" stroke="#7C7CF2" stroke-width="2"/>
  <text x="270" y="492" font-family="system-ui" font-size="24" fill="#718096">$</text>
  <text x="295" y="492" font-family="system-ui" font-size="24" font-weight="600" fill="#FFFFFF">65</text>
  <rect x="340" y="468" width="2" height="28" fill="#7C7CF2">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  <text x="380" y="490" font-family="system-ui" font-size="14" fill="#718096">.00</text>
  
  <!-- Quick Price Buttons -->
  <text x="480" y="435" font-family="system-ui" font-size="12" fill="#718096">Quick select:</text>
  <rect x="480" y="455" width="60" height="36" rx="6" fill="#2D3748"/>
  <text x="498" y="479" font-family="system-ui" font-size="13" fill="#A0AEC0">$45</text>
  <rect x="550" y="455" width="60" height="36" rx="6" fill="#7C7CF2"/>
  <text x="568" y="479" font-family="system-ui" font-size="13" fill="#FFFFFF">$65</text>
  <rect x="620" y="455" width="60" height="36" rx="6" fill="#2D3748"/>
  <text x="638" y="479" font-family="system-ui" font-size="13" fill="#A0AEC0">$85</text>
  <rect x="690" y="455" width="60" height="36" rx="6" fill="#2D3748"/>
  <text x="702" y="479" font-family="system-ui" font-size="13" fill="#A0AEC0">$100</text>
  
  <!-- Tax Info -->
  <rect x="240" y="525" width="300" height="35" rx="6" fill="#2D3748" fill-opacity="0.5"/>
  <text x="260" y="548" font-family="system-ui" font-size="12" fill="#718096">💰 Taxes will be added at checkout (13% HST)</text>
  
  <!-- Price Preview -->
  <rect x="760" y="420" width="220" height="130" rx="10" fill="#1a1a2e" stroke="#2D3748"/>
  <text x="790" y="450" font-family="system-ui" font-size="12" fill="#718096">BOOKING PAGE PREVIEW</text>
  <text x="790" y="480" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Haircut &amp; Blow Dry</text>
  <text x="790" y="505" font-family="system-ui" font-size="14" fill="#7C7CF2">$65</text>
  <text x="840" y="505" font-family="system-ui" font-size="14" fill="#718096">• 45 min</text>
  <text x="790" y="530" font-family="system-ui" font-size="11" fill="#4A5568">+ $8.45 tax at checkout</text>
  
  <!-- Navigation -->
  <rect x="250" y="595" width="100" height="44" rx="8" fill="transparent" stroke="#4A5568"/>
  <text x="280" y="623" font-family="system-ui" font-size="14" fill="#A0AEC0">← Back</text>
  
  <rect x="900" y="595" width="120" height="44" rx="8" fill="#7C7CF2"/>
  <text x="935" y="623" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Next →</text>
</svg>
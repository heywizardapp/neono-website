  <rect x="360" y="255" width="180" height="30" rx="5" fill="#7C7CF2" fill-opacity="0.1"/>
  <text x="375" y="275" font-family="system-ui" font-size="11" fill="#7C7CF2">✓ Haircut • $65 • 45min</text>
  
  <rect x="550" y="255" width="120" height="30" rx="5" fill="#ED8936" fill-opacity="0.1"/>

  <line x1="585" y1="205" x2="675" y2="205" stroke="#48BB78" stroke-width="2"/>
  
  <circle cx="700" cy="205" r="16" fill="#7C7CF2"/>
  <text x="695" y="210" font-family="system-ui" font-size="11" font-weight="bold" fill="#FFFFFF">4</text>
  <text x="680" y="235" font-family="system-ui" font-size="10" fill="#7C7CF2">Time</text>
  
  <line x1="725" y1="205" x2="815" y2="205" stroke="#4A5568" stroke-width="2"/>
  
  <circle cx="840" cy="205" r="16" fill="#2D3748"/>

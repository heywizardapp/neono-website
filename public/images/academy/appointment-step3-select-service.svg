<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- New Appointment Modal -->
  <rect x="150" y="90" width="900" height="620" rx="16" fill="#1a1a2e"/>
  
  <!-- Modal Header -->
  <rect x="150" y="90" width="900" height="70" rx="16" fill="#141428"/>
  <rect x="150" y="144" width="900" height="16" fill="#141428"/>
  <text x="200" y="135" font-family="system-ui" font-size="20" font-weight="bold" fill="#FFFFFF">📅 New Appointment</text>
  <circle cx="1010" cy="125" r="16" fill="#2D3748"/>
  <text x="1005" y="131" font-family="system-ui" font-size="18" fill="#A0AEC0">×</text>
  
  <!-- Progress Steps - Step 2 Active -->
  <rect x="200" y="180" width="800" height="50" rx="10" fill="#0f0f1a"/>
  
  <circle cx="280" cy="205" r="16" fill="#48BB78"/>
  <text x="274" y="211" font-family="system-ui" font-size="12" fill="#FFFFFF">✓</text>
  <text x="255" y="235" font-family="system-ui" font-size="10" fill="#48BB78">Client</text>
  
  <line x1="305" y1="205" x2="395" y2="205" stroke="#48BB78" stroke-width="2"/>
  
  <circle cx="420" cy="205" r="16" fill="#7C7CF2"/>
  <text x="415" y="210" font-family="system-ui" font-size="11" font-weight="bold" fill="#FFFFFF">2</text>
  <text x="395" y="235" font-family="system-ui" font-size="10" fill="#7C7CF2">Service</text>
  
  <line x1="445" y1="205" x2="535" y2="205" stroke="#4A5568" stroke-width="2"/>
  
  <circle cx="560" cy="205" r="16" fill="#2D3748"/>
  <text x="555" y="210" font-family="system-ui" font-size="11" fill="#718096">3</text>
  <text x="545" y="235" font-family="system-ui" font-size="10" fill="#718096">Staff</text>
  
  <line x1="585" y1="205" x2="675" y2="205" stroke="#4A5568" stroke-width="2"/>
  
  <circle cx="700" cy="205" r="16" fill="#2D3748"/>
  <text x="695" y="210" font-family="system-ui" font-size="11" fill="#718096">4</text>
  <text x="680" y="235" font-family="system-ui" font-size="10" fill="#718096">Time</text>
  
  <line x1="725" y1="205" x2="815" y2="205" stroke="#4A5568" stroke-width="2"/>
  
  <circle cx="840" cy="205" r="16" fill="#2D3748"/>
  <text x="835" y="210" font-family="system-ui" font-size="11" fill="#718096">5</text>
  <text x="815" y="235" font-family="system-ui" font-size="10" fill="#718096">Confirm</text>
  
  <!-- Selected Client Badge -->
  <rect x="200" y="255" width="300" height="36" rx="6" fill="#48BB78" fill-opacity="0.1"/>
  <text x="220" y="279" font-family="system-ui" font-size="13" fill="#48BB78">✓ Michelle Brown selected</text>
  
  <!-- Service Selection -->
  <text x="200" y="320" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Select Service(s)</text>
  <text x="200" y="345" font-family="system-ui" font-size="12" fill="#718096">Choose one or more services for this appointment</text>
  
  <!-- Category Tabs -->
  <rect x="200" y="365" width="100" height="36" rx="6" fill="#7C7CF2"/>
  <text x="225" y="389" font-family="system-ui" font-size="12" font-weight="600" fill="#FFFFFF">All</text>
  
  <rect x="310" y="365" width="100" height="36" rx="6" fill="transparent" stroke="#4A5568"/>
  <text x="340" y="389" font-family="system-ui" font-size="12" fill="#A0AEC0">Hair</text>
  
  <rect x="420" y="365" width="100" height="36" rx="6" fill="transparent" stroke="#4A5568"/>
  <text x="450" y="389" font-family="system-ui" font-size="12" fill="#A0AEC0">Nails</text>
  
  <rect x="530" y="365" width="100" height="36" rx="6" fill="transparent" stroke="#4A5568"/>
  <text x="550" y="389" font-family="system-ui" font-size="12" fill="#A0AEC0">Skincare</text>
  
  <!-- Service Cards -->
  <rect x="200" y="420" width="380" height="90" rx="10" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2" stroke-width="2"/>
  <circle cx="940" cy="465" r="14" fill="#7C7CF2"/>
  <text x="935" y="471" font-family="system-ui" font-size="12" fill="#FFFFFF">✓</text>
  <text x="230" y="455" font-family="system-ui" font-size="15" font-weight="600" fill="#FFFFFF">✂️ Women's Haircut</text>
  <text x="230" y="480" font-family="system-ui" font-size="13" fill="#A0AEC0">Professional cut and style</text>
  <rect x="230" y="490" width="60" height="18" rx="3" fill="#7C7CF2" fill-opacity="0.3"/>
  <text x="240" y="503" font-family="system-ui" font-size="10" fill="#7C7CF2">45 min</text>
  <text x="520" y="465" font-family="system-ui" font-size="16" font-weight="bold" fill="#48BB78">$65</text>
  
  <!-- Animation for selected service -->
  <rect x="195" y="415" width="390" height="100" rx="12" fill="none" stroke="#7C7CF2" stroke-width="2" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="600" y="420" width="380" height="90" rx="10" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="630" y="455" font-family="system-ui" font-size="15" font-weight="600" fill="#FFFFFF">💅 Manicure</text>
  <text x="630" y="480" font-family="system-ui" font-size="13" fill="#A0AEC0">Classic manicure with polish</text>
  <rect x="630" y="490" width="60" height="18" rx="3" fill="#2D3748"/>
  <text x="640" y="503" font-family="system-ui" font-size="10" fill="#718096">30 min</text>
  <text x="920" y="465" font-family="system-ui" font-size="16" font-weight="bold" fill="#FFFFFF">$35</text>
  
  <rect x="200" y="525" width="380" height="90" rx="10" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="230" y="560" font-family="system-ui" font-size="15" font-weight="600" fill="#FFFFFF">🌟 Blowout</text>
  <text x="230" y="585" font-family="system-ui" font-size="13" fill="#A0AEC0">Wash and professional blowout</text>
  <rect x="230" y="595" width="60" height="18" rx="3" fill="#2D3748"/>
  <text x="240" y="608" font-family="system-ui" font-size="10" fill="#718096">30 min</text>
  <text x="520" y="565" font-family="system-ui" font-size="16" font-weight="bold" fill="#FFFFFF">$45</text>
  
  <rect x="600" y="525" width="380" height="90" rx="10" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="630" y="560" font-family="system-ui" font-size="15" font-weight="600" fill="#FFFFFF">✨ Full Color</text>
  <text x="630" y="585" font-family="system-ui" font-size="13" fill="#A0AEC0">Single process color treatment</text>
  <rect x="630" y="595" width="60" height="18" rx="3" fill="#2D3748"/>
  <text x="640" y="608" font-family="system-ui" font-size="10" fill="#718096">90 min</text>
  <text x="920" y="565" font-family="system-ui" font-size="16" font-weight="bold" fill="#FFFFFF">$120</text>
  
  <!-- Summary Bar -->
  <rect x="200" y="640" width="600" height="50" rx="10" fill="#0f0f1a"/>
  <text x="230" y="672" font-family="system-ui" font-size="14" fill="#A0AEC0">Selected: Women's Haircut • 45 min •</text>
  <text x="520" y="672" font-family="system-ui" font-size="14" font-weight="bold" fill="#48BB78">$65</text>
  
  <!-- Action Buttons -->
  <rect x="820" y="655" width="80" height="44" rx="8" fill="transparent" stroke="#4A5568"/>
  <text x="843" y="683" font-family="system-ui" font-size="13" fill="#A0AEC0">Back</text>
  
  <rect x="910" y="655" width="80" height="44" rx="8" fill="#7C7CF2"/>
  <text x="928" y="683" font-family="system-ui" font-size="13" font-weight="600" fill="#FFFFFF">Next</text>
</svg>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- Cancellation Policy Modal -->
  <rect x="150" y="100" width="900" height="600" rx="16" fill="#1a1a2e"/>
  
  <!-- Header -->
  <rect x="150" y="100" width="900" height="70" rx="16" fill="#141428"/>
  <rect x="150" y="154" width="900" height="16" fill="#141428"/>
  <text x="200" y="145" font-family="system-ui" font-size="20" font-weight="bold" fill="#FFFFFF">🚫 Cancellation &amp; No-Show Policy</text>
  <circle cx="1010" cy="135" r="16" fill="#2D3748"/>
  <text x="1005" y="141" font-family="system-ui" font-size="18" fill="#A0AEC0">×</text>
  
  <!-- Policy Options -->
  <text x="200" y="210" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Cancellation Policy</text>
  
  <!-- Flexible -->
  <rect x="200" y="230" width="270" height="100" rx="10" fill="transparent" stroke="#2D3748"/>
  <circle cx="235" cy="280" r="14" fill="transparent" stroke="#4A5568" stroke-width="2"/>
  <text x="260" y="268" font-family="system-ui" font-size="15" font-weight="500" fill="#FFFFFF">Flexible</text>
  <text x="260" y="290" font-family="system-ui" font-size="12" fill="#718096">Full refund up to</text>
  <text x="260" y="308" font-family="system-ui" font-size="12" fill="#718096">24 hours before</text>
  
  <!-- Moderate - SELECTED -->
  <rect x="490" y="230" width="270" height="100" rx="10" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2" stroke-width="2"/>
  <circle cx="525" cy="280" r="14" fill="#7C7CF2"/>
  <circle cx="525" cy="280" r="6" fill="#FFFFFF"/>
  <text x="550" y="268" font-family="system-ui" font-size="15" font-weight="500" fill="#FFFFFF">Moderate</text>
  <text x="550" y="290" font-family="system-ui" font-size="12" fill="#A0AEC0">50% refund up to</text>
  <text x="550" y="308" font-family="system-ui" font-size="12" fill="#A0AEC0">48 hours before</text>
  <rect x="670" y="240" width="70" height="22" rx="4" fill="#48BB78"/>
  <text x="683" y="255" font-family="system-ui" font-size="10" fill="#FFFFFF">Popular</text>
  
  <!-- Strict -->
  <rect x="780" y="230" width="270" height="100" rx="10" fill="transparent" stroke="#2D3748"/>
  <circle cx="815" cy="280" r="14" fill="transparent" stroke="#4A5568" stroke-width="2"/>
  <text x="840" y="268" font-family="system-ui" font-size="15" font-weight="500" fill="#FFFFFF">Strict</text>
  <text x="840" y="290" font-family="system-ui" font-size="12" fill="#718096">No refund within</text>
  <text x="840" y="308" font-family="system-ui" font-size="12" fill="#718096">72 hours</text>
  
  <!-- No-Show Fee -->
  <text x="200" y="375" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">No-Show Fee</text>
  
  <rect x="200" y="395" width="850" height="100" rx="12" fill="#0f0f1a" stroke="#7C7CF2" stroke-width="2"/>
  
  <text x="240" y="435" font-family="system-ui" font-size="14" fill="#FFFFFF">Charge no-show clients:</text>
  
  <rect x="240" y="455" width="180" height="40" rx="6" fill="#7C7CF2" fill-opacity="0.15" stroke="#7C7CF2"/>
  <text x="275" y="481" font-family="system-ui" font-size="14" fill="#FFFFFF">100% of deposit</text>
  
  <rect x="440" y="455" width="180" height="40" rx="6" fill="transparent" stroke="#2D3748"/>
  <text x="480" y="481" font-family="system-ui" font-size="14" fill="#718096">50% of deposit</text>
  
  <rect x="640" y="455" width="180" height="40" rx="6" fill="transparent" stroke="#2D3748"/>
  <text x="695" y="481" font-family="system-ui" font-size="14" fill="#718096">No fee</text>
  
  <text x="850" y="435" font-family="system-ui" font-size="13" fill="#48BB78">✓ Auto-charged</text>
  
  <!-- Policy Preview -->
  <rect x="200" y="520" width="850" height="120" rx="12" fill="#1a1a2e"/>
  <text x="240" y="555" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">📋 What clients will see:</text>
  
  <rect x="240" y="575" width="780" height="50" rx="8" fill="#0f0f1a"/>
  <text x="270" y="598" font-family="system-ui" font-size="12" fill="#A0AEC0">"Cancellations made 48+ hours before your appointment receive a 50% refund.</text>
  <text x="270" y="615" font-family="system-ui" font-size="12" fill="#A0AEC0">No-shows will be charged the full deposit amount."</text>
  
  <!-- Navigation -->
  <rect x="800" y="655" width="100" height="44" rx="8" fill="transparent" stroke="#4A5568"/>
  <text x="830" y="683" font-family="system-ui" font-size="14" fill="#A0AEC0">Cancel</text>
  
  <rect x="920" y="655" width="120" height="44" rx="8" fill="#7C7CF2"/>
  <text x="948" y="683" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Save Policy</text>
</svg>
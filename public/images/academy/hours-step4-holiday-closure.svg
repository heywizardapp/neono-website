<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- Holiday Closure Panel -->
  <rect x="150" y="100" width="900" height="600" rx="16" fill="#1a1a2e"/>
  
  <!-- Header with Tabs -->
  <rect x="150" y="100" width="900" height="70" rx="16" fill="#141428"/>
  <rect x="150" y="154" width="900" height="16" fill="#141428"/>
  
  <rect x="200" y="115" width="130" height="40" rx="8" fill="transparent"/>
  <text x="220" y="141" font-family="system-ui" font-size="14" fill="#718096">Regular Hours</text>
  
  <rect x="340" y="115" width="100" height="40" rx="8" fill="#7C7CF2"/>
  <text x="365" y="141" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Holidays</text>
  
  <rect x="450" y="115" width="120" height="40" rx="8" fill="transparent"/>
  <text x="470" y="141" font-family="system-ui" font-size="14" fill="#718096">Special Hours</text>
  
  <!-- Holiday List -->
  <text x="200" y="210" font-family="system-ui" font-size="18" font-weight="600" fill="#FFFFFF">Upcoming Closures</text>
  
  <rect x="200" y="235" width="850" height="250" rx="12" fill="#0f0f1a"/>
  
  <!-- Holiday 1 -->
  <rect x="220" y="255" width="810" height="65" rx="8" fill="#FC8181" fill-opacity="0.1" stroke="#FC8181" stroke-opacity="0.3"/>
  <text x="250" y="285" font-family="system-ui" font-size="16" font-weight="500" fill="#FFFFFF">🎄 Christmas Day</text>
  <text x="250" y="307" font-family="system-ui" font-size="13" fill="#718096">December 25, 2024</text>
  <rect x="750" y="268" width="80" height="28" rx="6" fill="#FC8181" fill-opacity="0.2"/>
  <text x="764" y="288" font-family="system-ui" font-size="12" fill="#FC8181">Closed</text>
  <text x="970" y="288" font-family="system-ui" font-size="16" fill="#4A5568">⋮</text>
  
  <!-- Holiday 2 -->
  <rect x="220" y="330" width="810" height="65" rx="8" fill="#FC8181" fill-opacity="0.1" stroke="#FC8181" stroke-opacity="0.3"/>
  <text x="250" y="360" font-family="system-ui" font-size="16" font-weight="500" fill="#FFFFFF">🎆 New Year's Day</text>
  <text x="250" y="382" font-family="system-ui" font-size="13" fill="#718096">January 1, 2025</text>
  <rect x="750" y="343" width="80" height="28" rx="6" fill="#FC8181" fill-opacity="0.2"/>
  <text x="764" y="363" font-family="system-ui" font-size="12" fill="#FC8181">Closed</text>
  <text x="970" y="363" font-family="system-ui" font-size="16" fill="#4A5568">⋮</text>
  
  <!-- Holiday 3 - Reduced Hours -->
  <rect x="220" y="405" width="810" height="65" rx="8" fill="#ED8936" fill-opacity="0.1" stroke="#ED8936" stroke-opacity="0.3"/>
  <text x="250" y="435" font-family="system-ui" font-size="16" font-weight="500" fill="#FFFFFF">🎃 Christmas Eve</text>
  <text x="250" y="457" font-family="system-ui" font-size="13" fill="#718096">December 24, 2024 • 10 AM - 2 PM</text>
  <rect x="750" y="418" width="100" height="28" rx="6" fill="#ED8936" fill-opacity="0.2"/>
  <text x="760" y="438" font-family="system-ui" font-size="12" fill="#ED8936">Reduced</text>
  <text x="970" y="438" font-family="system-ui" font-size="16" fill="#4A5568">⋮</text>
  
  <!-- Add Holiday Button -->
  <rect x="200" y="505" width="850" height="60" rx="12" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2" stroke-dasharray="4,2"/>
  <text x="560" y="542" font-family="system-ui" font-size="14" font-weight="500" fill="#7C7CF2">+ Add Holiday Closure</text>
  
  <!-- Calendar Mini View -->
  <rect x="200" y="580" width="400" height="100" rx="12" fill="#0f0f1a"/>
  <text x="230" y="610" font-family="system-ui" font-size="12" fill="#718096">DECEMBER 2024</text>
  
  <!-- Calendar grid hint -->
  <rect x="230" y="625" width="30" height="20" rx="3" fill="#2D3748"/>
  <rect x="270" y="625" width="30" height="20" rx="3" fill="#2D3748"/>
  <rect x="310" y="625" width="30" height="20" rx="3" fill="#2D3748"/>
  <rect x="350" y="625" width="30" height="20" rx="3" fill="#ED8936"/>
  <rect x="390" y="625" width="30" height="20" rx="3" fill="#FC8181"/>
  <rect x="430" y="625" width="30" height="20" rx="3" fill="#2D3748"/>
  <text x="239" y="640" font-family="system-ui" font-size="10" fill="#A0AEC0">23</text>
  <text x="279" y="640" font-family="system-ui" font-size="10" fill="#FFFFFF">24</text>
  <text x="319" y="640" font-family="system-ui" font-size="10" fill="#FFFFFF">25</text>
  <text x="359" y="640" font-family="system-ui" font-size="10" fill="#FFFFFF">26</text>
  <text x="399" y="640" font-family="system-ui" font-size="10" fill="#FFFFFF">27</text>
  <text x="439" y="640" font-family="system-ui" font-size="10" fill="#A0AEC0">28</text>
  
  <rect x="230" y="655" width="30" height="20" rx="3" fill="#2D3748"/>
  <rect x="270" y="655" width="30" height="20" rx="3" fill="#2D3748"/>
  <rect x="310" y="655" width="30" height="20" rx="3" fill="#2D3748"/>
  <rect x="350" y="655" width="30" height="20" rx="3" fill="#FC8181"/>
  
  <!-- Pro Tip -->
  <rect x="620" y="580" width="430" height="100" rx="12" fill="#7C7CF2" fill-opacity="0.1"/>
  <text x="650" y="615" font-family="system-ui" font-size="14" font-weight="500" fill="#7C7CF2">💡 Pro Tip</text>
  <text x="650" y="640" font-family="system-ui" font-size="12" fill="#A0AEC0">Add holidays at least 2 weeks in advance.</text>
  <text x="650" y="660" font-family="system-ui" font-size="12" fill="#A0AEC0">Clients with existing bookings will be notified!</text>
</svg>
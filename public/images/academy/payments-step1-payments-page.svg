<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- URL Bar -->
  <rect x="200" y="52" width="400" height="24" rx="4" fill="#0B1220"/>
  <text x="220" y="69" font-family="system-ui" font-size="12" fill="#718096">app.neono.io/settings/payments</text>
  
  <!-- Main Content Area -->
  <rect x="60" y="84" width="1080" height="676" fill="#0f0f1a"/>
  
  <!-- Left Sidebar -->
  <rect x="60" y="84" width="220" height="676" fill="#141428"/>
  <text x="100" y="124" font-family="system-ui" font-size="20" font-weight="bold" fill="#7C7CF2">NeonO</text>
  
  <!-- Sidebar Items -->
  <text x="115" y="177" font-family="system-ui" font-size="14" fill="#A0AEC0">Dashboard</text>
  <text x="115" y="225" font-family="system-ui" font-size="14" fill="#A0AEC0">Calendar</text>
  <text x="115" y="273" font-family="system-ui" font-size="14" fill="#A0AEC0">Services</text>
  <text x="115" y="321" font-family="system-ui" font-size="14" fill="#A0AEC0">Staff</text>
  
  <!-- Settings Expanded -->
  <text x="115" y="369" font-family="system-ui" font-size="14" fill="#A0AEC0">Settings</text>
  <text x="245" y="369" font-family="system-ui" font-size="10" fill="#718096">▼</text>
  
  <!-- Settings Submenu -->
  <rect x="90" y="385" width="180" height="180" rx="8" fill="#0f0f1a"/>
  <text x="120" y="415" font-family="system-ui" font-size="13" fill="#A0AEC0">Business Profile</text>
  <text x="120" y="452" font-family="system-ui" font-size="13" fill="#A0AEC0">Business Hours</text>
  
  <!-- Payment Methods - HIGHLIGHTED -->
  <rect x="100" y="460" width="160" height="32" rx="6" fill="#7C7CF2" fill-opacity="0.2"/>
  <text x="120" y="482" font-family="system-ui" font-size="13" font-weight="500" fill="#7C7CF2">💳 Payment Methods</text>
  
  <text x="120" y="519" font-family="system-ui" font-size="13" fill="#A0AEC0">Online Booking</text>
  
  <!-- Main Content -->
  <rect x="300" y="100" width="820" height="640" fill="#0f0f1a"/>
  
  <!-- Page Header -->
  <text x="340" y="150" font-family="system-ui" font-size="28" font-weight="bold" fill="#FFFFFF">Payment Methods</text>
  <text x="340" y="175" font-family="system-ui" font-size="14" fill="#718096">Accept payments online and in-store</text>
  
  <!-- Status Banner -->
  <rect x="340" y="200" width="740" height="60" rx="10" fill="#ED8936" fill-opacity="0.1" stroke="#ED8936"/>
  <text x="380" y="235" font-family="system-ui" font-size="14" fill="#ED8936">⚠️ Online payments not configured — You're missing out on deposits and no-show protection!</text>
  
  <!-- Payment Processors -->
  <text x="340" y="300" font-family="system-ui" font-size="18" font-weight="600" fill="#FFFFFF">Connect a Payment Processor</text>
  
  <rect x="340" y="325" width="740" height="340" rx="12" fill="#1a1a2e"/>
  
  <!-- Stripe Option - Recommended -->
  <rect x="370" y="355" width="340" height="140" rx="10" fill="#0f0f1a" stroke="#7C7CF2" stroke-width="2"/>
  <rect x="530" y="365" width="90" height="22" rx="4" fill="#7C7CF2"/>
  <text x="542" y="380" font-family="system-ui" font-size="10" fill="#FFFFFF">Recommended</text>
  
  <!-- Stripe Logo -->
  <rect x="400" y="395" width="80" height="35" rx="4" fill="#635BFF"/>
  <text x="415" y="420" font-family="system-ui" font-size="18" font-weight="bold" fill="#FFFFFF">stripe</text>
  
  <text x="500" y="410" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Stripe</text>
  <text x="500" y="432" font-family="system-ui" font-size="12" fill="#718096">2.9% + $0.30 per transaction</text>
  <text x="500" y="452" font-family="system-ui" font-size="11" fill="#48BB78">✓ Instant setup</text>
  <text x="500" y="470" font-family="system-ui" font-size="11" fill="#48BB78">✓ Cards, Apple Pay, Google Pay</text>
  
  <rect x="400" y="480" width="280" height="40" rx="6" fill="#7C7CF2"/>
  <text x="495" y="507" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Connect Stripe →</text>
  
  <!-- Pulse animation -->
  <rect x="395" y="475" width="290" height="50" rx="8" fill="none" stroke="#7C7CF2" stroke-width="2" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Square Option -->
  <rect x="730" y="355" width="340" height="140" rx="10" fill="#0f0f1a" stroke="#2D3748"/>
  
  <!-- Square Logo -->
  <rect x="760" y="395" width="35" height="35" rx="4" fill="#FFFFFF"/>
  <rect x="770" y="405" width="15" height="15" fill="#1a1a2e"/>
  
  <text x="820" y="410" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Square</text>
  <text x="820" y="432" font-family="system-ui" font-size="12" fill="#718096">2.6% + $0.10 per transaction</text>
  <text x="820" y="452" font-family="system-ui" font-size="11" fill="#A0AEC0">Cards only</text>
  <text x="820" y="470" font-family="system-ui" font-size="11" fill="#A0AEC0">Hardware available</text>
  
  <rect x="760" y="480" width="280" height="40" rx="6" fill="transparent" stroke="#4A5568"/>
  <text x="850" y="507" font-family="system-ui" font-size="14" fill="#A0AEC0">Connect Square</text>
  
  <!-- In-Store Options -->
  <text x="370" y="530" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">In-Store Payment Methods</text>
  
  <rect x="370" y="550" width="210" height="50" rx="8" fill="#0f0f1a" stroke="#48BB78"/>
  <rect x="390" y="565" width="22" height="22" rx="4" fill="#48BB78"/>
  <text x="395" y="581" font-family="system-ui" font-size="12" fill="#FFFFFF">✓</text>
  <text x="425" y="582" font-family="system-ui" font-size="14" fill="#FFFFFF">💵 Cash</text>
  
  <rect x="600" y="550" width="210" height="50" rx="8" fill="#0f0f1a" stroke="#48BB78"/>
  <rect x="620" y="565" width="22" height="22" rx="4" fill="#48BB78"/>
  <text x="625" y="581" font-family="system-ui" font-size="12" fill="#FFFFFF">✓</text>
  <text x="655" y="582" font-family="system-ui" font-size="14" fill="#FFFFFF">💳 Card Terminal</text>
  
  <rect x="830" y="550" width="210" height="50" rx="8" fill="#0f0f1a" stroke="#2D3748"/>
  <rect x="850" y="565" width="22" height="22" rx="4" fill="transparent" stroke="#4A5568" stroke-width="2"/>
  <text x="885" y="582" font-family="system-ui" font-size="14" fill="#718096">📱 Venmo/Zelle</text>
</svg>
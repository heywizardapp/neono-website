<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- Staff Assignment Panel -->
  <rect x="100" y="100" width="1000" height="600" rx="16" fill="#1a1a2e"/>
  
  <!-- Header -->
  <text x="150" y="155" font-family="system-ui" font-size="22" font-weight="bold" fill="#FFFFFF">Assign Staff Members</text>
  <text x="150" y="180" font-family="system-ui" font-size="14" fill="#718096">Select who can perform this service and set their pricing</text>
  
  <!-- Search -->
  <rect x="150" y="210" width="300" height="44" rx="8" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="180" y="238" font-family="system-ui" font-size="14" fill="#718096">🔍 Search staff...</text>
  
  <!-- Select All -->
  <rect x="480" y="210" width="120" height="44" rx="8" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2"/>
  <text x="505" y="238" font-family="system-ui" font-size="13" fill="#7C7CF2">Select All</text>
  
  <!-- Staff List -->
  <rect x="150" y="270" width="900" height="350" rx="12" fill="#0f0f1a"/>
  
  <!-- Column Headers -->
  <text x="190" y="310" font-family="system-ui" font-size="12" font-weight="600" fill="#718096">STAFF MEMBER</text>
  <text x="500" y="310" font-family="system-ui" font-size="12" font-weight="600" fill="#718096">ROLE</text>
  <text x="700" y="310" font-family="system-ui" font-size="12" font-weight="600" fill="#718096">CUSTOM PRICE</text>
  <text x="900" y="310" font-family="system-ui" font-size="12" font-weight="600" fill="#718096">ASSIGN</text>
  
  <line x1="170" y1="325" x2="1030" y2="325" stroke="#2D3748" stroke-width="1"/>
  
  <!-- Staff Row 1 - Sarah (Senior) - Checked -->
  <rect x="170" y="335" width="860" height="80" rx="8" fill="#7C7CF2" fill-opacity="0.08"/>
  <circle cx="220" cy="375" r="28" fill="#7C7CF2" fill-opacity="0.3"/>
  <text x="207" y="383" font-family="system-ui" font-size="18" font-weight="bold" fill="#7C7CF2">SJ</text>
  <text x="265" y="365" font-family="system-ui" font-size="15" font-weight="500" fill="#FFFFFF">Sarah Johnson</text>
  <text x="265" y="388" font-family="system-ui" font-size="12" fill="#718096">Senior Stylist</text>
  <rect x="500" y="358" width="100" height="28" rx="6" fill="#48BB78" fill-opacity="0.2"/>
  <text x="525" y="378" font-family="system-ui" font-size="12" fill="#48BB78">Stylist</text>
  
  <!-- Custom price input -->
  <rect x="700" y="355" width="120" height="40" rx="6" fill="#1a1a2e" stroke="#7C7CF2" stroke-width="2"/>
  <text x="720" y="382" font-family="system-ui" font-size="15" fill="#718096">$</text>
  <text x="738" y="382" font-family="system-ui" font-size="15" font-weight="600" fill="#48BB78">75</text>
  <text x="770" y="382" font-family="system-ui" font-size="11" fill="#48BB78">+$10</text>
  
  <!-- Checkbox -->
  <rect x="920" y="355" width="40" height="40" rx="8" fill="#7C7CF2"/>
  <text x="932" y="382" font-family="system-ui" font-size="18" fill="#FFFFFF">✓</text>
  
  <!-- Staff Row 2 - Mike - Checked -->
  <rect x="170" y="425" width="860" height="80" rx="8" fill="#7C7CF2" fill-opacity="0.08"/>
  <circle cx="220" cy="465" r="28" fill="#48BB78" fill-opacity="0.3"/>
  <text x="205" y="473" font-family="system-ui" font-size="18" font-weight="bold" fill="#48BB78">MC</text>
  <text x="265" y="455" font-family="system-ui" font-size="15" font-weight="500" fill="#FFFFFF">Mike Chen</text>
  <text x="265" y="478" font-family="system-ui" font-size="12" fill="#718096">Stylist</text>
  <rect x="500" y="448" width="100" height="28" rx="6" fill="#48BB78" fill-opacity="0.2"/>
  <text x="525" y="468" font-family="system-ui" font-size="12" fill="#48BB78">Stylist</text>
  
  <!-- Base price (default) -->
  <rect x="700" y="445" width="120" height="40" rx="6" fill="#1a1a2e" stroke="#2D3748"/>
  <text x="720" y="472" font-family="system-ui" font-size="15" fill="#718096">$</text>
  <text x="738" y="472" font-family="system-ui" font-size="15" fill="#A0AEC0">65</text>
  <text x="770" y="472" font-family="system-ui" font-size="11" fill="#718096">Base</text>
  
  <!-- Checkbox -->
  <rect x="920" y="445" width="40" height="40" rx="8" fill="#7C7CF2"/>
  <text x="932" y="472" font-family="system-ui" font-size="18" fill="#FFFFFF">✓</text>
  
  <!-- Staff Row 3 - Jessica (Junior) - Unchecked -->
  <rect x="170" y="515" width="860" height="80" rx="8" fill="transparent"/>
  <circle cx="220" cy="555" r="28" fill="#ED8936" fill-opacity="0.3"/>
  <text x="208" y="563" font-family="system-ui" font-size="18" font-weight="bold" fill="#ED8936">JL</text>
  <text x="265" y="545" font-family="system-ui" font-size="15" font-weight="500" fill="#718096">Jessica Lee</text>
  <text x="265" y="568" font-family="system-ui" font-size="12" fill="#4A5568">Junior Stylist</text>
  <rect x="500" y="538" width="100" height="28" rx="6" fill="#4A5568" fill-opacity="0.2"/>
  <text x="525" y="558" font-family="system-ui" font-size="12" fill="#4A5568">Stylist</text>
  
  <!-- Disabled price -->
  <rect x="700" y="535" width="120" height="40" rx="6" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="720" y="562" font-family="system-ui" font-size="15" fill="#4A5568">$55</text>
  
  <!-- Empty Checkbox -->
  <rect x="920" y="535" width="40" height="40" rx="8" fill="transparent" stroke="#4A5568" stroke-width="2"/>
  
  <!-- Pro Tip -->
  <rect x="150" y="635" width="700" height="45" rx="8" fill="#7C7CF2" fill-opacity="0.1"/>
  <text x="180" y="663" font-family="system-ui" font-size="12" fill="#7C7CF2">💡 Pro Tip: Create staff-specific pricing—clients expect to pay more for senior talent.</text>
  
  <!-- Navigation -->
  <rect x="900" y="640" width="120" height="44" rx="8" fill="#7C7CF2"/>
  <text x="935" y="668" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Next →</text>
</svg>
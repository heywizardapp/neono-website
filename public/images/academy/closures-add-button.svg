<svg width="800" height="300" viewBox="0 0 800 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser Window -->
  <rect width="800" height="300" rx="12" fill="#1a1a2e"/>
  
  <!-- Title Bar -->
  <rect width="800" height="44" rx="12" fill="#252542"/>
  <rect y="32" width="800" height="12" fill="#252542"/>
  
  <!-- Traffic Lights -->
  <circle cx="20" cy="22" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="22" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="22" r="6" fill="#28CA41"/>
  
  <!-- URL Bar -->
  <rect x="150" y="10" width="500" height="24" rx="6" fill="#1a1a2e"/>
  <text x="360" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">app.neono.io/calendar</text>
  
  <!-- Calendar Header Background -->
  <rect x="0" y="44" width="800" height="256" fill="#1a1a2e"/>
  
  <!-- Toolbar -->
  <rect x="0" y="44" width="800" height="56" fill="#1e1e36"/>
  
  <!-- Date -->
  <text x="30" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#fff">January 2026</text>
  
  <!-- View Toggles -->
  <rect x="200" y="62" width="130" height="32" rx="6" fill="#252542"/>
  <text x="217" y="83" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Day</text>
  <rect x="248" y="66" width="40" height="24" rx="4" fill="#7C7CF2"/>
  <text x="256" y="83" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fff">Week</text>
  <text x="298" y="83" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Month</text>
  
  <!-- Staff Filter -->
  <rect x="350" y="62" width="110" height="32" rx="6" fill="#252542"/>
  <text x="370" y="83" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9999aa">All Staff ▼</text>
  
  <!-- Add Closure Button - Highlighted -->
  <rect x="480" y="62" width="110" height="32" rx="6" fill="#252542"/>
  <text x="495" y="83" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9999aa">🚫 Add Closure</text>
  
  <!-- Highlight Circle -->
  <circle cx="535" cy="78" r="30" fill="none" stroke="#7C7CF2" stroke-width="3" stroke-dasharray="5,3"/>
  
  <!-- Arrow pointing to button -->
  <path d="M535 130 L535 110" stroke="#EF4444" stroke-width="3" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444"/>
    </marker>
  </defs>
  
  <!-- Hint Badge -->
  <rect x="470" y="140" width="130" height="28" rx="6" fill="#EF4444"/>
  <text x="495" y="159" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#fff">Click to add closure</text>
  
  <!-- New Appointment Button -->
  <rect x="620" y="62" width="150" height="32" rx="6" fill="#7C7CF2"/>
  <text x="648" y="83" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#fff">+ New Appointment</text>
  
  <!-- Calendar Preview (simplified) -->
  <rect x="30" y="110" width="740" height="170" rx="8" fill="#13131f"/>
  
  <!-- Day Headers -->
  <text x="80" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Mon 26</text>
  <text x="185" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7C7CF2" font-weight="600">Tue 27</text>
  <text x="295" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Wed 28</text>
  <text x="405" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Thu 29</text>
  <text x="515" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Fri 30</text>
  <text x="625" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Sat 31</text>
  <text x="725" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Sun 1</text>
  
  <!-- Grid Lines -->
  <line x1="50" y1="155" x2="750" y2="155" stroke="#252542" stroke-width="1"/>
  <line x1="155" y1="130" x2="155" y2="260" stroke="#252542" stroke-width="1"/>
  <line x1="260" y1="130" x2="260" y2="260" stroke="#252542" stroke-width="1"/>
  <line x1="370" y1="130" x2="370" y2="260" stroke="#252542" stroke-width="1"/>
  <line x1="480" y1="130" x2="480" y2="260" stroke="#252542" stroke-width="1"/>
  <line x1="590" y1="130" x2="590" y2="260" stroke="#252542" stroke-width="1"/>
  <line x1="700" y1="130" x2="700" y2="260" stroke="#252542" stroke-width="1"/>
  
  <!-- Sample Appointment -->
  <rect x="165" y="170" width="85" height="50" rx="4" fill="#3B82F6"/>
  <text x="175" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#fff">Emma J.</text>
  <text x="175" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#bfdbfe">Haircut</text>
</svg>
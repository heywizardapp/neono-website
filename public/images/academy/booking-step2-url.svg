<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- URL Customization Modal -->
  <rect x="150" y="120" width="900" height="560" rx="16" fill="#1a1a2e"/>
  
  <!-- Header -->
  <rect x="150" y="120" width="900" height="70" rx="16" fill="#141428"/>
  <rect x="150" y="174" width="900" height="16" fill="#141428"/>
  <text x="200" y="165" font-family="system-ui" font-size="20" font-weight="bold" fill="#FFFFFF">🔗 Customize Your Booking URL</text>
  <circle cx="1010" cy="155" r="16" fill="#2D3748"/>
  <text x="1005" y="161" font-family="system-ui" font-size="18" fill="#A0AEC0">×</text>
  
  <!-- Current URL Display -->
  <text x="200" y="230" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Your booking URL</text>
  
  <rect x="200" y="250" width="850" height="80" rx="12" fill="#0f0f1a" stroke="#7C7CF2" stroke-width="2"/>
  
  <text x="240" y="285" font-family="system-ui" font-size="14" fill="#718096">book.neono.io/</text>
  <rect x="360" y="265" width="300" height="40" rx="6" fill="#1a1a2e" stroke="#7C7CF2"/>
  <text x="380" y="292" font-family="system-ui" font-size="16" font-weight="500" fill="#FFFFFF">bella-salon</text>
  <rect x="510" y="273" width="2" height="24" fill="#7C7CF2">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Availability Check -->
  <rect x="680" y="265" width="120" height="40" rx="6" fill="#48BB78"/>
  <text x="700" y="291" font-family="system-ui" font-size="13" fill="#FFFFFF">✓ Available</text>
  
  <!-- URL Rules -->
  <rect x="200" y="350" width="400" height="200" rx="12" fill="#0f0f1a"/>
  <text x="240" y="390" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">URL Guidelines</text>
  
  <text x="240" y="425" font-family="system-ui" font-size="12" fill="#48BB78">✓ Lowercase letters only</text>
  <text x="240" y="450" font-family="system-ui" font-size="12" fill="#48BB78">✓ Numbers allowed</text>
  <text x="240" y="475" font-family="system-ui" font-size="12" fill="#48BB78">✓ Hyphens for spaces</text>
  <text x="240" y="500" font-family="system-ui" font-size="12" fill="#FC8181">✗ No special characters</text>
  <text x="240" y="525" font-family="system-ui" font-size="12" fill="#718096">Min 3 characters, max 30</text>
  
  <!-- Suggestions -->
  <rect x="620" y="350" width="430" height="200" rx="12" fill="#0f0f1a"/>
  <text x="660" y="390" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">💡 Suggestions</text>
  
  <rect x="660" y="415" width="160" height="36" rx="6" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2"/>
  <text x="685" y="439" font-family="system-ui" font-size="13" fill="#7C7CF2">bella-salon</text>
  
  <rect x="830" y="415" width="200" height="36" rx="6" fill="transparent" stroke="#2D3748"/>
  <text x="855" y="439" font-family="system-ui" font-size="13" fill="#A0AEC0">bella-salon-nyc</text>
  
  <rect x="660" y="465" width="180" height="36" rx="6" fill="transparent" stroke="#2D3748"/>
  <text x="685" y="489" font-family="system-ui" font-size="13" fill="#A0AEC0">book-bella-salon</text>
  
  <rect x="850" y="465" width="180" height="36" rx="6" fill="transparent" stroke="#2D3748"/>
  <text x="875" y="489" font-family="system-ui" font-size="13" fill="#A0AEC0">bellasalon2024</text>
  
  <!-- Pro Tip -->
  <rect x="200" y="570" width="850" height="60" rx="10" fill="#7C7CF2" fill-opacity="0.1"/>
  <text x="240" y="605" font-family="system-ui" font-size="13" fill="#7C7CF2">💡 Pro Tip: Keep it short and memorable! Your clients will type this URL to book appointments.</text>
  
  <!-- Action Buttons -->
  <rect x="800" y="645" width="100" height="44" rx="8" fill="transparent" stroke="#4A5568"/>
  <text x="830" y="673" font-family="system-ui" font-size="14" fill="#A0AEC0">Cancel</text>
  
  <rect x="920" y="645" width="120" height="44" rx="8" fill="#7C7CF2"/>
  <text x="950" y="673" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Save URL</text>
</svg>
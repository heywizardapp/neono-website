<svg width="900" height="500" viewBox="0 0 900 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser Window -->
  <rect width="900" height="500" rx="12" fill="#1a1a2e"/>
  
  <!-- Title Bar -->
  <rect width="900" height="44" rx="12" fill="#252542"/>
  <rect y="32" width="900" height="12" fill="#252542"/>
  
  <!-- Traffic Lights -->
  <circle cx="20" cy="22" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="22" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="22" r="6" fill="#28CA41"/>
  
  <!-- URL Bar -->
  <rect x="150" y="10" width="600" height="24" rx="6" fill="#1a1a2e"/>
  <text x="400" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">app.neono.io/calendar</text>
  
  <!-- Content Area -->
  <rect x="0" y="44" width="900" height="456" fill="#13131f"/>
  
  <!-- Day Headers -->
  <rect x="80" y="60" width="800" height="36" fill="#1e1e36"/>
  <text x="180" y="84" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">Tuesday</text>
  <text x="380" y="84" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">Wednesday</text>
  <text x="580" y="84" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">Thursday</text>
  <text x="780" y="84" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa">Friday</text>
  
  <!-- Time labels -->
  <text x="25" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">9 AM</text>
  <text x="22" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">10 AM</text>
  <text x="22" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">11 AM</text>
  <text x="22" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">12 PM</text>
  
  <!-- Grid Lines -->
  <line x1="80" y1="145" x2="880" y2="145" stroke="#252542" stroke-width="1"/>
  <line x1="80" y1="195" x2="880" y2="195" stroke="#252542" stroke-width="1"/>
  <line x1="80" y1="245" x2="880" y2="245" stroke="#252542" stroke-width="1"/>
  <line x1="80" y1="295" x2="880" y2="295" stroke="#252542" stroke-width="1"/>
  
  <line x1="280" y1="96" x2="280" y2="310" stroke="#252542" stroke-width="1"/>
  <line x1="480" y1="96" x2="480" y2="310" stroke="#252542" stroke-width="1"/>
  <line x1="680" y1="96" x2="680" y2="310" stroke="#252542" stroke-width="1"/>
  
  <!-- Appointment 1 - Blue (Confirmed) -->
  <rect x="100" y="110" width="160" height="70" rx="8" fill="#3B82F6"/>
  <rect x="100" y="110" width="5" height="70" rx="2" fill="#2563EB"/>
  <text x="115" y="132" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff">Jane Doe</text>
  <text x="115" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#bfdbfe">Haircut</text>
  <text x="115" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#93c5fd">9:00 AM - 10:00 AM</text>
  
  <!-- Appointment 2 - Orange (Pending) -->
  <rect x="300" y="155" width="160" height="70" rx="8" fill="#F59E0B"/>
  <rect x="300" y="155" width="5" height="70" rx="2" fill="#D97706"/>
  <text x="315" y="177" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff">John Smith</text>
  <text x="315" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fef3c7">Color Service</text>
  <text x="315" y="213" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#fde68a">10:30 AM - 12:30 PM</text>
  
  <!-- Appointment 3 - Green (Checked In) -->
  <rect x="500" y="200" width="160" height="55" rx="8" fill="#10B981"/>
  <rect x="500" y="200" width="5" height="55" rx="2" fill="#059669"/>
  <text x="515" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff">Mary Johnson</text>
  <text x="515" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a7f3d0">Nails</text>
  
  <!-- Appointment 4 - Gray (Completed) -->
  <rect x="700" y="110" width="160" height="50" rx="8" fill="#4B5563"/>
  <rect x="700" y="110" width="5" height="50" rx="2" fill="#374151"/>
  <text x="715" y="132" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#d1d5db">Tom Wilson</text>
  <text x="715" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9ca3af">Massage</text>
  
  <!-- Legend Card -->
  <rect x="200" y="340" width="500" height="130" rx="12" fill="#252542"/>
  <rect x="200" y="340" width="500" height="130" rx="12" stroke="#3a3a5a" stroke-width="1"/>
  
  <text x="400" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Appointment Status Colors</text>
  
  <!-- Legend Items -->
  <rect x="230" y="395" width="16" height="16" rx="3" fill="#3B82F6"/>
  <text x="256" y="408" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff">Confirmed</text>
  <text x="256" y="423" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888">Booked and confirmed</text>
  
  <rect x="380" y="395" width="16" height="16" rx="3" fill="#F59E0B"/>
  <text x="406" y="408" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff">Pending</text>
  <text x="406" y="423" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888">Awaiting confirmation</text>
  
  <rect x="530" y="395" width="16" height="16" rx="3" fill="#10B981"/>
  <text x="556" y="408" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff">Checked In</text>
  <text x="556" y="423" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888">Client has arrived</text>
  
  <rect x="380" y="440" width="16" height="16" rx="3" fill="#4B5563"/>
  <text x="406" y="453" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff">Completed</text>
  <text x="406" y="468" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888">Service finished</text>
</svg>
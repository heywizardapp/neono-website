<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- Share Modal -->
  <rect x="200" y="120" width="800" height="560" rx="16" fill="#1a1a2e"/>
  
  <!-- Header -->
  <rect x="200" y="120" width="800" height="70" rx="16" fill="#141428"/>
  <rect x="200" y="174" width="800" height="16" fill="#141428"/>
  <text x="250" y="165" font-family="system-ui" font-size="20" font-weight="bold" fill="#FFFFFF">📤 Share Your Booking Page</text>
  <circle cx="960" cy="155" r="16" fill="#2D3748"/>
  <text x="955" y="161" font-family="system-ui" font-size="18" fill="#A0AEC0">×</text>
  
  <!-- Booking Link -->
  <text x="250" y="230" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Your Booking Link</text>
  
  <rect x="250" y="250" width="700" height="60" rx="10" fill="#0f0f1a" stroke="#7C7CF2"/>
  <text x="290" y="288" font-family="system-ui" font-size="16" fill="#7C7CF2">book.neono.io/bella-salon</text>
  
  <rect x="800" y="263" width="120" height="36" rx="6" fill="#48BB78"/>
  <text x="827" y="287" font-family="system-ui" font-size="13" fill="#FFFFFF">📋 Copy Link</text>
  
  <!-- Share Options -->
  <text x="250" y="350" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Share On</text>
  
  <rect x="250" y="375" width="700" height="80" rx="10" fill="#0f0f1a"/>
  
  <!-- Social Share Buttons -->
  <rect x="290" y="395" width="100" height="50" rx="8" fill="#1877F2"/>
  <text x="310" y="428" font-family="system-ui" font-size="13" fill="#FFFFFF">Facebook</text>
  
  <rect x="410" y="395" width="100" height="50" rx="8" fill="#E4405F"/>
  <text x="425" y="428" font-family="system-ui" font-size="13" fill="#FFFFFF">Instagram</text>
  
  <rect x="530" y="395" width="100" height="50" rx="8" fill="#25D366"/>
  <text x="543" y="428" font-family="system-ui" font-size="13" fill="#FFFFFF">WhatsApp</text>
  
  <rect x="650" y="395" width="100" height="50" rx="8" fill="#0A66C2"/>
  <text x="670" y="428" font-family="system-ui" font-size="13" fill="#FFFFFF">LinkedIn</text>
  
  <rect x="770" y="395" width="100" height="50" rx="8" fill="#1DA1F2"/>
  <text x="800" y="428" font-family="system-ui" font-size="13" fill="#FFFFFF">Twitter</text>
  
  <!-- QR Code Section -->
  <text x="250" y="495" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">QR Code</text>
  
  <rect x="250" y="515" width="300" height="150" rx="10" fill="#0f0f1a"/>
  
  <!-- QR Code Placeholder -->
  <rect x="280" y="535" width="110" height="110" rx="4" fill="#FFFFFF"/>
  <rect x="295" y="550" width="20" height="20" fill="#1a1a2e"/>
  <rect x="325" y="550" width="20" height="20" fill="#1a1a2e"/>
  <rect x="355" y="550" width="20" height="20" fill="#1a1a2e"/>
  <rect x="295" y="580" width="20" height="20" fill="#1a1a2e"/>
  <rect x="355" y="580" width="20" height="20" fill="#1a1a2e"/>
  <rect x="295" y="610" width="20" height="20" fill="#1a1a2e"/>
  <rect x="325" y="610" width="20" height="20" fill="#1a1a2e"/>
  <rect x="355" y="610" width="20" height="20" fill="#1a1a2e"/>
  <rect x="325" y="580" width="20" height="20" fill="#1a1a2e"/>
  
  <rect x="410" y="550" width="120" height="36" rx="6" fill="#7C7CF2"/>
  <text x="430" y="574" font-family="system-ui" font-size="12" fill="#FFFFFF">Download QR</text>
  
  <text x="410" y="620" font-family="system-ui" font-size="11" fill="#718096">Print this QR code for</text>
  <text x="410" y="638" font-family="system-ui" font-size="11" fill="#718096">your reception desk!</text>
  
  <!-- Embed Code -->
  <rect x="570" y="515" width="380" height="150" rx="10" fill="#0f0f1a"/>
  <text x="600" y="545" font-family="system-ui" font-size="13" font-weight="500" fill="#FFFFFF">Embed on your website</text>
  
  <rect x="600" y="560" width="320" height="60" rx="6" fill="#141428"/>
  <text x="620" y="585" font-family="system-ui" font-size="10" fill="#718096">&lt;iframe src="book.neono.io/</text>
  <text x="620" y="602" font-family="system-ui" font-size="10" fill="#718096">bella-salon/embed"&gt;&lt;/iframe&gt;</text>
  
  <rect x="750" y="628" width="100" height="28" rx="4" fill="#2D3748"/>
  <text x="777" y="647" font-family="system-ui" font-size="11" fill="#A0AEC0">Copy Code</text>
  
  <!-- Pro Tip -->
  <rect x="250" y="680" width="700" height="50" rx="8" fill="#7C7CF2" fill-opacity="0.1"/>
  <text x="290" y="712" font-family="system-ui" font-size="12" fill="#7C7CF2">💡 Pro Tip: Add your booking link to your Instagram bio and email signature for maximum visibility!</text>
</svg>
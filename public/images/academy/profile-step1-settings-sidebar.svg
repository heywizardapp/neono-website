<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- URL Bar -->
  <rect x="200" y="52" width="400" height="24" rx="4" fill="#0B1220"/>
  <text x="220" y="69" font-family="system-ui" font-size="12" fill="#718096">app.neono.io/settings</text>
  
  <!-- Main Content Area -->
  <rect x="60" y="84" width="1080" height="676" fill="#0f0f1a"/>
  
  <!-- Left Sidebar -->
  <rect x="60" y="84" width="220" height="676" fill="#141428"/>
  
  <!-- NeonO Logo -->
  <text x="100" y="124" font-family="system-ui" font-size="20" font-weight="bold" fill="#7C7CF2">NeonO</text>
  
  <!-- Sidebar Menu Items -->
  <!-- Dashboard -->
  <rect x="75" y="150" width="190" height="44" rx="8" fill="transparent"/>
  <rect x="85" y="162" width="20" height="20" rx="4" fill="#4A5568"/>
  <text x="115" y="177" font-family="system-ui" font-size="14" fill="#A0AEC0">Dashboard</text>
  
  <!-- Calendar -->
  <rect x="75" y="198" width="190" height="44" rx="8" fill="transparent"/>
  <rect x="85" y="210" width="20" height="20" rx="4" fill="#4A5568"/>
  <text x="115" y="225" font-family="system-ui" font-size="14" fill="#A0AEC0">Calendar</text>
  
  <!-- Clients -->
  <rect x="75" y="246" width="190" height="44" rx="8" fill="transparent"/>
  <rect x="85" y="258" width="20" height="20" rx="4" fill="#4A5568"/>
  <text x="115" y="273" font-family="system-ui" font-size="14" fill="#A0AEC0">Clients</text>
  
  <!-- Services -->
  <rect x="75" y="294" width="190" height="44" rx="8" fill="transparent"/>
  <rect x="85" y="306" width="20" height="20" rx="4" fill="#4A5568"/>
  <text x="115" y="321" font-family="system-ui" font-size="14" fill="#A0AEC0">Services</text>
  
  <!-- Staff -->
  <rect x="75" y="342" width="190" height="44" rx="8" fill="transparent"/>
  <rect x="85" y="354" width="20" height="20" rx="4" fill="#4A5568"/>
  <text x="115" y="369" font-family="system-ui" font-size="14" fill="#A0AEC0">Staff</text>
  
  <!-- Settings - HIGHLIGHTED -->
  <rect x="75" y="390" width="190" height="44" rx="8" fill="#7C7CF2" fill-opacity="0.15"/>
  <rect x="72" y="390" width="4" height="44" rx="2" fill="#7C7CF2"/>
  <!-- Settings Gear Icon -->
  <circle cx="95" cy="412" r="10" fill="none" stroke="#7C7CF2" stroke-width="2"/>
  <circle cx="95" cy="412" r="4" fill="#7C7CF2"/>
  <text x="115" y="417" font-family="system-ui" font-size="14" font-weight="600" fill="#7C7CF2">Settings</text>
  <!-- Dropdown Arrow -->
  <path d="M245 408 L255 408 L250 416 Z" fill="#7C7CF2"/>
  
  <!-- Settings Submenu (Expanded) -->
  <rect x="90" y="442" width="170" height="140" rx="6" fill="#1a1a2e"/>
  
  <!-- Business Profile - Selected -->
  <rect x="95" y="450" width="160" height="36" rx="6" fill="#7C7CF2" fill-opacity="0.2"/>
  <circle cx="115" cy="468" r="8" fill="none" stroke="#7C7CF2" stroke-width="2"/>
  <text x="130" y="473" font-family="system-ui" font-size="13" font-weight="500" fill="#7C7CF2">Business Profile</text>
  
  <!-- Business Hours -->
  <rect x="95" y="490" width="160" height="36" rx="6" fill="transparent"/>
  <circle cx="115" cy="508" r="8" fill="none" stroke="#718096" stroke-width="2"/>
  <text x="130" y="513" font-family="system-ui" font-size="13" fill="#A0AEC0">Business Hours</text>
  
  <!-- Online Booking -->
  <rect x="95" y="530" width="160" height="36" rx="6" fill="transparent"/>
  <circle cx="115" cy="548" r="8" fill="none" stroke="#718096" stroke-width="2"/>
  <text x="130" y="553" font-family="system-ui" font-size="13" fill="#A0AEC0">Online Booking</text>
  
  <!-- Highlight Arrow Indicator -->
  <path d="M275 468 L295 468 L285 458 L295 468 L285 478 Z" fill="#7C7CF2" stroke="#7C7CF2" stroke-width="2"/>
  
  <!-- Main Content - Business Profile Form Preview -->
  <rect x="300" y="100" width="820" height="640" fill="#0f0f1a"/>
  
  <!-- Page Header -->
  <text x="340" y="150" font-family="system-ui" font-size="28" font-weight="bold" fill="#FFFFFF">Business Profile</text>
  <text x="340" y="175" font-family="system-ui" font-size="14" fill="#718096">Manage your business information</text>
  
  <!-- Form Card -->
  <rect x="340" y="200" width="740" height="500" rx="12" fill="#1a1a2e"/>
  
  <!-- Form Fields Preview (Greyed out) -->
  <text x="370" y="240" font-family="system-ui" font-size="12" fill="#718096">Business Name</text>
  <rect x="370" y="250" width="320" height="44" rx="6" fill="#0f0f1a" stroke="#2D3748" stroke-width="1"/>
  
  <text x="370" y="320" font-family="system-ui" font-size="12" fill="#718096">Email</text>
  <rect x="370" y="330" width="320" height="44" rx="6" fill="#0f0f1a" stroke="#2D3748" stroke-width="1"/>
  
  <text x="370" y="400" font-family="system-ui" font-size="12" fill="#718096">Phone</text>
  <rect x="370" y="410" width="320" height="44" rx="6" fill="#0f0f1a" stroke="#2D3748" stroke-width="1"/>
  
  <!-- Instruction Callout -->
  <rect x="720" y="240" width="340" height="100" rx="8" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2" stroke-width="2"/>
  <text x="740" y="270" font-family="system-ui" font-size="14" font-weight="600" fill="#7C7CF2">Step 1: Open Settings</text>
  <text x="740" y="295" font-family="system-ui" font-size="12" fill="#A0AEC0">Click Settings in the left sidebar,</text>
  <text x="740" y="315" font-family="system-ui" font-size="12" fill="#A0AEC0">then select Business Profile.</text>
</svg>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- URL Bar -->
  <rect x="200" y="52" width="400" height="24" rx="4" fill="#0B1220"/>
  <text x="220" y="69" font-family="system-ui" font-size="12" fill="#718096">app.neono.io/staff</text>
  
  <!-- Main Content Area -->
  <rect x="60" y="84" width="1080" height="676" fill="#0f0f1a"/>
  
  <!-- Left Sidebar -->
  <rect x="60" y="84" width="220" height="676" fill="#141428"/>
  
  <!-- NeonO Logo -->
  <text x="100" y="124" font-family="system-ui" font-size="20" font-weight="bold" fill="#7C7CF2">NeonO</text>
  
  <!-- Sidebar Menu Items -->
  <rect x="75" y="150" width="190" height="44" rx="8" fill="transparent"/>
  <text x="115" y="177" font-family="system-ui" font-size="14" fill="#A0AEC0">Dashboard</text>
  
  <rect x="75" y="198" width="190" height="44" rx="8" fill="transparent"/>
  <text x="115" y="225" font-family="system-ui" font-size="14" fill="#A0AEC0">Calendar</text>
  
  <rect x="75" y="246" width="190" height="44" rx="8" fill="transparent"/>
  <text x="115" y="273" font-family="system-ui" font-size="14" fill="#A0AEC0">Clients</text>
  
  <rect x="75" y="294" width="190" height="44" rx="8" fill="transparent"/>
  <text x="115" y="321" font-family="system-ui" font-size="14" fill="#A0AEC0">Services</text>
  
  <!-- Staff - HIGHLIGHTED -->
  <rect x="75" y="342" width="190" height="44" rx="8" fill="#7C7CF2" fill-opacity="0.15"/>
  <rect x="72" y="342" width="4" height="44" rx="2" fill="#7C7CF2"/>
  <text x="115" y="369" font-family="system-ui" font-size="14" font-weight="600" fill="#7C7CF2">Staff</text>
  
  <rect x="75" y="390" width="190" height="44" rx="8" fill="transparent"/>
  <text x="115" y="417" font-family="system-ui" font-size="14" fill="#A0AEC0">Settings</text>
  
  <!-- Main Content -->
  <rect x="300" y="100" width="820" height="640" fill="#0f0f1a"/>
  
  <!-- Page Header -->
  <text x="340" y="150" font-family="system-ui" font-size="28" font-weight="bold" fill="#FFFFFF">Team Members</text>
  <text x="340" y="175" font-family="system-ui" font-size="14" fill="#718096">Manage your staff and their schedules</text>
  
  <!-- Add Team Member Button - HIGHLIGHTED -->
  <rect x="900" y="125" width="180" height="48" rx="8" fill="#7C7CF2"/>
  <text x="950" y="155" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">+ Add Team Member</text>
  
  <!-- Pulse animation on button -->
  <rect x="895" y="120" width="190" height="58" rx="10" fill="none" stroke="#7C7CF2" stroke-width="3" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Staff List Card -->
  <rect x="340" y="200" width="740" height="480" rx="12" fill="#1a1a2e"/>
  
  <!-- Search and Filter -->
  <rect x="370" y="230" width="300" height="44" rx="8" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="400" y="258" font-family="system-ui" font-size="14" fill="#718096">🔍 Search team members...</text>
  
  <!-- Filter dropdown -->
  <rect x="690" y="230" width="150" height="44" rx="8" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="720" y="258" font-family="system-ui" font-size="14" fill="#A0AEC0">All Roles</text>
  <path d="M815 252 L825 252 L820 260 Z" fill="#718096"/>
  
  <!-- Table Headers -->
  <text x="370" y="310" font-family="system-ui" font-size="12" font-weight="600" fill="#718096">NAME</text>
  <text x="550" y="310" font-family="system-ui" font-size="12" font-weight="600" fill="#718096">ROLE</text>
  <text x="700" y="310" font-family="system-ui" font-size="12" font-weight="600" fill="#718096">STATUS</text>
  <text x="850" y="310" font-family="system-ui" font-size="12" font-weight="600" fill="#718096">SERVICES</text>
  
  <line x1="370" y1="325" x2="1050" y2="325" stroke="#2D3748" stroke-width="1"/>
  
  <!-- Owner Row -->
  <rect x="360" y="335" width="710" height="70" rx="8" fill="#0f0f1a" fill-opacity="0.5"/>
  <circle cx="400" cy="370" r="24" fill="#7C7CF2" fill-opacity="0.3"/>
  <text x="391" y="377" font-family="system-ui" font-size="16" font-weight="600" fill="#7C7CF2">JD</text>
  <text x="440" y="363" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">John Doe</text>
  <text x="440" y="382" font-family="system-ui" font-size="12" fill="#718096">Owner</text>
  <rect x="550" y="355" width="70" height="28" rx="6" fill="#805AD5" fill-opacity="0.2"/>
  <text x="565" y="375" font-family="system-ui" font-size="12" fill="#805AD5">Owner</text>
  <circle cx="730" cy="370" r="6" fill="#48BB78"/>
  <text x="745" y="375" font-family="system-ui" font-size="12" fill="#48BB78">Active</text>
  <text x="850" y="375" font-family="system-ui" font-size="12" fill="#A0AEC0">All Services</text>
  
  <!-- Stylist Row -->
  <rect x="360" y="415" width="710" height="70" rx="8" fill="#0f0f1a" fill-opacity="0.5"/>
  <circle cx="400" cy="450" r="24" fill="#48BB78" fill-opacity="0.3"/>
  <text x="391" y="457" font-family="system-ui" font-size="16" font-weight="600" fill="#48BB78">SJ</text>
  <text x="440" y="443" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Sarah Johnson</text>
  <text x="440" y="462" font-family="system-ui" font-size="12" fill="#718096">Senior Stylist</text>
  <rect x="550" y="435" width="70" height="28" rx="6" fill="#48BB78" fill-opacity="0.2"/>
  <text x="563" y="455" font-family="system-ui" font-size="12" fill="#48BB78">Stylist</text>
  <circle cx="730" cy="450" r="6" fill="#48BB78"/>
  <text x="745" y="455" font-family="system-ui" font-size="12" fill="#48BB78">Active</text>
  <text x="850" y="455" font-family="system-ui" font-size="12" fill="#A0AEC0">5 Services</text>
  
  <!-- Empty state indicator -->
  <rect x="360" y="495" width="710" height="70" rx="8" fill="#0f0f1a" stroke="#2D3748" stroke-dasharray="4,4"/>
  <text x="600" y="535" font-family="system-ui" font-size="14" fill="#4A5568">+ Add your next team member</text>
  
  <!-- Stats bar at bottom -->
  <rect x="370" y="600" width="680" height="50" rx="8" fill="#0f0f1a"/>
  <text x="400" y="632" font-family="system-ui" font-size="13" fill="#718096">Team Size:</text>
  <text x="480" y="632" font-family="system-ui" font-size="13" font-weight="600" fill="#FFFFFF">2 members</text>
  <text x="600" y="632" font-family="system-ui" font-size="13" fill="#718096">Active:</text>
  <text x="655" y="632" font-family="system-ui" font-size="13" font-weight="600" fill="#48BB78">2</text>
</svg>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- Confirmation Panel -->
  <rect x="200" y="120" width="800" height="560" rx="16" fill="#1a1a2e"/>
  
  <!-- Header with checkmark -->
  <circle cx="600" cy="190" r="50" fill="#48BB78" fill-opacity="0.2"/>
  <circle cx="600" cy="190" r="35" fill="#48BB78"/>
  <text x="587" y="200" font-family="system-ui" font-size="28" fill="#FFFFFF">✓</text>
  
  <text x="600" y="270" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="bold" fill="#FFFFFF">Ready to Send Invitation</text>
  <text x="600" y="300" text-anchor="middle" font-family="system-ui" font-size="14" fill="#718096">Review the details and send the invitation</text>
  
  <!-- Summary Card -->
  <rect x="280" y="330" width="640" height="200" rx="12" fill="#0f0f1a"/>
  
  <!-- Staff Photo -->
  <circle cx="350" cy="430" r="45" fill="#7C7CF2" fill-opacity="0.3"/>
  <text x="335" y="443" font-family="system-ui" font-size="24" font-weight="bold" fill="#7C7CF2">SJ</text>
  
  <!-- Details -->
  <text x="420" y="365" font-family="system-ui" font-size="18" font-weight="600" fill="#FFFFFF">Sarah Johnson</text>
  <text x="420" y="390" font-family="system-ui" font-size="14" fill="#7C7CF2">Senior Stylist</text>
  
  <line x1="420" y1="410" x2="880" y2="410" stroke="#2D3748" stroke-width="1"/>
  
  <text x="420" y="440" font-family="system-ui" font-size="13" fill="#718096">Email</text>
  <text x="550" y="440" font-family="system-ui" font-size="13" fill="#FFFFFF">sarah@bellasalon.com</text>
  
  <text x="420" y="470" font-family="system-ui" font-size="13" fill="#718096">Role</text>
  <text x="550" y="470" font-family="system-ui" font-size="13" fill="#FFFFFF">Stylist</text>
  
  <text x="420" y="500" font-family="system-ui" font-size="13" fill="#718096">Services</text>
  <text x="550" y="500" font-family="system-ui" font-size="13" fill="#FFFFFF">3 assigned (Haircut, Color, Blowout)</text>
  
  <!-- Email Preview -->
  <rect x="280" y="545" width="640" height="70" rx="8" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2" stroke-width="1"/>
  <text x="310" y="575" font-family="system-ui" font-size="13" fill="#7C7CF2">📧 Invitation Email Preview</text>
  <text x="310" y="598" font-family="system-ui" font-size="12" fill="#A0AEC0">"Sarah, you've been invited to join Bella Salon on NeonO. Click here to set up your account..."</text>
  
  <!-- Buttons -->
  <rect x="450" y="635" width="140" height="48" rx="8" fill="transparent" stroke="#4A5568" stroke-width="1"/>
  <text x="495" y="665" font-family="system-ui" font-size="14" fill="#A0AEC0">← Back</text>
  
  <rect x="610" y="635" width="180" height="48" rx="8" fill="#7C7CF2"/>
  <text x="652" y="665" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Send Invitation</text>
  
  <!-- Pulse on button -->
  <rect x="605" y="630" width="190" height="58" rx="10" fill="none" stroke="#7C7CF2" stroke-width="3" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Success Toast (shown after send) -->
  <rect x="350" y="710" width="500" height="55" rx="10" fill="#48BB78"/>
  <circle cx="385" cy="737" r="14" fill="#FFFFFF" fill-opacity="0.2"/>
  <text x="380" y="742" font-family="system-ui" font-size="14" fill="#FFFFFF">✓</text>
  <text x="410" y="732" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Invitation sent successfully!</text>
  <text x="410" y="752" font-family="system-ui" font-size="12" fill="#FFFFFF" fill-opacity="0.8">sarah@bellasalon.com will receive an email shortly</text>
</svg>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- Add Client Modal -->
  <rect x="200" y="100" width="800" height="600" rx="16" fill="#1a1a2e"/>
  
  <!-- Header -->
  <rect x="200" y="100" width="800" height="70" rx="16" fill="#141428"/>
  <rect x="200" y="154" width="800" height="16" fill="#141428"/>
  <text x="250" y="145" font-family="system-ui" font-size="20" font-weight="bold" fill="#FFFFFF">Add New Client</text>
  <circle cx="960" cy="135" r="16" fill="#2D3748"/>
  <text x="955" y="141" font-family="system-ui" font-size="18" fill="#A0AEC0">×</text>
  
  <!-- Client Info Form -->
  <text x="250" y="210" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Client Information</text>
  
  <!-- Name Fields -->
  <text x="250" y="250" font-family="system-ui" font-size="12" fill="#718096">First Name *</text>
  <rect x="250" y="265" width="340" height="50" rx="8" fill="#0f0f1a" stroke="#7C7CF2" stroke-width="2"/>
  <text x="280" y="297" font-family="system-ui" font-size="15" fill="#FFFFFF">Jennifer</text>
  <rect x="355" y="280" width="2" height="22" fill="#7C7CF2">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <text x="610" y="250" font-family="system-ui" font-size="12" fill="#718096">Last Name *</text>
  <rect x="610" y="265" width="340" height="50" rx="8" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="640" y="297" font-family="system-ui" font-size="15" fill="#FFFFFF">Smith</text>
  
  <!-- Contact Info -->
  <text x="250" y="345" font-family="system-ui" font-size="12" fill="#718096">Email Address *</text>
  <rect x="250" y="360" width="340" height="50" rx="8" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="280" y="392" font-family="system-ui" font-size="15" fill="#FFFFFF">jennifer.smith@email.com</text>
  
  <text x="610" y="345" font-family="system-ui" font-size="12" fill="#718096">Phone Number</text>
  <rect x="610" y="360" width="340" height="50" rx="8" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="640" y="392" font-family="system-ui" font-size="15" fill="#FFFFFF">(555) 123-4567</text>
  
  <!-- Birthday -->
  <text x="250" y="440" font-family="system-ui" font-size="12" fill="#718096">Birthday (optional)</text>
  <rect x="250" y="455" width="200" height="50" rx="8" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="280" y="487" font-family="system-ui" font-size="15" fill="#718096">MM/DD</text>
  <text x="410" y="487" font-family="system-ui" font-size="16" fill="#4A5568">📅</text>
  
  <!-- Send Invite Toggle -->
  <rect x="250" y="530" width="700" height="70" rx="10" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2"/>
  <rect x="280" y="552" width="22" height="22" rx="4" fill="#7C7CF2"/>
  <text x="285" y="568" font-family="system-ui" font-size="14" fill="#FFFFFF">✓</text>
  <text x="320" y="560" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Send welcome email with booking link</text>
  <text x="320" y="582" font-family="system-ui" font-size="12" fill="#A0AEC0">Client will receive an email inviting them to book their first appointment</text>
  
  <!-- Pro Tip -->
  <rect x="250" y="620" width="700" height="40" rx="8" fill="#48BB78" fill-opacity="0.1"/>
  <text x="280" y="646" font-family="system-ui" font-size="12" fill="#48BB78">💡 Tip: Adding a phone number enables SMS appointment reminders!</text>
  
  <!-- Action Buttons -->
  <rect x="750" y="675" width="100" height="44" rx="8" fill="transparent" stroke="#4A5568"/>
  <text x="780" y="703" font-family="system-ui" font-size="14" fill="#A0AEC0">Cancel</text>
  
  <rect x="870" y="675" width="120" height="44" rx="8" fill="#7C7CF2"/>
  <text x="895" y="703" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Add Client</text>
</svg>
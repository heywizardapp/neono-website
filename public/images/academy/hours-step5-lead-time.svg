<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- URL Bar -->
  <rect x="200" y="52" width="400" height="24" rx="4" fill="#0B1220"/>
  <text x="220" y="69" font-family="system-ui" font-size="12" fill="#718096">app.neono.io/settings/booking</text>
  
  <!-- Main Content Area -->
  <rect x="60" y="84" width="1080" height="676" fill="#0f0f1a"/>
  
  <!-- Header -->
  <text x="120" y="140" font-family="system-ui" font-size="28" font-weight="bold" fill="#FFFFFF">Online Booking Settings</text>
  <text x="120" y="165" font-family="system-ui" font-size="14" fill="#718096">Control how clients book appointments</text>
  
  <!-- Lead Time Section - FOCUSED -->
  <rect x="100" y="200" width="1000" height="280" rx="16" fill="#1a1a2e" stroke="#7C7CF2" stroke-width="2"/>
  
  <text x="150" y="250" font-family="system-ui" font-size="18" font-weight="600" fill="#FFFFFF">⏰ Lead Time Requirements</text>
  <text x="150" y="275" font-family="system-ui" font-size="13" fill="#718096">How much notice do you need before an appointment?</text>
  
  <!-- Minimum Lead Time -->
  <rect x="150" y="300" width="400" height="80" rx="10" fill="#0f0f1a"/>
  <text x="180" y="330" font-family="system-ui" font-size="14" fill="#E2E8F0">Minimum booking notice</text>
  <rect x="180" y="345" width="180" height="45" rx="6" fill="#1a1a2e" stroke="#7C7CF2" stroke-width="2"/>
  <text x="210" y="375" font-family="system-ui" font-size="16" font-weight="500" fill="#FFFFFF">2 hours</text>
  <path d="M335 365 L345 365 L340 375 Z" fill="#7C7CF2"/>
  <text x="380" y="375" font-family="system-ui" font-size="12" fill="#718096">before</text>
  
  <!-- Maximum Advance -->
  <rect x="580" y="300" width="400" height="80" rx="10" fill="#0f0f1a"/>
  <text x="610" y="330" font-family="system-ui" font-size="14" fill="#E2E8F0">Maximum advance booking</text>
  <rect x="610" y="345" width="180" height="45" rx="6" fill="#1a1a2e" stroke="#2D3748"/>
  <text x="640" y="375" font-family="system-ui" font-size="16" font-weight="500" fill="#FFFFFF">30 days</text>
  <path d="M765 365 L775 365 L770 375 Z" fill="#718096"/>
  <text x="810" y="375" font-family="system-ui" font-size="12" fill="#718096">ahead</text>
  
  <!-- Visual Timeline -->
  <rect x="150" y="400" width="900" height="60" rx="8" fill="#0f0f1a"/>
  <line x1="200" y1="430" x2="1000" y2="430" stroke="#2D3748" stroke-width="2"/>
  
  <!-- Now marker -->
  <circle cx="250" cy="430" r="8" fill="#7C7CF2"/>
  <text x="235" y="420" font-family="system-ui" font-size="10" fill="#7C7CF2">Now</text>
  
  <!-- 2hr marker -->
  <circle cx="350" cy="430" r="8" fill="#48BB78"/>
  <text x="330" y="420" font-family="system-ui" font-size="10" fill="#48BB78">2 hrs</text>
  
  <!-- Bookable range -->
  <rect x="350" y="425" width="550" height="10" rx="5" fill="#48BB78" fill-opacity="0.3"/>
  
  <!-- 30 day marker -->
  <circle cx="900" cy="430" r="8" fill="#48BB78"/>
  <text x="875" y="420" font-family="system-ui" font-size="10" fill="#48BB78">30 days</text>
  
  <!-- Can't book zone -->
  <rect x="200" y="425" width="150" height="10" rx="5" fill="#FC8181" fill-opacity="0.3"/>
  <text x="230" y="455" font-family="system-ui" font-size="9" fill="#FC8181">Can't book</text>
  <text x="580" y="455" font-family="system-ui" font-size="9" fill="#48BB78">✓ Bookable window</text>
  
  <!-- Other Settings -->
  <rect x="100" y="500" width="1000" height="220" rx="16" fill="#1a1a2e"/>
  
  <text x="150" y="545" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Other Booking Controls</text>
  
  <!-- Cancellation Policy -->
  <rect x="150" y="565" width="450" height="70" rx="10" fill="#0f0f1a"/>
  <text x="180" y="595" font-family="system-ui" font-size="14" fill="#E2E8F0">Cancellation notice required</text>
  <rect x="180" y="605" width="140" height="25" rx="4" fill="#1a1a2e" stroke="#2D3748"/>
  <text x="200" y="623" font-family="system-ui" font-size="12" fill="#A0AEC0">24 hours</text>
  
  <!-- Buffer Time -->
  <rect x="620" y="565" width="450" height="70" rx="10" fill="#0f0f1a"/>
  <text x="650" y="595" font-family="system-ui" font-size="14" fill="#E2E8F0">Buffer between appointments</text>
  <rect x="650" y="605" width="140" height="25" rx="4" fill="#1a1a2e" stroke="#2D3748"/>
  <text x="670" y="623" font-family="system-ui" font-size="12" fill="#A0AEC0">15 minutes</text>
  
  <!-- Pro Tip -->
  <rect x="150" y="650" width="900" height="50" rx="8" fill="#7C7CF2" fill-opacity="0.1"/>
  <text x="180" y="682" font-family="system-ui" font-size="12" fill="#7C7CF2">💡 Pro Tip: 2-hour minimum notice prevents last-minute bookings when you're busy—adjust based on your workflow!</text>
</svg>
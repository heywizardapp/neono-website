<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- URL Bar -->
  <rect x="200" y="52" width="400" height="24" rx="4" fill="#0B1220"/>
  <text x="220" y="69" font-family="system-ui" font-size="12" fill="#718096">app.neono.io/settings/profile</text>
  
  <!-- Main Content Area -->
  <rect x="60" y="84" width="1080" height="676" fill="#0f0f1a"/>
  
  <!-- Zoomed Form Card -->
  <rect x="150" y="120" width="900" height="560" rx="16" fill="#1a1a2e"/>
  
  <!-- Section Header -->
  <text x="200" y="175" font-family="system-ui" font-size="24" font-weight="bold" fill="#FFFFFF">Contact Information</text>
  <rect x="200" y="190" width="80" height="3" rx="2" fill="#7C7CF2"/>
  
  <!-- Phone Field -->
  <text x="200" y="250" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Phone Number</text>
  <text x="310" y="250" font-family="system-ui" font-size="12" fill="#FC8181">*</text>
  <rect x="200" y="265" width="400" height="52" rx="8" fill="#0f0f1a" stroke="#2D3748" stroke-width="1"/>
  <!-- Phone Icon -->
  <rect x="215" y="280" width="30" height="22" rx="4" fill="#2D3748"/>
  <text x="223" y="296" font-family="system-ui" font-size="12" fill="#718096">📞</text>
  <text x="260" y="298" font-family="system-ui" font-size="15" fill="#FFFFFF">(416) 555-0123</text>
  <text x="200" y="335" font-family="system-ui" font-size="12" fill="#718096">Primary contact number for clients to call</text>
  
  <!-- Email Field -->
  <text x="200" y="380" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Business Email</text>
  <text x="315" y="380" font-family="system-ui" font-size="12" fill="#FC8181">*</text>
  <rect x="200" y="395" width="400" height="52" rx="8" fill="#0f0f1a" stroke="#2D3748" stroke-width="1"/>
  <!-- Email Icon -->
  <rect x="215" y="410" width="30" height="22" rx="4" fill="#2D3748"/>
  <text x="223" y="426" font-family="system-ui" font-size="12" fill="#718096">✉️</text>
  <text x="260" y="428" font-family="system-ui" font-size="15" fill="#FFFFFF">hello@bellasalon.com</text>
  <text x="200" y="465" font-family="system-ui" font-size="12" fill="#718096">Booking notifications will be sent here</text>
  
  <!-- Website Field (Optional) -->
  <text x="200" y="510" font-family="system-ui" font-size="14" font-weight="500" fill="#E2E8F0">Website</text>
  <rect x="270" y="496" width="60" height="20" rx="4" fill="#2D3748"/>
  <text x="280" y="510" font-family="system-ui" font-size="10" fill="#718096">Optional</text>
  <rect x="200" y="525" width="400" height="52" rx="8" fill="#0f0f1a" stroke="#2D3748" stroke-width="1"/>
  <!-- Globe Icon -->
  <rect x="215" y="540" width="30" height="22" rx="4" fill="#2D3748"/>
  <text x="223" y="556" font-family="system-ui" font-size="12" fill="#718096">🌐</text>
  <text x="260" y="558" font-family="system-ui" font-size="15" fill="#A0AEC0">https://bellasalon.com</text>
  <text x="200" y="595" font-family="system-ui" font-size="12" fill="#718096">Your salon's website URL (appears on booking page)</text>
  
  <!-- Right side - Info Panel -->
  <rect x="650" y="240" width="350" height="280" rx="12" fill="#0f0f1a"/>
  <text x="680" y="280" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Where clients see this</text>
  
  <!-- Contact Card Preview -->
  <rect x="680" y="300" width="290" height="90" rx="8" fill="#1a1a2e" stroke="#2D3748" stroke-width="1"/>
  <text x="700" y="330" font-family="system-ui" font-size="13" font-weight="600" fill="#FFFFFF">Bella Salon</text>
  <text x="700" y="350" font-family="system-ui" font-size="12" fill="#7C7CF2">(416) 555-0123</text>
  <text x="700" y="370" font-family="system-ui" font-size="12" fill="#7C7CF2">hello@bellasalon.com</text>
  
  <!-- Notification Preview -->
  <rect x="680" y="410" width="290" height="90" rx="8" fill="#1a1a2e" stroke="#2D3748" stroke-width="1"/>
  <text x="700" y="435" font-family="system-ui" font-size="11" fill="#718096">EMAIL NOTIFICATION</text>
  <text x="700" y="455" font-family="system-ui" font-size="12" fill="#FFFFFF">New booking received!</text>
  <text x="700" y="475" font-family="system-ui" font-size="11" fill="#718096">Sent to: hello@bellasalon.com</text>
  
  <!-- Check marks for completed fields -->
  <circle cx="585" cy="290" r="12" fill="#48BB78"/>
  <text x="580" y="295" font-family="system-ui" font-size="12" fill="#FFFFFF">✓</text>
  
  <circle cx="585" cy="420" r="12" fill="#48BB78"/>
  <text x="580" y="425" font-family="system-ui" font-size="12" fill="#FFFFFF">✓</text>
</svg>
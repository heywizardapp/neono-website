<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Main Content Area -->
  <rect x="60" y="84" width="1080" height="676" fill="#0f0f1a"/>
  
  <!-- Page Header -->
  <text x="100" y="135" font-family="system-ui" font-size="18" font-weight="600" fill="#FFFFFF">Booking Page Settings</text>
  
  <!-- Tabs -->
  <rect x="100" y="155" width="80" height="36" rx="6" fill="transparent"/>
  <text x="120" y="178" font-family="system-ui" font-size="13" fill="#A0AEC0">Design</text>
  
  <rect x="190" y="155" width="80" height="36" rx="6" fill="#7C7CF2"/>
  <text x="207" y="178" font-family="system-ui" font-size="13" fill="#FFFFFF">Content</text>
  
  <rect x="280" y="155" width="80" height="36" rx="6" fill="transparent"/>
  <text x="298" y="178" font-family="system-ui" font-size="13" fill="#A0AEC0">Settings</text>
  
  <!-- Content Editor Panel -->
  <rect x="100" y="210" width="550" height="520" rx="12" fill="#1a1a2e"/>
  
  <!-- Business Description -->
  <text x="140" y="260" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Business Description</text>
  <text x="140" y="280" font-family="system-ui" font-size="11" fill="#718096">Shown at the top of your booking page</text>
  
  <rect x="140" y="300" width="470" height="100" rx="8" fill="#0f0f1a" stroke="#7C7CF2" stroke-width="2"/>
  <text x="165" y="330" font-family="system-ui" font-size="13" fill="#FFFFFF">Welcome to Bella Salon! We specialize in precision</text>
  <text x="165" y="352" font-family="system-ui" font-size="13" fill="#FFFFFF">haircuts, vibrant color services, and relaxing spa</text>
  <text x="165" y="374" font-family="system-ui" font-size="13" fill="#FFFFFF">treatments. Book your appointment today!</text>
  <rect x="413" y="362" width="2" height="18" fill="#7C7CF2">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  <text x="565" y="390" font-family="system-ui" font-size="10" fill="#4A5568">156/300</text>
  
  <!-- Booking Message -->
  <text x="140" y="440" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Confirmation Message</text>
  <text x="140" y="460" font-family="system-ui" font-size="11" fill="#718096">Shown after a successful booking</text>
  
  <rect x="140" y="480" width="470" height="80" rx="8" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="165" y="510" font-family="system-ui" font-size="13" fill="#A0AEC0">Thank you for booking! We look forward to</text>
  <text x="165" y="532" font-family="system-ui" font-size="13" fill="#A0AEC0">seeing you. A confirmation email is on its way.</text>
  
  <!-- Policy Links -->
  <text x="140" y="595" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Policy Links (optional)</text>
  
  <rect x="140" y="615" width="220" height="45" rx="6" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="165" y="643" font-family="system-ui" font-size="12" fill="#718096">Cancellation Policy URL</text>
  
  <rect x="380" y="615" width="220" height="45" rx="6" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="405" y="643" font-family="system-ui" font-size="12" fill="#718096">Privacy Policy URL</text>
  
  <!-- Preview Panel -->
  <rect x="680" y="210" width="440" height="520" rx="12" fill="#1a1a2e"/>
  <text x="720" y="255" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Preview</text>
  
  <!-- Mini Booking Page -->
  <rect x="720" y="280" width="360" height="420" rx="10" fill="#FFFFFF"/>
  
  <!-- Header -->
  <rect x="720" y="280" width="360" height="80" rx="10" fill="#7C7CF2"/>
  <rect x="720" y="345" width="360" height="15" fill="#7C7CF2"/>
  
  <circle cx="780" cy="320" r="25" fill="#FFFFFF"/>
  <text x="768" y="328" font-family="system-ui" font-size="20" font-weight="bold" fill="#7C7CF2">B</text>
  <text x="820" y="315" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Bella Salon</text>
  <text x="820" y="338" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.8)">New York, NY</text>
  
  <!-- Description Preview -->
  <rect x="740" y="375" width="320" height="60" rx="6" fill="#F7FAFC"/>
  <text x="755" y="395" font-family="system-ui" font-size="10" fill="#4A5568">Welcome to Bella Salon! We specialize in precision</text>
  <text x="755" y="410" font-family="system-ui" font-size="10" fill="#4A5568">haircuts, vibrant color services, and relaxing spa</text>
  <text x="755" y="425" font-family="system-ui" font-size="10" fill="#4A5568">treatments. Book your appointment today!</text>
  
  <!-- Service Categories -->
  <text x="755" y="460" font-family="system-ui" font-size="12" font-weight="500" fill="#1a1a2e">Select a service</text>
  
  <rect x="740" y="475" width="320" height="45" rx="6" fill="#F7FAFC" stroke="#E2E8F0"/>
  <text x="760" y="498" font-family="system-ui" font-size="11" fill="#1a1a2e">✂️ Hair Services</text>
  <text x="1020" y="498" font-family="system-ui" font-size="11" fill="#718096">→</text>
  
  <rect x="740" y="530" width="320" height="45" rx="6" fill="#F7FAFC" stroke="#E2E8F0"/>
  <text x="760" y="553" font-family="system-ui" font-size="11" fill="#1a1a2e">💅 Nail Services</text>
  <text x="1020" y="553" font-family="system-ui" font-size="11" fill="#718096">→</text>
  
  <rect x="740" y="585" width="320" height="45" rx="6" fill="#F7FAFC" stroke="#E2E8F0"/>
  <text x="760" y="608" font-family="system-ui" font-size="11" fill="#1a1a2e">🧖 Spa Services</text>
  <text x="1020" y="608" font-family="system-ui" font-size="11" fill="#718096">→</text>
  
  <!-- Footer Links -->
  <text x="800" y="675" font-family="system-ui" font-size="9" fill="#718096">Cancellation Policy</text>
  <text x="910" y="675" font-family="system-ui" font-size="9" fill="#718096">Privacy Policy</text>
</svg>
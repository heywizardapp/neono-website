  <!-- Note about Select All -->
  <rect x="110" y="350" width="380" height="24" rx="6" fill="#7C7CF2" fill-opacity="0.1"/>
  <text x="300" y="367" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7C7CF2" text-anchor="middle">💡 "Select All" is ideal for holidays and business closures</text>

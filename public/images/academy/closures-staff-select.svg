  <text x="420" y="174" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7C7CF2">5 selected</text>
  
  <!-- Staff 1 - Sarah (auto-selected) -->
  <rect x="110" y="198" width="380" height="44" rx="8" fill="transparent"/>
  <rect x="126" y="212" width="20" height="20" rx="4" fill="#7C7CF2" fill-opacity="0.5"/>

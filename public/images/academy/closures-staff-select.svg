  <rect x="110" y="298" width="380" height="44" rx="8" fill="transparent"/>
  <rect x="126" y="312" width="20" height="20" rx="4" fill="#7C7CF2" fill-opacity="0.5"/>
  <text x="131" y="327" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#9999aa">✓</text>
  <circle cx="170" cy="320" r="14" fill="#34D399"/>
  <text x="163" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fff">EB</text>

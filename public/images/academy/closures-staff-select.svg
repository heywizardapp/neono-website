  <text x="163" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fff">SM</text>
  <text x="195" y="217" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#9999aa">Sarah Martinez</text>
  <text x="195" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Senior Stylist</text>
  
  <!-- Staff 2 - James -->
  <rect x="110" y="248" width="380" height="44" rx="8" fill="transparent"/>
  <rect x="126" y="262" width="20" height="20" rx="4" fill="#7C7CF2" fill-opacity="0.5"/>
  <text x="131" y="277" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#9999aa">✓</text>
  <circle cx="170" cy="270" r="14" fill="#60A5FA"/>
  <text x="163" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fff">JW</text>
  <text x="195" y="267" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#9999aa">James Wilson</text>
  <text x="195" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Stylist</text>
  

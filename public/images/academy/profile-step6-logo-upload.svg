<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
    <pattern id="dashed" patternUnits="userSpaceOnUse" width="12" height="12">
      <path d="M0 6 L12 6" stroke="#7C7CF2" stroke-width="2" stroke-dasharray="4,4"/>
    </pattern>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- URL Bar -->
  <rect x="200" y="52" width="400" height="24" rx="4" fill="#0B1220"/>
  <text x="220" y="69" font-family="system-ui" font-size="12" fill="#718096">app.neono.io/settings/profile</text>
  
  <!-- Main Content Area -->
  <rect x="60" y="84" width="1080" height="676" fill="#0f0f1a"/>
  
  <!-- Logo Upload Card -->
  <rect x="150" y="130" width="520" height="520" rx="16" fill="#1a1a2e"/>
  
  <!-- Section Header -->
  <text x="200" y="185" font-family="system-ui" font-size="24" font-weight="bold" fill="#FFFFFF">Business Logo</text>
  <rect x="200" y="200" width="80" height="3" rx="2" fill="#7C7CF2"/>
  
  <!-- Upload Zone -->
  <rect x="200" y="240" width="420" height="220" rx="12" fill="#0f0f1a" stroke="#7C7CF2" stroke-width="2" stroke-dasharray="8,4"/>
  
  <!-- Upload Icon -->
  <circle cx="410" cy="310" r="40" fill="#7C7CF2" fill-opacity="0.1"/>
  <rect x="395" y="295" width="30" height="4" rx="2" fill="#7C7CF2"/>
  <rect x="408" y="282" width="4" height="30" rx="2" fill="#7C7CF2"/>
  <path d="M395 330 L410 315 L425 330" stroke="#7C7CF2" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <text x="410" y="380" text-anchor="middle" font-family="system-ui" font-size="16" fill="#FFFFFF">Drag and drop your logo here</text>
  <text x="410" y="405" text-anchor="middle" font-family="system-ui" font-size="13" fill="#718096">or</text>
  
  <!-- Choose File Button -->
  <rect x="340" y="420" width="140" height="40" rx="8" fill="#7C7CF2"/>
  <text x="410" y="446" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Choose File</text>
  
  <!-- File Requirements -->
  <text x="200" y="500" font-family="system-ui" font-size="12" fill="#718096">Accepted formats: PNG, JPG, SVG</text>
  <text x="200" y="520" font-family="system-ui" font-size="12" fill="#718096">Recommended size: 500×500px</text>
  <text x="200" y="540" font-family="system-ui" font-size="12" fill="#718096">Maximum file size: 5MB</text>
  
  <!-- Remove button (greyed out) -->
  <rect x="200" y="570" width="120" height="36" rx="6" fill="transparent" stroke="#4A5568" stroke-width="1"/>
  <text x="225" y="593" font-family="system-ui" font-size="13" fill="#4A5568">Remove Logo</text>
  
  <!-- Right Side - Preview Panel -->
  <rect x="710" y="130" width="420" height="520" rx="16" fill="#1a1a2e"/>
  
  <text x="760" y="185" font-family="system-ui" font-size="20" font-weight="600" fill="#FFFFFF">Preview</text>
  
  <!-- Logo Preview Circle -->
  <circle cx="920" cy="300" r="80" fill="#7C7CF2" fill-opacity="0.2" stroke="#7C7CF2" stroke-width="2"/>
  <text x="920" y="290" text-anchor="middle" font-family="system-ui" font-size="32" font-weight="bold" fill="#7C7CF2">BS</text>
  <text x="920" y="320" text-anchor="middle" font-family="system-ui" font-size="12" fill="#7C7CF2">Bella Salon</text>
  
  <!-- Where it appears -->
  <text x="760" y="420" font-family="system-ui" font-size="14" font-weight="500" fill="#718096">Your logo appears on:</text>
  
  <!-- Booking page preview -->
  <rect x="760" y="440" width="350" height="50" rx="8" fill="#0f0f1a"/>
  <circle cx="790" cy="465" r="15" fill="#7C7CF2" fill-opacity="0.3"/>
  <text x="788" y="470" font-family="system-ui" font-size="10" font-weight="bold" fill="#7C7CF2">BS</text>
  <text x="815" y="460" font-family="system-ui" font-size="11" fill="#718096">Booking Page Header</text>
  <text x="815" y="478" font-family="system-ui" font-size="13" font-weight="500" fill="#FFFFFF">Bella Salon</text>
  
  <!-- Email preview -->
  <rect x="760" y="500" width="350" height="50" rx="8" fill="#0f0f1a"/>
  <circle cx="790" cy="525" r="15" fill="#7C7CF2" fill-opacity="0.3"/>
  <text x="788" y="530" font-family="system-ui" font-size="10" font-weight="bold" fill="#7C7CF2">BS</text>
  <text x="815" y="520" font-family="system-ui" font-size="11" fill="#718096">Email Templates</text>
  <text x="815" y="538" font-family="system-ui" font-size="13" font-weight="500" fill="#FFFFFF">Booking confirmations</text>
  
  <!-- Receipt preview -->
  <rect x="760" y="560" width="350" height="50" rx="8" fill="#0f0f1a"/>
  <circle cx="790" cy="585" r="15" fill="#7C7CF2" fill-opacity="0.3"/>
  <text x="788" y="590" font-family="system-ui" font-size="10" font-weight="bold" fill="#7C7CF2">BS</text>
  <text x="815" y="580" font-family="system-ui" font-size="11" fill="#718096">Printed Receipts</text>
  <text x="815" y="598" font-family="system-ui" font-size="13" font-weight="500" fill="#FFFFFF">Checkout receipts</text>
</svg>
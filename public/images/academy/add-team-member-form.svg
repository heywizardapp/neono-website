<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser Chrome -->
  <rect width="1200" height="800" rx="12" fill="#1a1a2e"/>
  <rect x="1" y="1" width="1198" height="798" rx="11" fill="white" stroke="#e5e7eb"/>
  
  <!-- Browser Header -->
  <rect x="1" y="1" width="1198" height="52" rx="11" fill="#f9fafb"/>
  <rect x="1" y="40" width="1198" height="13" fill="#f9fafb"/>
  <line x1="1" y1="53" x2="1199" y2="53" stroke="#e5e7eb"/>
  
  <!-- Traffic Lights -->
  <circle cx="24" cy="27" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="27" r="6" fill="#febc2e"/>
  <circle cx="64" cy="27" r="6" fill="#28c840"/>
  
  <!-- URL Bar -->
  <rect x="200" y="14" width="800" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="220" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">app.neono.io/staff</text>
  
  <!-- Background Content (Dimmed) -->
  <rect x="1" y="53" width="1198" height="746" fill="#0B1220" fill-opacity="0.5"/>
  
  <!-- Modal Backdrop Blur Effect -->
  <rect x="1" y="53" width="1198" height="746" fill="white" fill-opacity="0.1"/>
  
  <!-- Modal Container -->
  <rect x="300" y="100" width="600" height="600" rx="16" fill="white" filter="url(#shadow)"/>
  
  <!-- Shadow Filter -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Modal Header -->
  <rect x="300" y="100" width="600" height="60" rx="16" fill="white"/>
  <rect x="300" y="140" width="600" height="20" fill="white"/>
  <line x1="300" y1="160" x2="900" y2="160" stroke="#e5e7eb"/>
  
  <text x="340" y="138" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#0B1220">Add Team Member</text>
  
  <!-- Close Button -->
  <circle cx="868" cy="130" r="16" fill="#f1f5f9"/>
  <path d="M862 124 L874 136 M874 124 L862 136" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Modal Content -->
  <!-- Avatar Upload -->
  <circle cx="600" cy="220" r="40" fill="#f1f5f9" stroke="#e5e7eb" stroke-dasharray="4 4"/>
  <text x="587" y="228" font-family="system-ui, sans-serif" font-size="24" fill="#9ca3af">+</text>
  <text x="562" y="278" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Add Photo</text>
  
  <!-- Full Name Field -->
  <text x="340" y="320" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#374151">Full Name *</text>
  <rect x="340" y="332" width="520" height="44" rx="8" fill="white" stroke="#d1d5db"/>
  <text x="356" y="360" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af">Enter staff member's name</text>
  
  <!-- Email Field -->
  <text x="340" y="400" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#374151">Email Address *</text>
  <rect x="340" y="412" width="520" height="44" rx="8" fill="white" stroke="#d1d5db"/>
  <text x="356" y="440" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af">email@example.com</text>
  
  <!-- Role Dropdown -->
  <text x="340" y="480" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#374151">Role *</text>
  <rect x="340" y="492" width="250" height="44" rx="8" fill="white" stroke="#7C7CF2" stroke-width="2"/>
  <text x="356" y="520" font-family="system-ui, sans-serif" font-size="14" fill="#111827">Stylist</text>
  <path d="M562 512 L570 520 L578 512" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Dropdown Options (shown) -->
  <rect x="340" y="540" width="250" height="120" rx="8" fill="white" stroke="#e5e7eb" filter="url(#shadow)"/>
  <text x="356" y="568" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Owner</text>
  <text x="356" y="596" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Manager</text>
  <rect x="348" y="608" width="234" height="28" rx="4" fill="#7C7CF2" fill-opacity="0.1"/>
  <text x="356" y="626" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#7C7CF2">Stylist</text>
  <text x="356" y="654" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Receptionist</text>
  
  <!-- Job Title Field -->
  <text x="610" y="480" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#374151">Job Title</text>
  <rect x="610" y="492" width="250" height="44" rx="8" fill="white" stroke="#d1d5db"/>
  <text x="626" y="520" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af">e.g., Senior Stylist</text>
  
  <!-- Services Section Label -->
  <text x="340" y="700" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#374151">Assign Services</text>
  <text x="470" y="700" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">(Select which services they can perform)</text>
  
  <!-- Modal Footer -->
  <rect x="300" y="640" width="600" height="60" rx="0" fill="#f9fafb"/>
  <rect x="300" y="684" width="600" height="16" rx="16" fill="#f9fafb"/>
  
  <!-- Footer Buttons -->
  <rect x="608" y="652" width="130" height="40" rx="8" fill="#7C7CF2"/>
  <text x="628" y="678" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="white">Send Invitation</text>
  
  <rect x="500" y="652" width="96" height="40" rx="8" fill="white" stroke="#d1d5db"/>
  <text x="528" y="678" font-family="system-ui, sans-serif" font-size="13" fill="#374151">Cancel</text>
  
  <!-- Progress Indicator -->
  <text x="352" y="678" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Step 1 of 3: Basic Info</text>
</svg>
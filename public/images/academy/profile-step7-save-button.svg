<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- URL Bar -->
  <rect x="200" y="52" width="400" height="24" rx="4" fill="#0B1220"/>
  <text x="220" y="69" font-family="system-ui" font-size="12" fill="#718096">app.neono.io/settings/profile</text>
  
  <!-- Main Content Area -->
  <rect x="60" y="84" width="1080" height="676" fill="#0f0f1a"/>
  
  <!-- Form Card (showing bottom portion) -->
  <rect x="150" y="120" width="900" height="540" rx="16" fill="#1a1a2e"/>
  
  <!-- Showing "bottom of form" indicator -->
  <rect x="200" y="140" width="800" height="60" rx="8" fill="#0f0f1a" fill-opacity="0.5"/>
  <text x="600" y="178" text-anchor="middle" font-family="system-ui" font-size="14" fill="#4A5568">• • • Form fields above • • •</text>
  
  <!-- Summary Section -->
  <rect x="200" y="220" width="800" height="180" rx="12" fill="#0f0f1a"/>
  <text x="240" y="260" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Profile Summary</text>
  
  <!-- Summary items with checkmarks -->
  <circle cx="260" cy="300" r="12" fill="#48BB78"/>
  <text x="255" y="305" font-family="system-ui" font-size="12" fill="#FFFFFF">✓</text>
  <text x="285" y="305" font-family="system-ui" font-size="14" fill="#FFFFFF">Business Name</text>
  <text x="500" y="305" font-family="system-ui" font-size="14" fill="#718096">Bella Salon</text>
  
  <circle cx="260" cy="335" r="12" fill="#48BB78"/>
  <text x="255" y="340" font-family="system-ui" font-size="12" fill="#FFFFFF">✓</text>
  <text x="285" y="340" font-family="system-ui" font-size="14" fill="#FFFFFF">Contact Info</text>
  <text x="500" y="340" font-family="system-ui" font-size="14" fill="#718096">(416) 555-0123 • hello@bellasalon.com</text>
  
  <circle cx="260" cy="370" r="12" fill="#48BB78"/>
  <text x="255" y="375" font-family="system-ui" font-size="12" fill="#FFFFFF">✓</text>
  <text x="285" y="375" font-family="system-ui" font-size="14" fill="#FFFFFF">Address</text>
  <text x="500" y="375" font-family="system-ui" font-size="14" fill="#718096">123 Main Street, Toronto, ON</text>
  
  <!-- Unsaved Changes Warning -->
  <rect x="200" y="420" width="800" height="50" rx="8" fill="#ECC94B" fill-opacity="0.1" stroke="#ECC94B" stroke-width="1"/>
  <text x="240" y="452" font-family="system-ui" font-size="14" fill="#ECC94B">⚠️ You have unsaved changes</text>
  
  <!-- Button Row -->
  <rect x="200" y="490" width="800" height="80" fill="transparent"/>
  
  <!-- Cancel Button -->
  <rect x="650" y="505" width="140" height="50" rx="8" fill="transparent" stroke="#4A5568" stroke-width="1"/>
  <text x="720" y="537" text-anchor="middle" font-family="system-ui" font-size="15" fill="#A0AEC0">Cancel</text>
  
  <!-- Save Changes Button - HIGHLIGHTED -->
  <rect x="810" y="505" width="180" height="50" rx="8" fill="#7C7CF2"/>
  <text x="900" y="537" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="600" fill="#FFFFFF">Save Changes</text>
  
  <!-- Pulse animation indicator -->
  <rect x="805" y="500" width="190" height="60" rx="10" fill="none" stroke="#7C7CF2" stroke-width="3" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="3;6;3" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Success Toast (positioned at top) -->
  <rect x="400" y="580" width="400" height="60" rx="12" fill="#48BB78"/>
  <circle cx="440" cy="610" r="16" fill="#FFFFFF" fill-opacity="0.2"/>
  <text x="435" y="616" font-family="system-ui" font-size="16" fill="#FFFFFF">✓</text>
  <text x="470" y="605" font-family="system-ui" font-size="15" font-weight="600" fill="#FFFFFF">Profile updated successfully!</text>
  <text x="470" y="625" font-family="system-ui" font-size="12" fill="#FFFFFF" fill-opacity="0.8">Your changes are now live</text>
  
  <!-- Arrow pointing to save button -->
  <path d="M760 530 L795 530" stroke="#7C7CF2" stroke-width="3" stroke-dasharray="5,3"/>
  <path d="M785 520 L800 530 L785 540" fill="#7C7CF2"/>
  
  <!-- Instruction text -->
  <rect x="550" y="570" width="220" height="60" rx="8" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2" stroke-width="1"/>
  <text x="570" y="595" font-family="system-ui" font-size="12" fill="#7C7CF2">Click Save Changes to apply</text>
  <text x="570" y="615" font-family="system-ui" font-size="12" fill="#7C7CF2">your profile settings.</text>
</svg>
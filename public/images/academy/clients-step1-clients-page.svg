<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- URL Bar -->
  <rect x="200" y="52" width="400" height="24" rx="4" fill="#0B1220"/>
  <text x="220" y="69" font-family="system-ui" font-size="12" fill="#718096">app.neono.io/clients</text>
  
  <!-- Main Content Area -->
  <rect x="60" y="84" width="1080" height="676" fill="#0f0f1a"/>
  
  <!-- Left Sidebar -->
  <rect x="60" y="84" width="220" height="676" fill="#141428"/>
  <text x="100" y="124" font-family="system-ui" font-size="20" font-weight="bold" fill="#7C7CF2">NeonO</text>
  
  <!-- Sidebar Items -->
  <text x="115" y="177" font-family="system-ui" font-size="14" fill="#A0AEC0">Dashboard</text>
  <text x="115" y="225" font-family="system-ui" font-size="14" fill="#A0AEC0">Calendar</text>
  
  <!-- Clients - HIGHLIGHTED -->
  <rect x="75" y="240" width="190" height="44" rx="8" fill="#7C7CF2" fill-opacity="0.15"/>
  <rect x="72" y="240" width="4" height="44" rx="2" fill="#7C7CF2"/>
  <text x="115" y="267" font-family="system-ui" font-size="14" font-weight="600" fill="#7C7CF2">Clients</text>
  
  <text x="115" y="321" font-family="system-ui" font-size="14" fill="#A0AEC0">Services</text>
  <text x="115" y="369" font-family="system-ui" font-size="14" fill="#A0AEC0">Staff</text>
  <text x="115" y="417" font-family="system-ui" font-size="14" fill="#A0AEC0">Settings</text>
  
  <!-- Main Content -->
  <rect x="300" y="100" width="820" height="640" fill="#0f0f1a"/>
  
  <!-- Page Header -->
  <text x="340" y="150" font-family="system-ui" font-size="28" font-weight="bold" fill="#FFFFFF">Clients</text>
  <text x="340" y="175" font-family="system-ui" font-size="14" fill="#718096">Manage your client database</text>
  
  <!-- Action Buttons -->
  <rect x="820" y="125" width="130" height="48" rx="8" fill="#7C7CF2"/>
  <text x="850" y="155" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">+ Add Client</text>
  
  <!-- Pulse animation -->
  <rect x="815" y="120" width="140" height="58" rx="10" fill="none" stroke="#7C7CF2" stroke-width="3" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="960" y="125" width="100" height="48" rx="8" fill="transparent" stroke="#4A5568"/>
  <text x="985" y="155" font-family="system-ui" font-size="14" fill="#A0AEC0">Import</text>
  
  <!-- Search and Filters -->
  <rect x="340" y="200" width="350" height="44" rx="8" fill="#1a1a2e" stroke="#2D3748"/>
  <text x="370" y="228" font-family="system-ui" font-size="14" fill="#718096">🔍 Search clients...</text>
  
  <rect x="710" y="200" width="150" height="44" rx="8" fill="#1a1a2e" stroke="#2D3748"/>
  <text x="740" y="228" font-family="system-ui" font-size="14" fill="#A0AEC0">All Clients</text>
  <path d="M835 220 L845 220 L840 230 Z" fill="#718096"/>
  
  <!-- Stats Cards -->
  <rect x="340" y="265" width="200" height="80" rx="10" fill="#1a1a2e"/>
  <text x="370" y="300" font-family="system-ui" font-size="12" fill="#718096">Total Clients</text>
  <text x="370" y="330" font-family="system-ui" font-size="24" font-weight="bold" fill="#FFFFFF">0</text>
  
  <rect x="560" y="265" width="200" height="80" rx="10" fill="#1a1a2e"/>
  <text x="590" y="300" font-family="system-ui" font-size="12" fill="#718096">New This Month</text>
  <text x="590" y="330" font-family="system-ui" font-size="24" font-weight="bold" fill="#FFFFFF">0</text>
  
  <rect x="780" y="265" width="200" height="80" rx="10" fill="#1a1a2e"/>
  <text x="810" y="300" font-family="system-ui" font-size="12" fill="#718096">Active Bookings</text>
  <text x="810" y="330" font-family="system-ui" font-size="24" font-weight="bold" fill="#FFFFFF">0</text>
  
  <!-- Empty State -->
  <rect x="340" y="365" width="740" height="350" rx="12" fill="#1a1a2e"/>
  
  <!-- Empty Illustration -->
  <circle cx="710" cy="480" r="60" fill="#7C7CF2" fill-opacity="0.1"/>
  <text x="685" y="495" font-family="system-ui" font-size="48" fill="#7C7CF2">👥</text>
  
  <text x="610" y="570" font-family="system-ui" font-size="18" font-weight="600" fill="#FFFFFF">No clients yet</text>
  <text x="550" y="600" font-family="system-ui" font-size="14" fill="#718096">Add your first client to get started, or import</text>
  <text x="575" y="620" font-family="system-ui" font-size="14" fill="#718096">existing clients from a CSV file.</text>
  
  <!-- Empty State Actions -->
  <rect x="560" y="650" width="140" height="44" rx="8" fill="#7C7CF2"/>
  <text x="590" y="678" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">+ Add Client</text>
  
  <rect x="720" y="650" width="140" height="44" rx="8" fill="transparent" stroke="#7C7CF2"/>
  <text x="750" y="678" font-family="system-ui" font-size="14" fill="#7C7CF2">Import CSV</text>
</svg>
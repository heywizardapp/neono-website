<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- New Appointment Modal -->
  <rect x="150" y="90" width="900" height="620" rx="16" fill="#1a1a2e"/>
  
  <!-- Modal Header -->
  <rect x="150" y="90" width="900" height="70" rx="16" fill="#141428"/>
  <rect x="150" y="144" width="900" height="16" fill="#141428"/>
  <text x="200" y="135" font-family="system-ui" font-size="20" font-weight="bold" fill="#FFFFFF">📅 New Appointment</text>
  <circle cx="1010" cy="125" r="16" fill="#2D3748"/>
  <text x="1005" y="131" font-family="system-ui" font-size="18" fill="#A0AEC0">×</text>
  
  <!-- Progress Steps -->
  <rect x="200" y="180" width="800" height="50" rx="10" fill="#0f0f1a"/>
  
  <circle cx="280" cy="205" r="16" fill="#7C7CF2"/>
  <text x="275" y="210" font-family="system-ui" font-size="11" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="255" y="235" font-family="system-ui" font-size="10" fill="#7C7CF2">Client</text>
  
  <line x1="305" y1="205" x2="395" y2="205" stroke="#4A5568" stroke-width="2"/>
  
  <circle cx="420" cy="205" r="16" fill="#2D3748"/>
  <text x="415" y="210" font-family="system-ui" font-size="11" fill="#718096">2</text>
  <text x="395" y="235" font-family="system-ui" font-size="10" fill="#718096">Service</text>
  
  <line x1="445" y1="205" x2="535" y2="205" stroke="#4A5568" stroke-width="2"/>
  
  <circle cx="560" cy="205" r="16" fill="#2D3748"/>
  <text x="555" y="210" font-family="system-ui" font-size="11" fill="#718096">3</text>
  <text x="545" y="235" font-family="system-ui" font-size="10" fill="#718096">Staff</text>
  
  <line x1="585" y1="205" x2="675" y2="205" stroke="#4A5568" stroke-width="2"/>
  
  <circle cx="700" cy="205" r="16" fill="#2D3748"/>
  <text x="695" y="210" font-family="system-ui" font-size="11" fill="#718096">4</text>
  <text x="680" y="235" font-family="system-ui" font-size="10" fill="#718096">Time</text>
  
  <line x1="725" y1="205" x2="815" y2="205" stroke="#4A5568" stroke-width="2"/>
  
  <circle cx="840" cy="205" r="16" fill="#2D3748"/>
  <text x="835" y="210" font-family="system-ui" font-size="11" fill="#718096">5</text>
  <text x="815" y="235" font-family="system-ui" font-size="10" fill="#718096">Confirm</text>
  
  <!-- Client Selection Section -->
  <text x="200" y="290" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Select or Add Client</text>
  
  <!-- Search Field -->
  <rect x="200" y="310" width="800" height="50" rx="8" fill="#0f0f1a" stroke="#7C7CF2" stroke-width="2"/>
  <text x="240" y="342" font-family="system-ui" font-size="14" fill="#FFFFFF">Search clients...</text>
  <rect x="392" y="328" width="2" height="18" fill="#7C7CF2">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  <text x="960" y="342" font-family="system-ui" font-size="18" fill="#718096">🔍</text>
  
  <!-- Quick Add -->
  <rect x="200" y="375" width="240" height="44" rx="8" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2"/>
  <text x="230" y="403" font-family="system-ui" font-size="14" fill="#7C7CF2">+ Add Walk-in Client</text>
  
  <!-- Recent Clients -->
  <text x="200" y="455" font-family="system-ui" font-size="14" font-weight="500" fill="#A0AEC0">Recent Clients</text>
  
  <!-- Client Cards -->
  <rect x="200" y="475" width="380" height="80" rx="10" fill="#0f0f1a" stroke="#2D3748"/>
  <circle cx="250" cy="515" r="25" fill="#7C7CF2" fill-opacity="0.3"/>
  <text x="238" y="523" font-family="system-ui" font-size="14" font-weight="bold" fill="#7C7CF2">JS</text>
  <text x="290" y="505" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Jennifer Smith</text>
  <text x="290" y="525" font-family="system-ui" font-size="12" fill="#718096">jennifer.smith@email.com</text>
  <text x="290" y="543" font-family="system-ui" font-size="11" fill="#48BB78">Last visit: First time</text>
  
  <rect x="600" y="475" width="380" height="80" rx="10" fill="#0f0f1a" stroke="#7C7CF2" stroke-width="2"/>
  <rect x="595" y="470" width="390" height="90" rx="12" fill="none" stroke="#7C7CF2" stroke-width="2" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <circle cx="650" cy="515" r="25" fill="#48BB78" fill-opacity="0.3"/>
  <text x="635" y="523" font-family="system-ui" font-size="14" font-weight="bold" fill="#48BB78">MB</text>
  <text x="690" y="505" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Michelle Brown</text>
  <text x="690" y="525" font-family="system-ui" font-size="12" fill="#718096">michelle.b@email.com</text>
  <text x="690" y="543" font-family="system-ui" font-size="11" fill="#A0AEC0">Last visit: Dec 10, 2024</text>
  <circle cx="940" cy="515" r="14" fill="#7C7CF2"/>
  <text x="935" y="521" font-family="system-ui" font-size="12" fill="#FFFFFF">✓</text>
  
  <rect x="200" y="570" width="380" height="80" rx="10" fill="#0f0f1a" stroke="#2D3748"/>
  <circle cx="250" cy="610" r="25" fill="#ED8936" fill-opacity="0.3"/>
  <text x="236" y="618" font-family="system-ui" font-size="14" font-weight="bold" fill="#ED8936">AJ</text>
  <text x="290" y="600" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Alex Johnson</text>
  <text x="290" y="620" font-family="system-ui" font-size="12" fill="#718096">alex.j@company.com</text>
  <text x="290" y="638" font-family="system-ui" font-size="11" fill="#A0AEC0">Last visit: Dec 15, 2024</text>
  
  <rect x="600" y="570" width="380" height="80" rx="10" fill="#0f0f1a" stroke="#2D3748"/>
  <circle cx="650" cy="610" r="25" fill="#FC8181" fill-opacity="0.3"/>
  <text x="634" y="618" font-family="system-ui" font-size="14" font-weight="bold" fill="#FC8181">RW</text>
  <text x="690" y="600" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Rachel Wilson</text>
  <text x="690" y="620" font-family="system-ui" font-size="12" fill="#718096">rachel.w@email.com</text>
  <text x="690" y="638" font-family="system-ui" font-size="11" fill="#718096">Last visit: Nov 5, 2024</text>
  
  <!-- Action Button -->
  <rect x="870" y="665" width="120" height="44" rx="8" fill="#7C7CF2"/>
  <text x="895" y="693" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Continue →</text>
</svg>
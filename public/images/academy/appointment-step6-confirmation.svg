<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- Modal -->
  <rect x="200" y="100" width="800" height="600" rx="16" fill="#1a1a2e"/>
  
  <!-- Modal Header -->
  <rect x="200" y="100" width="800" height="70" rx="16" fill="#141428"/>
  <rect x="200" y="154" width="800" height="16" fill="#141428"/>
  <text x="250" y="145" font-family="system-ui" font-size="20" font-weight="bold" fill="#FFFFFF">📅 Confirm Appointment</text>
  <circle cx="960" cy="135" r="16" fill="#2D3748"/>
  <text x="955" y="141" font-family="system-ui" font-size="18" fill="#A0AEC0">×</text>
  
  <!-- Progress Steps - Step 5 Active -->
  <rect x="250" y="190" width="700" height="50" rx="10" fill="#0f0f1a"/>
  
  <circle cx="320" cy="215" r="14" fill="#48BB78"/>
  <text x="314" y="221" font-family="system-ui" font-size="11" fill="#FFFFFF">✓</text>
  
  <line x1="340" y1="215" x2="420" y2="215" stroke="#48BB78" stroke-width="2"/>
  
  <circle cx="450" cy="215" r="14" fill="#48BB78"/>
  <text x="444" y="221" font-family="system-ui" font-size="11" fill="#FFFFFF">✓</text>
  
  <line x1="470" y1="215" x2="550" y2="215" stroke="#48BB78" stroke-width="2"/>
  
  <circle cx="580" cy="215" r="14" fill="#48BB78"/>
  <text x="574" y="221" font-family="system-ui" font-size="11" fill="#FFFFFF">✓</text>
  
  <line x1="600" y1="215" x2="680" y2="215" stroke="#48BB78" stroke-width="2"/>
  
  <circle cx="710" cy="215" r="14" fill="#48BB78"/>
  <text x="704" y="221" font-family="system-ui" font-size="11" fill="#FFFFFF">✓</text>
  
  <line x1="730" y1="215" x2="810" y2="215" stroke="#48BB78" stroke-width="2"/>
  
  <circle cx="840" cy="215" r="14" fill="#7C7CF2"/>
  <text x="835" y="220" font-family="system-ui" font-size="10" font-weight="bold" fill="#FFFFFF">5</text>
  
  <!-- Confirmation Card -->
  <rect x="250" y="260" width="700" height="280" rx="16" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2"/>
  
  <!-- Appointment Summary -->
  <text x="300" y="305" font-family="system-ui" font-size="18" font-weight="bold" fill="#FFFFFF">Appointment Summary</text>
  
  <!-- Client Info -->
  <rect x="300" y="330" width="300" height="80" rx="10" fill="#0f0f1a"/>
  <text x="330" y="358" font-family="system-ui" font-size="12" fill="#718096">CLIENT</text>
  <circle cx="340" cy="390" r="16" fill="#48BB78" fill-opacity="0.3"/>
  <text x="330" y="396" font-family="system-ui" font-size="11" font-weight="bold" fill="#48BB78">MB</text>
  <text x="370" y="385" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Michelle Brown</text>
  <text x="370" y="405" font-family="system-ui" font-size="12" fill="#718096">michelle.b@email.com</text>
  
  <!-- Service Info -->
  <rect x="620" y="330" width="280" height="80" rx="10" fill="#0f0f1a"/>
  <text x="650" y="358" font-family="system-ui" font-size="12" fill="#718096">SERVICE</text>
  <text x="650" y="385" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">✂️ Women's Haircut</text>
  <text x="650" y="405" font-family="system-ui" font-size="12" fill="#718096">45 minutes</text>
  
  <!-- Date & Time -->
  <rect x="300" y="425" width="300" height="80" rx="10" fill="#0f0f1a"/>
  <text x="330" y="453" font-family="system-ui" font-size="12" fill="#718096">DATE &amp; TIME</text>
  <text x="330" y="480" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">📅 Tuesday, December 17, 2024</text>
  <text x="330" y="500" font-family="system-ui" font-size="14" fill="#7C7CF2">🕐 11:00 AM - 11:45 AM</text>
  
  <!-- Staff & Price -->
  <rect x="620" y="425" width="280" height="80" rx="10" fill="#0f0f1a"/>
  <text x="650" y="453" font-family="system-ui" font-size="12" fill="#718096">STAFF &amp; PRICE</text>
  <text x="650" y="480" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">👩 Sarah (Senior Stylist)</text>
  <text x="650" y="500" font-family="system-ui" font-size="18" font-weight="bold" fill="#48BB78">$65.00</text>
  
  <!-- Notes Field -->
  <text x="250" y="575" font-family="system-ui" font-size="12" fill="#718096">Add appointment notes (optional)</text>
  <rect x="250" y="590" width="700" height="60" rx="8" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="280" y="625" font-family="system-ui" font-size="14" fill="#4A5568">e.g., Client prefers layers, allergic to certain products...</text>
  
  <!-- Notification Options -->
  <rect x="250" y="665" width="350" height="50" rx="8" fill="#0f0f1a"/>
  <rect x="280" y="682" width="18" height="18" rx="4" fill="#7C7CF2"/>
  <text x="285" y="695" font-family="system-ui" font-size="12" fill="#FFFFFF">✓</text>
  <text x="310" y="695" font-family="system-ui" font-size="13" fill="#FFFFFF">Send confirmation email to client</text>
  
  <rect x="620" y="665" width="330" height="50" rx="8" fill="#0f0f1a"/>
  <rect x="650" y="682" width="18" height="18" rx="4" fill="#7C7CF2"/>
  <text x="655" y="695" font-family="system-ui" font-size="12" fill="#FFFFFF">✓</text>
  <text x="680" y="695" font-family="system-ui" font-size="13" fill="#FFFFFF">Send SMS reminder 24hrs before</text>
  
  <!-- Action Buttons -->
  <rect x="740" y="730" width="100" height="50" rx="8" fill="transparent" stroke="#4A5568"/>
  <text x="770" y="762" font-family="system-ui" font-size="14" fill="#A0AEC0">Back</text>
  
  <rect x="860" y="730" width="140" height="50" rx="8" fill="#7C7CF2"/>
  <text x="880" y="762" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">✓ Confirm</text>
  
  <!-- Pulse animation for confirm button -->
  <rect x="855" y="725" width="150" height="60" rx="10" fill="none" stroke="#7C7CF2" stroke-width="3" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.5s" repeatCount="indefinite"/>
  </rect>
</svg>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- Dimmed Background -->
  <rect x="60" y="84" width="1080" height="676" fill="#0B1220" fill-opacity="0.8"/>
  
  <!-- Services Assignment Panel -->
  <rect x="150" y="100" width="900" height="600" rx="16" fill="#1a1a2e"/>
  
  <!-- Header -->
  <text x="200" y="155" font-family="system-ui" font-size="22" font-weight="bold" fill="#FFFFFF">Assign Services</text>
  <text x="200" y="180" font-family="system-ui" font-size="14" fill="#718096">Select which services Sarah Johnson can perform</text>
  
  <!-- Tabs -->
  <rect x="200" y="205" width="100" height="36" rx="6" fill="transparent"/>
  <text x="220" y="229" font-family="system-ui" font-size="13" fill="#718096">Basic Info</text>
  
  <rect x="310" y="205" width="100" height="36" rx="6" fill="#7C7CF2"/>
  <text x="338" y="229" font-family="system-ui" font-size="13" font-weight="500" fill="#FFFFFF">Services</text>
  
  <rect x="420" y="205" width="100" height="36" rx="6" fill="transparent"/>
  <text x="436" y="229" font-family="system-ui" font-size="13" fill="#718096">Availability</text>
  
  <!-- Search services -->
  <rect x="200" y="260" width="400" height="44" rx="8" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="225" y="288" font-family="system-ui" font-size="14" fill="#718096">🔍 Search services...</text>
  
  <!-- Select All -->
  <rect x="700" y="260" width="120" height="44" rx="8" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2"/>
  <text x="725" y="288" font-family="system-ui" font-size="13" fill="#7C7CF2">Select All</text>
  
  <!-- Services List -->
  <rect x="200" y="320" width="850" height="320" rx="12" fill="#0f0f1a"/>
  
  <!-- Hair Services Category -->
  <rect x="220" y="340" width="810" height="36" rx="6" fill="#2D3748" fill-opacity="0.5"/>
  <text x="250" y="364" font-family="system-ui" font-size="13" font-weight="600" fill="#A0AEC0">HAIR SERVICES</text>
  <text x="950" y="364" font-family="system-ui" font-size="12" fill="#718096">3/4</text>
  
  <!-- Haircut - Checked -->
  <rect x="220" y="385" width="395" height="65" rx="8" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2" stroke-width="1"/>
  <rect x="240" y="400" width="24" height="24" rx="6" fill="#7C7CF2"/>
  <text x="246" y="418" font-family="system-ui" font-size="14" fill="#FFFFFF">✓</text>
  <text x="280" y="418" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Women's Haircut</text>
  <text x="280" y="438" font-family="system-ui" font-size="12" fill="#718096">45 min • Base: $65</text>
  <rect x="520" y="405" width="80" height="32" rx="6" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="548" y="426" font-family="system-ui" font-size="13" fill="#48BB78">$75</text>
  
  <!-- Color - Checked -->
  <rect x="625" y="385" width="395" height="65" rx="8" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2" stroke-width="1"/>
  <rect x="645" y="400" width="24" height="24" rx="6" fill="#7C7CF2"/>
  <text x="651" y="418" font-family="system-ui" font-size="14" fill="#FFFFFF">✓</text>
  <text x="685" y="418" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Color Service</text>
  <text x="685" y="438" font-family="system-ui" font-size="12" fill="#718096">2 hr • Base: $120</text>
  <rect x="925" y="405" width="80" height="32" rx="6" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="950" y="426" font-family="system-ui" font-size="13" fill="#48BB78">$140</text>
  
  <!-- Blowout - Checked -->
  <rect x="220" y="460" width="395" height="65" rx="8" fill="#7C7CF2" fill-opacity="0.1" stroke="#7C7CF2" stroke-width="1"/>
  <rect x="240" y="475" width="24" height="24" rx="6" fill="#7C7CF2"/>
  <text x="246" y="493" font-family="system-ui" font-size="14" fill="#FFFFFF">✓</text>
  <text x="280" y="493" font-family="system-ui" font-size="14" font-weight="500" fill="#FFFFFF">Blowout</text>
  <text x="280" y="513" font-family="system-ui" font-size="12" fill="#718096">30 min • Base: $45</text>
  <rect x="520" y="480" width="80" height="32" rx="6" fill="#0f0f1a" stroke="#2D3748"/>
  <text x="548" y="501" font-family="system-ui" font-size="13" fill="#A0AEC0">$45</text>
  
  <!-- Extensions - Unchecked -->
  <rect x="625" y="460" width="395" height="65" rx="8" fill="transparent" stroke="#2D3748" stroke-width="1"/>
  <rect x="645" y="475" width="24" height="24" rx="6" fill="transparent" stroke="#4A5568" stroke-width="2"/>
  <text x="685" y="493" font-family="system-ui" font-size="14" font-weight="500" fill="#718096">Hair Extensions</text>
  <text x="685" y="513" font-family="system-ui" font-size="12" fill="#4A5568">3 hr • Base: $350</text>
  
  <!-- Nail Services Category (collapsed preview) -->
  <rect x="220" y="540" width="810" height="36" rx="6" fill="#2D3748" fill-opacity="0.5"/>
  <text x="250" y="564" font-family="system-ui" font-size="13" font-weight="600" fill="#A0AEC0">NAIL SERVICES</text>
  <text x="950" y="564" font-family="system-ui" font-size="12" fill="#718096">0/5</text>
  <path d="M980 558 L990 558 L985 568 Z" fill="#718096"/>
  
  <!-- Spa Services Category (collapsed preview) -->
  <rect x="220" y="585" width="810" height="36" rx="6" fill="#2D3748" fill-opacity="0.5"/>
  <text x="250" y="609" font-family="system-ui" font-size="13" font-weight="600" fill="#A0AEC0">SPA SERVICES</text>
  <text x="950" y="609" font-family="system-ui" font-size="12" fill="#718096">0/3</text>
  <path d="M980 603 L990 603 L985 613 Z" fill="#718096"/>
  
  <!-- Pro Tip -->
  <rect x="200" y="655" width="600" height="35" rx="6" fill="#7C7CF2" fill-opacity="0.1"/>
  <text x="220" y="678" font-family="system-ui" font-size="12" fill="#7C7CF2">💡 Senior stylists can have premium pricing—set individual rates per service.</text>
  
  <!-- Continue Button -->
  <rect x="850" y="655" width="150" height="40" rx="8" fill="#7C7CF2"/>
  <text x="895" y="681" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Continue →</text>
</svg>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="1200" height="800" fill="#0B1220"/>
  <rect x="60" y="40" width="1080" height="720" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  
  <!-- Browser Chrome -->
  <rect x="60" y="40" width="1080" height="44" rx="12" fill="url(#browserGrad)"/>
  <rect x="60" y="72" width="1080" height="12" fill="url(#browserGrad)"/>
  <circle cx="88" cy="62" r="7" fill="#FF5F56"/>
  <circle cx="112" cy="62" r="7" fill="#FFBD2E"/>
  <circle cx="136" cy="62" r="7" fill="#27CA40"/>
  
  <!-- URL Bar -->
  <rect x="200" y="52" width="400" height="24" rx="4" fill="#0B1220"/>
  <text x="220" y="69" font-family="system-ui" font-size="12" fill="#718096">app.neono.io/settings/payments</text>
  
  <!-- Main Content Area -->
  <rect x="60" y="84" width="1080" height="676" fill="#0f0f1a"/>
  
  <!-- Header -->
  <text x="120" y="140" font-family="system-ui" font-size="28" font-weight="bold" fill="#FFFFFF">Payment Methods</text>
  
  <!-- Success Banner -->
  <rect x="100" y="165" width="1000" height="60" rx="10" fill="#48BB78" fill-opacity="0.1" stroke="#48BB78"/>
  <text x="140" y="200" font-family="system-ui" font-size="14" fill="#48BB78">✓ Online payments are configured! You can now accept deposits and process payments.</text>
  
  <!-- Connected Processor -->
  <text x="100" y="270" font-family="system-ui" font-size="18" font-weight="600" fill="#FFFFFF">Connected Payment Processor</text>
  
  <rect x="100" y="295" width="500" height="130" rx="12" fill="#1a1a2e" stroke="#48BB78"/>
  
  <!-- Stripe Connected -->
  <rect x="130" y="325" width="80" height="40" rx="6" fill="#635BFF"/>
  <text x="145" y="352" font-family="system-ui" font-size="18" font-weight="bold" fill="#FFFFFF">stripe</text>
  
  <text x="230" y="340" font-family="system-ui" font-size="16" font-weight="600" fill="#FFFFFF">Stripe</text>
  <rect x="295" y="323" width="80" height="22" rx="4" fill="#48BB78"/>
  <text x="307" y="338" font-family="system-ui" font-size="10" fill="#FFFFFF">Connected</text>
  
  <text x="230" y="365" font-family="system-ui" font-size="13" fill="#718096">Account: acct_1abc123xyz</text>
  <text x="230" y="388" font-family="system-ui" font-size="13" fill="#718096">Connected: Dec 15, 2024</text>
  
  <rect x="500" y="335" width="80" height="35" rx="6" fill="transparent" stroke="#4A5568"/>
  <text x="520" y="358" font-family="system-ui" font-size="12" fill="#A0AEC0">Edit</text>
  
  <!-- Payment Settings Summary -->
  <text x="620" y="270" font-family="system-ui" font-size="18" font-weight="600" fill="#FFFFFF">Payment Settings</text>
  
  <rect x="620" y="295" width="480" height="130" rx="12" fill="#1a1a2e"/>
  
  <!-- Settings Grid -->
  <rect x="650" y="325" width="200" height="80" rx="8" fill="#0f0f1a"/>
  <text x="680" y="355" font-family="system-ui" font-size="12" fill="#718096">Deposits</text>
  <text x="680" y="380" font-family="system-ui" font-size="18" font-weight="600" fill="#48BB78">50%</text>
  <text x="680" y="398" font-family="system-ui" font-size="11" fill="#4A5568">at booking</text>
  
  <rect x="870" y="325" width="200" height="80" rx="8" fill="#0f0f1a"/>
  <text x="900" y="355" font-family="system-ui" font-size="12" fill="#718096">Tax Rate</text>
  <text x="900" y="380" font-family="system-ui" font-size="18" font-weight="600" fill="#FFFFFF">13%</text>
  <text x="900" y="398" font-family="system-ui" font-size="11" fill="#4A5568">HST</text>
  
  <!-- Payment Methods List -->
  <text x="100" y="470" font-family="system-ui" font-size="18" font-weight="600" fill="#FFFFFF">Accepted Payment Methods</text>
  
  <rect x="100" y="495" width="1000" height="130" rx="12" fill="#1a1a2e"/>
  
  <!-- Online Methods -->
  <text x="140" y="530" font-family="system-ui" font-size="13" font-weight="500" fill="#718096">ONLINE</text>
  
  <rect x="140" y="545" width="100" height="60" rx="8" fill="#0f0f1a" stroke="#48BB78"/>
  <text x="167" y="575" font-family="system-ui" font-size="20" fill="#FFFFFF">💳</text>
  <text x="165" y="595" font-family="system-ui" font-size="10" fill="#48BB78">Cards</text>
  
  <rect x="255" y="545" width="100" height="60" rx="8" fill="#0f0f1a" stroke="#48BB78"/>
  <text x="283" y="575" font-family="system-ui" font-size="20" fill="#FFFFFF">🍎</text>
  <text x="270" y="595" font-family="system-ui" font-size="10" fill="#48BB78">Apple Pay</text>
  
  <rect x="370" y="545" width="100" height="60" rx="8" fill="#0f0f1a" stroke="#48BB78"/>
  <text x="400" y="575" font-family="system-ui" font-size="20" fill="#FFFFFF">G</text>
  <text x="378" y="595" font-family="system-ui" font-size="10" fill="#48BB78">Google Pay</text>
  
  <!-- Divider -->
  <line x1="520" y1="530" x2="520" y2="605" stroke="#2D3748" stroke-dasharray="4,4"/>
  
  <!-- In-Store Methods -->
  <text x="560" y="530" font-family="system-ui" font-size="13" font-weight="500" fill="#718096">IN-STORE</text>
  
  <rect x="560" y="545" width="100" height="60" rx="8" fill="#0f0f1a" stroke="#48BB78"/>
  <text x="587" y="575" font-family="system-ui" font-size="20" fill="#FFFFFF">💵</text>
  <text x="590" y="595" font-family="system-ui" font-size="10" fill="#48BB78">Cash</text>
  
  <rect x="675" y="545" width="100" height="60" rx="8" fill="#0f0f1a" stroke="#48BB78"/>
  <text x="703" y="575" font-family="system-ui" font-size="20" fill="#FFFFFF">💳</text>
  <text x="693" y="595" font-family="system-ui" font-size="10" fill="#48BB78">Terminal</text>
  
  <!-- Test Payment Button -->
  <rect x="900" y="550" width="180" height="50" rx="8" fill="#7C7CF2"/>
  <text x="935" y="582" font-family="system-ui" font-size="14" font-weight="600" fill="#FFFFFF">Test Payment →</text>
  
  <!-- Revenue Stats -->
  <rect x="100" y="650" width="1000" height="80" rx="12" fill="#7C7CF2" fill-opacity="0.1"/>
  <text x="140" y="685" font-family="system-ui" font-size="14" font-weight="500" fill="#7C7CF2">📊 This Month's Revenue</text>
  <text x="340" y="685" font-family="system-ui" font-size="24" font-weight="bold" fill="#FFFFFF">$4,250</text>
  <text x="480" y="685" font-family="system-ui" font-size="13" fill="#48BB78">↑ 12% vs last month</text>
  <text x="980" y="685" font-family="system-ui" font-size="13" fill="#7C7CF2">View Reports →</text>
</svg>
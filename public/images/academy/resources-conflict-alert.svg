<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser Window -->
  <rect width="600" height="400" rx="12" fill="#1a1a2e"/>
  
  <!-- Title Bar -->
  <rect width="600" height="44" rx="12" fill="#252542"/>
  <rect y="32" width="600" height="12" fill="#252542"/>
  
  <!-- Traffic Lights -->
  <circle cx="20" cy="22" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="22" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="22" r="6" fill="#28CA41"/>
  
  <!-- URL Bar -->
  <rect x="100" y="10" width="400" height="24" rx="6" fill="#1a1a2e"/>
  <text x="260" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888">app.neono.io/calendar</text>
  
  <!-- Dimmed Background -->
  <rect x="0" y="44" width="600" height="356" fill="#13131f" fill-opacity="0.9"/>
  
  <!-- Warning Modal -->
  <rect x="100" y="100" width="400" height="220" rx="16" fill="#1e1e36"/>
  <rect x="100" y="100" width="400" height="220" rx="16" stroke="#F59E0B" stroke-width="2"/>
  
  <!-- Warning Icon -->
  <circle cx="300" cy="150" r="30" fill="#F59E0B" fill-opacity="0.2"/>
  <text x="292" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#F59E0B">⚠</text>
  
  <!-- Title -->
  <text x="300" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#fff" text-anchor="middle">Resource Unavailable</text>
  
  <!-- Message -->
  <text x="300" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9999aa" text-anchor="middle">Massage Table 1 is already booked at this time.</text>
  
  <!-- Current Booking Info -->
  <rect x="140" y="252" width="320" height="36" rx="8" fill="#252542"/>
  <text x="160" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Current:</text>
  <text x="220" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff">10:00 AM - Emma Johnson - Swedish Massage</text>
  
  <!-- Buttons -->
  <rect x="140" y="300" width="150" height="38" rx="8" fill="#7C7CF2"/>
  <text x="167" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#fff">Choose Different Time</text>
  
  <rect x="305" y="300" width="155" height="38" rx="8" fill="#252542"/>
  <text x="320" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Different Resource</text>
  
  <!-- Override Link -->
  <text x="300" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#EF4444" text-anchor="middle">Override (Admin Only)</text>
  <text x="300" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666" text-anchor="middle">⚠️ This will double-book the resource</text>
</svg>